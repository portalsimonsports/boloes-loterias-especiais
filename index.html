/* =====================================================================
 * PATCH V217 — NOVA LOTERIA COM BASE_LOTERIAS PRÉ-CARREGADA
 * - Ao clicar em Nova Loteria, exibe todos os modelos cadastrados na BASE_LOTERIAS.
 * - Range, qtd mínima, qtd máxima e qtd por palpite vêm preenchidos.
 * - Apenas Valor da cota, Total de cotas e Premiação ficam vazios para configurar.
 * - Também permite atualizar/completear a BASE_LOTERIAS pelo próprio sistema.
 * ===================================================================== */
(function(){
  function textoV217_(v){return String(v===undefined||v===null?'':v).trim();}
  function numeroV217_(v,padrao){const n=num(v);return (isFinite(n)&&n!==0)?String(n):textoV217_(v||padrao||'');}

  function normalizarLoteriaV217_(v){
    return String(v||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/[^a-z0-9]+/g,'');
  }

  function iconeLoteriaV217_(nome){
    const k=normalizarLoteriaV217_(nome);
    if(k.includes('mega'))return '🍀';
    if(k.includes('quina'))return '🔥';
    if(k.includes('lotofacil')||k.includes('facil'))return 'BR';
    if(k.includes('dupla')||k.includes('pascoa'))return '🐰';
    if(k.includes('sorte'))return '🌞';
    if(k.includes('super'))return '7️⃣';
    if(k.includes('timemania'))return '⚽';
    if(k.includes('lotomania'))return '🔢';
    if(k.includes('milionaria'))return '💰';
    if(k.includes('loteca'))return '🏟️';
    return '🎯';
  }

  function corLoteriaEspecialV217_(nome){
    const k=normalizarLoteriaV217_(nome);
    if(k.includes('mega'))return '#209869';
    if(k.includes('lotofacil')||k.includes('facil'))return '#930089';
    if(k.includes('quina'))return '#260085';
    if(k.includes('dupla')||k.includes('pascoa'))return '#a61324';
    if(k.includes('sorte'))return '#cb852b';
    if(k.includes('super'))return '#a8cf45';
    if(k.includes('timemania'))return '#00a651';
    if(k.includes('lotomania')||k.includes('loteca'))return '#f78100';
    if(k.includes('milionaria'))return '#2e3078';
    return '#0b6f28';
  }

  function dataISOAddV217_(dias){
    const d=new Date();
    d.setDate(d.getDate()+Number(dias||0));
    const y=d.toLocaleString('en-CA',{timeZone:'America/Sao_Paulo',year:'numeric'});
    const m=d.toLocaleString('en-CA',{timeZone:'America/Sao_Paulo',month:'2-digit'});
    const day=d.toLocaleString('en-CA',{timeZone:'America/Sao_Paulo',day:'2-digit'});
    return `${y}-${m}-${day}`;
  }

  function anoAtualV217_(){
    return new Date().toLocaleString('pt-BR',{timeZone:'America/Sao_Paulo',year:'numeric'});
  }

  function nomeFinalEspecialV217_(nomeBase,ano){
    let nome=textoV217_(nomeBase).replace(/\s{2,}/g,' ');
    const a=textoV217_(ano);
    if(!nome)return '';
    if(a && !new RegExp('\\b'+a+'\\b').test(nome)) nome+=' '+a;
    return nome;
  }

  window.nomeFinalEspecial = function(nomeBase, ano, tipo){
    return nomeFinalEspecialV217_(nomeBase, ano);
  };

  function especialPadraoV217_(tipo){
    const ano=anoAtualV217_();
    const mapa={
      mega:{tipo:'mega',icone:'🍀',titulo:'Mega da Virada',nome:'Mega da Virada',ano,range:'60',qtdMin:'6',qtdMax:'15',qtdPalpite:'10'},
      pascoa:{tipo:'pascoa',icone:'🐰',titulo:'Páscoa',nome:'Dupla-Sena-de-pascoa',ano,range:'50',qtdMin:'6',qtdMax:'15',qtdPalpite:'10'},
      saojoao:{tipo:'saojoao',icone:'🔥',titulo:'São João',nome:'Quina-de-Sao-Joao',ano,range:'80',qtdMin:'5',qtdMax:'15',qtdPalpite:'10'},
      independencia:{tipo:'independencia',icone:'BR',titulo:'Independência',nome:'Lotofacil-da-Independencia',ano,range:'25',qtdMin:'15',qtdMax:'20',qtdPalpite:'10'},
      nova:{tipo:'nova',icone:'➕',titulo:'Nova Loteria',nome:'',ano,range:'',qtdMin:'',qtdMax:'',qtdPalpite:''}
    };
    return mapa[tipo]||mapa.nova;
  }

  window.especialPadrao = function(tipo){
    return especialPadraoV217_(tipo);
  };

  async function carregarModelosBaseLoteriasV217_(forcar){
    if(!forcar && Array.isArray(window.PSS_BASE_LOTERIAS_MODELOS_V217)){
      return window.PSS_BASE_LOTERIAS_MODELOS_V217;
    }

    let r=null;
    try{
      r=await apiMulti([
        {action:'getBaseLoteriasTemplates',args:[]},
        {action:'listarBaseLoteriasTemplates',args:[]}
      ]);
    }catch(e){
      r=await adminDados('BASE_LOTERIAS');
    }

    let modelos=[];
    if(Array.isArray(r&&r.modelos)){
      modelos=r.modelos;
    }else{
      const headers=(r&&r.headers)||[];
      const rows=(r&&r.rows)||[];
      modelos=rows.map(row=>{
        const o=rowObj(headers,row);
        return {
          nome:cellObj(o,['NOME','LOTERIA']),
          qtdMin:cellObj(o,['QTD_MIN','QTD MIN']),
          qtdMax:cellObj(o,['QTD_MAX','QTD MAX']),
          range:cellObj(o,['RANGE']),
          qtdPalpite:cellObj(o,['QTD_PALPITE','QTD PALPITE','QTD_ESCOLHA']),
          imagemId:cellObj(o,['IMAGEM_ID','IMAGEM'])
        };
      });
    }

    modelos=modelos
      .filter(x=>x&&textoV217_(x.nome))
      .map(x=>({
        nome:textoV217_(x.nome),
        titulo:textoV217_(x.titulo||x.nome),
        range:numeroV217_(x.range,''),
        qtdMin:numeroV217_(x.qtdMin,''),
        qtdMax:numeroV217_(x.qtdMax,''),
        qtdPalpite:numeroV217_(x.qtdPalpite,''),
        imagemId:textoV217_(x.imagemId||x.imagem_id||'')
      }))
      .sort((a,b)=>a.nome.localeCompare(b.nome,'pt-BR'));

    window.PSS_BASE_LOTERIAS_MODELOS_V217=modelos;
    return modelos;
  }

/* =====================================================================
 * PATCH V222 — REGULAMENTO SEM TIMEOUT VISÍVEL NO MOBILE
 * Motivo:
 * - No celular, a fila da API pode atrasar e o menu Regulamento mostrava erro.
 * Correção:
 * - Exibe cache/fallback imediatamente.
 * - Atualiza o regulamento em segundo plano.
 * - Nunca deixa a tela travada com "Tempo limite ao carregar regulamento".
 * ===================================================================== */
(function(){
  const REG_FALLBACK_V222 = [
    'Regulamento do Sistema de Bolões de Loterias Especiais',
    '',
    '1. O sistema tem finalidade de controle, organização e transparência dos bolões cadastrados pela administração.',
    '2. A participação em cada bolão depende de cadastro aprovado, aquisição ou reserva de cotas e confirmação do pagamento pela administração.',
    '3. Os prazos de pagamento, envio de comprovante e realização dos palpites são definidos em cada bolão ativo.',
    '4. A reserva de cotas somente será efetivada após confirmação do pagamento e baixa administrativa do comprovante.',
    '5. Os participantes devem conferir seus dados, cotas, comprovantes e palpites diretamente na área logada do sistema.',
    '6. A eventual premiação será apurada e dividida conforme as cotas confirmadas e as regras internas aplicáveis ao bolão.',
    '7. Alterações operacionais poderão ser feitas pela administração para corrigir falhas, atualizar prazos, melhorar o sistema ou adequar o funcionamento dos bolões.',
    '',
    'Observação: este texto é exibido automaticamente quando a conexão demora. O regulamento oficial salvo no sistema é carregado em segundo plano quando a API responde.'
  ].join('\n');

  function normalizarRegTextoV222_(r){
    if(typeof r === 'string') return r.trim();
    if(r && typeof r === 'object'){
      return String(r.texto || r.regulamento || r.REGULAMENTO || r.html || r.conteudo || '').trim();
    }
    return '';
  }

  function getRegCacheV222_(){
    try{
      const c = cacheGet_('regulamento', true);
      const txt = normalizarRegTextoV222_(c);
      return txt || '';
    }catch(e){
      return '';
    }
  }

  function setRegCacheV222_(texto){
    texto = normalizarRegTextoV222_(texto);
    if(!texto) return;
    try{ cacheSet_('regulamento', texto, CACHE_TTL.longo); }catch(e){}
  }

  async function buscarRegulamentoApiV222_(){
    const r = await promiseTimeout_(
      apiMulti([
        {action:'getRegulamentoRapidoV222',args:[]},
        {action:'getRegulamento',args:[]},
        {action:'obterRegulamento',args:[]}
      ]),
      28000,
      'Tempo limite ao carregar regulamento.'
    );
    const txt = normalizarRegTextoV222_(r);
    if(!txt) throw new Error('Regulamento retornou vazio.');
    setRegCacheV222_(txt);
    return txt;
  }

  function htmlRegulamentoV222_(texto, status, classe){
    return `
      <div class="panel">
        <h2>Regulamento</h2>
        <div class="reg-box">${escapeHtml(texto || REG_FALLBACK_V222)}</div>
        ${status ? `<div class="reg-status-v222 ${classe||''}">${escapeHtml(status)}</div>` : ''}
        <div class="reg-actions-v222">
          <button class="btn" onclick="atualizarRegulamentoManualV222()">Atualizar regulamento</button>
          <button class="btn btn-light" onclick="renderHome()">Voltar ao início</button>
        </div>
      </div>
    `;
  }

  window.carregarRegulamentoCache_ = carregarRegulamentoCache_ = async function(segundoPlano=false){
    const cached = getRegCacheV222_();
    if(cached){
      if(segundoPlano){
        buscarRegulamentoApiV222_().catch(()=>{});
      }
      return cached;
    }

    try{
      return await buscarRegulamentoApiV222_();
    }catch(err){
      return REG_FALLBACK_V222;
    }
  };

  window.renderRegulamento = renderRegulamento = async function(){
    const cached = getRegCacheV222_();
    const inicial = cached || REG_FALLBACK_V222;

    setView(htmlRegulamentoV222_(
      inicial,
      cached
        ? 'Regulamento carregado do cache deste aparelho. Atualizando em segundo plano...'
        : 'Exibindo versão de segurança enquanto a API atualiza o regulamento em segundo plano.',
      cached ? '' : 'warn'
    ));

    buscarRegulamentoApiV222_()
      .then(txt=>{
        if(ESTADO && ESTADO.view === 'regulamento'){
          setView(htmlRegulamentoV222_(txt, 'Regulamento atualizado com sucesso.', ''));
        }
      })
      .catch(err=>{
        if(ESTADO && ESTADO.view === 'regulamento'){
          const atual = getRegCacheV222_() || REG_FALLBACK_V222;
          setView(htmlRegulamentoV222_(
            atual,
            'Não foi possível atualizar agora, mas a tela não ficará bloqueada. Detalhe: '+(err.message||String(err)),
            'warn'
          ));
        }
      });
  };

  window.atualizarRegulamentoManualV222 = async function(){
    const box = document.getElementById('view');
    if(box){
      box.insertAdjacentHTML('afterbegin','<div class="notice info">Atualizando regulamento...</div>');
    }
    try{
      const txt = await buscarRegulamentoApiV222_();
      setView(htmlRegulamentoV222_(txt, 'Regulamento atualizado com sucesso.', ''));
      toast('Regulamento atualizado.');
    }catch(err){
      toast('Não foi possível atualizar agora. Mantive a versão exibida na tela.', 'warn');
      const atual = getRegCacheV222_() || REG_FALLBACK_V222;
      setView(htmlRegulamentoV222_(atual, 'Falha ao atualizar agora. Detalhe: '+(err.message||String(err)), 'warn'));
    }
  };

  window.abrirRegulamentoPublico = abrirRegulamentoPublico = async function(){
    abrirModal('Regulamento', '<div class="reg-box">'+escapeHtml(getRegCacheV222_() || REG_FALLBACK_V222)+'</div><div class="reg-status-v222 warn">Atualizando em segundo plano...</div>');
    buscarRegulamentoApiV222_()
      .then(txt=>{
        abrirModal('Regulamento', '<div class="reg-box">'+escapeHtml(txt)+'</div><div class="reg-status-v222">Regulamento atualizado.</div>');
      })
      .catch(()=>{});
  };

  /*
   * Evita pré-carregar regulamento na fila junto com outros menus no mobile.
   * Bolões e Telegram continuam pré-carregando; regulamento só atualiza quando abrir.
   */
  const preCarregarBaseV222 = window.preCarregarDadosEstaticos || preCarregarDadosEstaticos;
  window.preCarregarDadosEstaticos = preCarregarDadosEstaticos = function(){
    setTimeout(async()=>{
      try{await carregarBoloes(true);}catch(e){}
      try{await carregarTelegramCache_(true);}catch(e){}
    },500);
  };
})();



/* =====================================================================
 * PATCH V224 — HOME PÚBLICA RÁPIDA SEM CACHE VAZIO
 * - Volta a usar a base estável V222.
 * - Usa snapshot rápido quando existir.
 * - Se não existir snapshot, busca dados reais diretamente e salva cache.
 * - Nunca exibe "ainda não há cache rápido" para o usuário.
 * ===================================================================== */
(function(){
  const HOME_SNAPSHOT_KEY_V224='PSS_HOME_PUBLICA_SNAPSHOT_V224';
  const RESULTADOS_KEY_V224='PSS_RESULTADOS_PUBLICOS_V213';
  const BOLOES_KEY_V224='PSS_BOLOES_PUBLICOS_V224';
  const TTL_HOME_V224=20*60*1000;

  function txtV224_(v){return String(v===undefined||v===null?'':v).trim();}
  function dadosResultadoV224_(raw){
    let d=raw||{};
    if(d.dados!==undefined)d=d.dados;
    if(d.result!==undefined)d=d.result;
    if(d.resultadosPublicos)d=d.resultadosPublicos;
    if(d.resultados_publicos)d=d.resultados_publicos;
    return d||{};
  }
  function dadosSnapshotV224_(raw){
    let s=raw||{};
    if(s.dados!==undefined)s=s.dados;
    if(s.result!==undefined)s=s.result;
    const resultados=dadosResultadoV224_(s.resultadosPublicos||s.resultados_publicos||s.resultados||{});
    return {
      sucesso:s.sucesso!==false,
      atualizadoEm:txtV224_(s.atualizadoEm||s.dataHora||dataHoraAtualCurta()),
      resultadosPublicos:{
        sucesso:resultados.sucesso!==false,
        atualizadoEm:txtV224_(resultados.atualizadoEm||s.atualizadoEm||dataHoraAtualCurta()),
        letreiroTexto:txtV224_(resultados.letreiroTexto||s.letreiroTexto||''),
        resultados:Array.isArray(resultados)?resultados:(Array.isArray(resultados.resultados)?resultados.resultados:[])
      },
      boloes:Array.isArray(s.boloes)?s.boloes:[],
      nomesLoterias:Array.isArray(s.nomesLoterias)?s.nomesLoterias:[],
      origem:txtV224_(s.origem||''),
      cacheServidor:!!s.cacheServidor,
      cacheLocal:!!s.cacheLocal
    };
  }
  function snapshotTemResultadosV224_(s){
    s=dadosSnapshotV224_(s);
    return !!((s.resultadosPublicos.resultados&&s.resultadosPublicos.resultados.length)||s.resultadosPublicos.letreiroTexto);
  }
  function snapshotTemBoloesV224_(s){
    s=dadosSnapshotV224_(s);
    return Array.isArray(s.boloes)&&s.boloes.length>0;
  }
  function snapshotTemAlgumDadoV224_(s){return snapshotTemResultadosV224_(s)||snapshotTemBoloesV224_(s);}

  function setLocalV224_(key,dados){
    try{localStorage.setItem(key,JSON.stringify({ts:Date.now(),dados:dados}));}catch(e){}
  }
  function getLocalV224_(key,ttl,aceitarExpirado){
    try{
      const obj=JSON.parse(localStorage.getItem(key)||'null');
      if(!obj||!obj.dados)return null;
      const expirado=Date.now()-Number(obj.ts||0)>ttl;
      if(expirado&&!aceitarExpirado)return null;
      return obj.dados;
    }catch(e){return null;}
  }
  function salvarSnapshotV224_(snap){
    snap=dadosSnapshotV224_(snap);
    if(!snapshotTemAlgumDadoV224_(snap))return;
    setLocalV224_(HOME_SNAPSHOT_KEY_V224,snap);
    if(snapshotTemResultadosV224_(snap))setLocalV224_(RESULTADOS_KEY_V224,snap.resultadosPublicos);
    if(snapshotTemBoloesV224_(snap))setLocalV224_(BOLOES_KEY_V224,{boloes:snap.boloes,nomesLoterias:snap.nomesLoterias,atualizadoEm:snap.atualizadoEm});
  }
  function lerSnapshotLocalV224_(aceitarExpirado=true){
    const s=getLocalV224_(HOME_SNAPSHOT_KEY_V224,TTL_HOME_V224,aceitarExpirado);
    if(s&&snapshotTemAlgumDadoV224_(s)){const n=dadosSnapshotV224_(s);n.cacheLocal=true;return n;}
    const r=getLocalV224_(RESULTADOS_KEY_V224,TTL_HOME_V224,aceitarExpirado);
    const b=getLocalV224_(BOLOES_KEY_V224,TTL_HOME_V224,aceitarExpirado);
    if(r||b){
      const n=dadosSnapshotV224_({resultadosPublicos:r||{},boloes:(b&&b.boloes)||[],nomesLoterias:(b&&b.nomesLoterias)||[],atualizadoEm:(b&&b.atualizadoEm)||dataHoraAtualCurta()});
      n.cacheLocal=true;
      return n;
    }
    return null;
  }

  /* V224-MOBILE: detecta mobile e usa timeout menor + fetch como 2ª tentativa */
  function isMobileV224_(){
    return /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent||'');
  }

  function apiFetchV224_(action,dados,args,timeoutMs){
    return new Promise(function(resolve,reject){
      const payload=typeof montarPayloadApi_==='function'?montarPayloadApi_(action,dados||{},args||null):(dados||{});
      const params=new URLSearchParams();
      params.set('action',action);
      params.set('fn',action);
      params.set('callback','PSS_FETCH_CB');
      params.set('payload',JSON.stringify(Object.assign({},payload,{action:action})));
      params.set('_',String(Date.now()));
      const url=CONFIG.apiUrl+'?'+params.toString();
      const ctrl=new AbortController();
      const timer=setTimeout(()=>{ctrl.abort();reject(new Error('Timeout fetch V224'));},timeoutMs||14000);
      fetch(url,{method:'GET',mode:'cors',signal:ctrl.signal})
        .then(r=>r.text())
        .then(txt=>{
          clearTimeout(timer);
          // GAS retorna callback(json) — extrai o JSON
          const m=txt.match(/^[A-Za-z_$][A-Za-z0-9_$.]*\s*\((.+)\);?\s*$/s);
          const json=JSON.parse(m?m[1]:txt);
          if(typeof tratarRespostaApi_==='function')resolve(tratarRespostaApi_(json));
          else resolve((json.dados!==undefined?json.dados:(json.result!==undefined?json.result:json)));
        })
        .catch(err=>{clearTimeout(timer);reject(err);});
    });
  }

  function apiRapidaV224_(action,dados,args,timeoutMs){
    const mobile=isMobileV224_();
    const tJsonp=mobile?10000:(timeoutMs||18000);
    if(typeof apiJsonpDireto_==='function'){
      return apiJsonpDireto_(action,dados||{},args||null,tJsonp)
        .catch(()=>apiFetchV224_(action,dados,args,mobile?12000:14000));
    }
    return apiFetchV224_(action,dados,args,timeoutMs||14000)
      .catch(()=>promiseTimeout_(api(action,dados||{},args||null),timeoutMs||18000,'Tempo limite na leitura pública.'));
  }

  function renderResultadosV224_(snapshot,fonte){
    if(typeof inserirEstruturaLetreiroV213_==='function')inserirEstruturaLetreiroV213_();
    const box=document.getElementById('resultadosPublicosTickerV213');
    const atualizado=document.getElementById('resultadosPublicosAtualizadoV213');
    if(!box)return;
    const s=dadosSnapshotV224_(snapshot);
    const dados=s.resultadosPublicos;
    if(snapshotTemResultadosV224_(s)){
      try{renderLetreiroResultadosPublicosV213(dados);}catch(e){box.innerHTML='<div class="home-note v224-warn">Resultados carregados. Atualize a página se o letreiro não aparecer.</div>';}
      if(atualizado){
        atualizado.innerHTML='Atualizado em '+escapeHtml(dados.atualizadoEm||s.atualizadoEm||dataHoraAtualCurta())+
          '<span class="v224-chip">'+escapeHtml(fonte||'leitura rápida')+'</span>';
      }
      return;
    }
    if(atualizado)atualizado.textContent='Carregando informações...';
    box.innerHTML='<div class="notice info"><span class="v224-loading">Carregando últimos resultados</span></div>';
  }

  function renderBoloesV224_(snapshot,fonte){
    const box=document.getElementById('homeBoloesPublicosConteudo');
    const lotBox=document.getElementById('homeTodasLoteriasConteudo');
    if(!box)return;
    const s=dadosSnapshotV224_(snapshot);
    const lista=Array.isArray(s.boloes)?s.boloes:[];
    const ativos=lista.filter(b=>!isHistorico(b)&&normalizar(b.status||'ATIVO').includes('ATIVO'))
      .sort((a,b)=>String(a.dataSorteio||'').localeCompare(String(b.dataSorteio||''))).slice(0,8);
    if(ativos.length){

      }catch(err){
        box.innerHTML = `<div class="notice error">${escapeHtml(err.message)}</div>`;

  window.selecionarParticipanteTerceiroV225 = function(emailCod,nomeCod){

    const nome = decodeURIComponent(nomeCod||'');

    if(box) box.innerHTML = `<div class="v225-selected-user">Participante selecionado: ${escapeHtml(nome||email)} — ${escapeHtml(email)}</div>`;

    meta = meta || {};
    const emailEnvio = meta.tipoEnvio === 'TERCEIRO' ? (ESTADO.email || '') : (meta.emailParticipante || ESTADO.email || '');
    const dados = {
      fileData: base64,
      fileName: file.name,
      mimeType: file.type,
      email: emailEnvio,
      loteria,
      meta: meta,
      emailParticipante: meta.emailParticipante || '',
      adminEmail: ESTADO.email || '',
      tipoEnvio: meta.tipoEnvio || 'PROPRIO',
      tipoCota: meta.tipoCota || '',
      fracaoCota: meta.fracaoCota || '',
      obsAdmin: meta.obsAdmin || ''
    };
    const args = [base64, file.name, emailEnvio, loteria, meta];
    const action = meta.tipoEnvio === 'TERCEIRO' ? 'uploadComprovanteTerceiroAdmin' : 'uploadComprovante';

    try{
      return await apiPostFormWindowName_(action,dados,args,120000);
    }catch(errPost){
      if(String(base64||'').length < 350000){
        return await apiMulti([{action,dados,args},{action:'uploadComprovante',dados,args}]);
      }
      throw errPost;
    }
  };

  window.enviarComprovante = enviarComprovante = async function(ev){
    ev.preventDefault();

    const tipoEnvio = document.getElementById('tipoEnvioComprovante')?.value || 'meu';
    const loteria = document.getElementById('uploadBolao').value;
    const input = document.getElementById('arquivoComprovante');
    const file = input && input.files ? input.files[0] : null;
    const btn = document.getElementById('btnEnviarComprovante');

    if(!loteria) return toast('Selecione a loteria do depósito.','error');
    if(!file) return toast('Selecione o arquivo do comprovante.','error');

    let meta = {
      tipoEnvio: tipoEnvio === 'terceiro' ? 'TERCEIRO' : 'PROPRIO',
      tipoCota: document.getElementById('tipoCota')?.value || 'unica',
      qtdPartes: document.getElementById('qtdPartes')?.value || '',
      nomesPartes: []
    };

    if(meta.tipoCota === 'dividida'){
      document.querySelectorAll('#nomesPartes input').forEach(inp=>meta.nomesPartes.push(inp.value||''));
    }

    if(tipoEnvio === 'terceiro'){
      if(!isAdmin()) return toast('Apenas administrador pode enviar comprovante de terceiro.','error');
      const emailParticipante = (document.getElementById('emailParticipanteTerceiroV225')?.value || '').trim();
      const nomeParticipante = (document.getElementById('nomeParticipanteTerceiroV225')?.value || '').trim();
      const fracao = document.getElementById('fracaoCotaTerceiroV225')?.value || '1';

      if(!emailParticipante) return toast('Selecione o participante vinculado ao comprovante.','error');

      meta.emailParticipante = emailParticipante;
      meta.nomeParticipante = nomeParticipante;
      meta.fracaoCota = fracao;
      meta.tipoCota = fracao === '1' ? 'integral' : 'fracionada';
      meta.obsAdmin = document.getElementById('obsComprovanteTerceiroV225')?.value || '';
    }

    ESTADO.bolaoSelecionado = loteria;
    localStorage.setItem('PSS_BOLAO_SELECIONADO', loteria);

    btn.disabled = true;
    btn.textContent = 'Enviando...';
    atualizarProgressoUploadComprovante_(5,'Preparando envio...','Lendo arquivo selecionado.','run');

    try{
      await aguardarFrame_();

      atualizarProgressoUploadComprovante_(18,'Lendo arquivo...','Preparando '+file.name,'run');
      const base64 = await lerArquivoBase64(file);

      atualizarProgressoUploadComprovante_(45,'Enviando comprovante...','Gravando arquivo no Drive e vinculando ao pagamento.','run');
      const r = await apiUploadComprovante_(base64,file,loteria,meta);

      atualizarProgressoUploadComprovante_(100,'Envio concluído',(r&&r.msg)||'Comprovante enviado com sucesso.','ok');

      toast((r&&r.msg)||'Comprovante enviado com sucesso.');
      input.value = '';
      cacheDel_(cacheKeyLoteria_('historicoComprovantes',loteria));
      cacheDel_('boloes');
      setTimeout(()=>renderComprovante(),700);
    }catch(err){
      atualizarProgressoUploadComprovante_(0,'Falha no envio',err.message,'error');
      toast(err.message,'error');
    }finally{
      btn.disabled = false;
      btn.textContent = 'Enviar agora';
    }
  };
})();


</script>

  <script>
/* =====================================================================
 * PATCH V226 — ULTRAVELOCIDADE GERAL + UPLOAD DRIVE RÁPIDO
 *
 * 1. isMobileV226_()          : detecção mobile global (idempotente)
 * 2. CACHE_TTL elevados       : curto 5min, médio 20min (menos round-trips)
 * 3. apiHibridaComFallback_   : timeouts mobile 10/16/20s (era 18/22/30s)
 * 4. apiFetchDireto_V226_     : fetch() CORS como 2ª via no mobile
 * 5. apiRapidaV226_           : JSONP→fetch em vez de JSONP→bridge lento
 * 6. carregarRegulamentoCache_: paralela getRegulamento + obterRegulamento
 * 7. carregarJogosCache_      : paralela 3 actions, timeout mobile 10s
 * 8. carregarTelegramCache_   : paralela 2 actions, timeout mobile 9s
 * 9. renderInicio dashboard   : Promise.all (simultâneo) em vez de sequencial
 * 10. renderComprovante       : cache-first + segundo plano
 * 11. renderJogosRealizados   : cache-first + segundo plano
 * 12. uploadComprovante Drive : fetch() direto + iframe fallback
 * 13. uploadJogoRealizado     : fetch() direto + loop sequencial garantido
 * ===================================================================== */
(function(){
  'use strict';

  /* ── 1. Detecção mobile global (idempotente) ─────────────────────── */
  if(typeof window.isMobileV224_ !== 'function'){
    window.isMobileV224_ = function(){
      return /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent||'');
    };
  }
  var _mob = window.isMobileV224_;

  /* ── 2. TTL de cache elevados: menos round-trips ─────────────────── */
  if(typeof CACHE_TTL !== 'undefined'){
    CACHE_TTL.curto  = 5  * 60 * 1000;   // era 2 min
    CACHE_TTL.medio  = 20 * 60 * 1000;   // era 10 min
    // longo permanece 6h
  }

  /* ── 3. apiHibridaComFallback_ com timeouts mobile reduzidos ─────── */
  if(typeof apiHibridaComFallback_ === 'function'){
    var _hibBase = apiHibridaComFallback_;
    apiHibridaComFallback_ = function(action,dados,args){
      var mob=_mob();
      var tJ=mob?10000:18000, tB=mob?16000:22000, tW=mob?20000:30000;
      if(typeof apiJsonpDireto_==='function'){
        return apiJsonpDireto_(action,dados||{},args||null,tJ)
          .catch(function(){ return apiFetchDireto_V226_(action,dados,args,mob?12000:14000); })
          .catch(function(){ return typeof apiPostMessageBridge_==='function'
            ? apiPostMessageBridge_(action,dados||{},args||null,tB)
            : Promise.reject(new Error('bridge indisponível')); })
          .catch(function(){ return typeof apiWindowNameBridge_==='function'
            ? apiWindowNameBridge_(action,dados||{},args||null,tW)
            : Promise.reject(new Error('windowName indisponível')); });
      }
      return _hibBase(action,dados,args);
    };
  }

  /* ── 4. apiFetchDireto_V226_ — fetch CORS como 2ª via ───────────── */
  window.apiFetchDireto_V226_ = function(action,dados,args,timeoutMs){
    return new Promise(function(resolve,reject){
      var payload = typeof montarPayloadApi_==='function'
        ? montarPayloadApi_(action,dados||{},args||null)
        : Object.assign({},dados||{},{action:action});
      var params=new URLSearchParams();
      params.set('action',action);
      params.set('fn',action);
      params.set('callback','PSS_FETCH_CB_V226');
      params.set('payload',JSON.stringify(payload));
      params.set('_',String(Date.now()));
      var url=(typeof CONFIG!=='undefined'?CONFIG.apiUrl:'')+('?'+params.toString());
      var ctrl=new AbortController();
      var timer=setTimeout(function(){ctrl.abort();reject(new Error('timeout fetch V226'));},timeoutMs||14000);
      fetch(url,{method:'GET',mode:'cors',signal:ctrl.signal})
        .then(function(r){return r.text();})
        .then(function(txt){
          clearTimeout(timer);
          var m=txt.match(/^[A-Za-z_$][A-Za-z0-9_$.]*\s*\((.+)\);?\s*$/s);
          var json=JSON.parse(m?m[1]:txt);
          resolve(typeof tratarRespostaApi_==='function'
            ? tratarRespostaApi_(json)
            : (json.dados!==undefined?json.dados:(json.result!==undefined?json.result:json)));
        })
        .catch(function(err){clearTimeout(timer);reject(err);});
    });
  };

  /* ── 5. apiRapidaV226_: JSONP→fetch em vez de JSONP→bridge ──────── */
  window.apiRapidaV226_ = function(action,dados,args,timeoutMs){
    var mob=_mob();
    var tJ=mob?9000:(timeoutMs||14000);
    if(typeof apiJsonpDireto_==='function'){
      return apiJsonpDireto_(action,dados||{},args||null,tJ)
        .catch(function(){ return apiFetchDireto_V226_(action,dados,args,mob?11000:14000); });
    }
    return apiFetchDireto_V226_(action,dados,args,timeoutMs||14000);
  };

  /* Alias retrocompat com V224 */
  window.apiRapidaV224_ = window.apiRapidaV226_;

  /* ── 6. carregarRegulamentoCache_ — paralela ─────────────────────── */
  if(typeof carregarRegulamentoCache_ === 'function'){
    var _regBase = carregarRegulamentoCache_;
    carregarRegulamentoCache_ = function(segundoPlano){
      var tOut=_mob()?10000:14000;
      if(typeof apiCached_!=='function') return _regBase(segundoPlano);
      return apiCached_(
        'regulamento', CACHE_TTL.longo,
        function(){
          return Promise.any([
            promiseTimeout_(api('getRegulamento',{},[]),tOut,'r1'),
            promiseTimeout_(api('obterRegulamento',{},[]),tOut,'r2')
          ]).catch(function(){throw new Error('Regulamento indisponível.');});
        },
        {usarCachePrimeiro:true,atualizarSegundoPlano:!!segundoPlano}
      );
    };
  }

  /* ── 7. carregarJogosCache_ — paralela + timeout mobile ─────────── */
  if(typeof carregarJogosCache_ === 'function'){
    var _jogBase = carregarJogosCache_;
    carregarJogosCache_ = function(loteria,segundoPlano,onRefresh){
      var tOut=_mob()?10000:13000;
      if(typeof apiCached_!=='function') return _jogBase(loteria,segundoPlano,onRefresh);
      var key=typeof cacheKeyLoteria_==='function'?cacheKeyLoteria_('jogos',loteria):('jogos_'+loteria);
      return apiCached_(
        key, CACHE_TTL.medio,
        function(){
          return Promise.any([
            promiseTimeout_(api('getJogosRealizadosBolao',{email:ESTADO.email,loteria},[ESTADO.email,loteria]),tOut,'j1'),
            promiseTimeout_(api('listarJogosRealizadosBolao',{email:ESTADO.email,loteria},[ESTADO.email,loteria]),tOut,'j2'),
            promiseTimeout_(api('getJogosBolao',{email:ESTADO.email,loteria},[ESTADO.email,loteria]),tOut,'j3')
          ]).catch(function(){throw new Error('Jogos indisponíveis.');});
        },
        {usarCachePrimeiro:true,atualizarSegundoPlano:!!segundoPlano,onRefresh:onRefresh}
      );
    };
  }

  /* ── 8. carregarTelegramCache_ — paralela ────────────────────────── */
  if(typeof carregarTelegramCache_ === 'function'){
    var _telBase = carregarTelegramCache_;
    carregarTelegramCache_ = function(segundoPlano){
      var tOut=_mob()?9000:12000;
      if(typeof apiCached_!=='function') return _telBase(segundoPlano);
      return apiCached_(
        'telegram', CACHE_TTL.medio,
        function(){
          return Promise.any([
            promiseTimeout_(api('getTelegramCanalLink',{},[]),tOut,'t1'),
            promiseTimeout_(api('getConfigPublica',{},[]),tOut,'t2')
          ]).catch(function(){throw new Error('Telegram indisponível.');});
        },
        {usarCachePrimeiro:true,atualizarSegundoPlano:!!segundoPlano}
      );
    };
  }

  /* ── 9. renderInicio dashboard — Promise.all simultâneo ─────────── */
  /* Sobrescreve o renderInicio logado para disparar bolões+config em paralelo */
  var _renderInicioBase226 = window.renderInicio;
  window.renderInicio = renderInicio = async function(){
    if(typeof loading==='function') loading('Carregando início');
    try{
      /* Disparo simultâneo: bolões + config pública */
      var [lista, cfg] = await Promise.all([
        carregarBoloes(true).catch(function(){return[];}),
        (typeof apiCached_==='function'
          ? apiCached_('configPublica', CACHE_TTL.medio, function(){return apiRapidaV226_('getConfigPublica',{},[],12000);},{usarCachePrimeiro:true,atualizarSegundoPlano:true})
          : Promise.resolve({})
        ).catch(function(){return{};})
      ]);
      ESTADO.boloes = lista;
      ESTADO.configPublica = cfg;
      /* Delega renderização ao original mantendo ESTADO preenchido */
      if(typeof _renderInicioBase226==='function' && _renderInicioBase226 !== renderInicio){
        try{ await _renderInicioBase226(); }catch(e){}
      }
    }catch(e){
      if(typeof _renderInicioBase226==='function' && _renderInicioBase226 !== renderInicio){
        try{ await _renderInicioBase226(); }catch(e2){}
      }
    }
  };

  /* ── 10. renderComprovante — cache-first ─────────────────────────── */
  var _renderCompBase = window.renderComprovante;
  window.renderComprovante = renderComprovante = async function(){
    if(typeof loading==='function') loading('Carregando comprovante');
    try{
      /* Bolões do cache imediatamente */
      var lista = typeof carregarBoloes==='function' ? await carregarBoloes(true).catch(function(){return[];}) : [];
      ESTADO.boloes = lista;
      /* Histórico de comprovantes em paralelo com bolões frescos */
      var lotSel = ESTADO.bolaoSelecionado||(lista[0]?lista[0].loteria:'');
      var cacheHistKey = typeof cacheKeyLoteria_==='function'?cacheKeyLoteria_('historicoComprovantes',lotSel):'hist_comp_'+lotSel;
      var cachedHist = typeof cacheGet_==='function'?cacheGet_(cacheHistKey,true):null;
      if(cachedHist){
        /* Renderiza do cache enquanto busca frescos em segundo plano */
        if(typeof _renderCompBase==='function') await _renderCompBase();
        var tOut=_mob()?11000:15000;
        Promise.any([
          promiseTimeout_(api('getHistoricoComprovantes',{email:ESTADO.email},[ESTADO.email]),tOut,'h1'),
          promiseTimeout_(api('historicoComprovantes',{email:ESTADO.email},[ESTADO.email]),tOut,'h2')
        ]).then(function(h){ if(typeof cacheSet_==='function') cacheSet_(cacheHistKey,h,CACHE_TTL.curto); })
          .catch(function(){});
        return;
      }
      if(typeof _renderCompBase==='function') await _renderCompBase();
    }catch(e){
      if(typeof _renderCompBase==='function') try{ await _renderCompBase(); }catch(e2){}
    }
  };

  /* ── 11. renderJogosRealizados — cache-first ─────────────────────── */
  var _renderJogosBase = window.renderJogosRealizados;
  window.renderJogosRealizados = renderJogosRealizados = async function(){
    if(typeof loading==='function') loading('Carregando jogos realizados');
    try{
      /* Bolões do cache — não bloqueia */
      var lista = typeof carregarBoloes==='function' ? await carregarBoloes(true).catch(function(){return[];}) : [];
      ESTADO.boloes = lista;
      if(typeof _renderJogosBase==='function') await _renderJogosBase();
    }catch(e){
      if(typeof _renderJogosBase==='function') try{ await _renderJogosBase(); }catch(e2){}
    }
  };

  /* ── 12+13. Upload Drive Rápido via fetch + FormData ─────────────── */
  /*
   * Substitui o fluxo iframe→form→window.name por fetch() com FormData.
   * O GAS aceita multipart/form-data e lê os campos normalmente.
   * Benefício: sem iframe, sem messageChannel, sem overhead de DOM.
   * Fallback: se fetch falhar (ex. CORS estrito) cai no iframe original.
   *
   * COMPROVANTE: 1 arquivo por vez — já era assim, mantido e acelerado.
   * JOGOS:       até MAX_FILES_JOGOS (10) em loop sequencial garantido.
   */
  var MAX_FILES_JOGOS = 10;

  async function uploadFetchV226_(action, dados, args, timeoutMs){
    var apiUrl = (typeof CONFIG!=='undefined'&&CONFIG.apiUrl)?CONFIG.apiUrl:'';
    if(!apiUrl) throw new Error('apiUrl não configurada.');

    var fd = new FormData();
    fd.append('action', action);
    fd.append('fn', action);
    fd.append('fnName', action);
    fd.append('mode', 'postmessage');
    fd.append('callback', 'callback');
    fd.append('email', ESTADO.email||'');
    fd.append('payload', JSON.stringify(typeof montarPayloadApi_==='function'
      ? montarPayloadApi_(action,dados||{},args||null)
      : Object.assign({},dados||{},{action:action})));
    fd.append('_', String(Date.now()));
    // Campos diretos
    Object.keys(dados||{}).forEach(function(k){
      if(dados[k]!==undefined && dados[k]!==null && k!=='fileData'){
        fd.append(k, String(dados[k]));
      }
    });
    if(dados&&dados.fileData) fd.append('fileData', dados.fileData);
    if(Array.isArray(args)) fd.append('args', JSON.stringify(args));

    var ctrl = new AbortController();
    var timer = setTimeout(function(){ctrl.abort();}, timeoutMs||180000);

    var resp = await fetch(apiUrl, {method:'POST', body:fd, signal:ctrl.signal});
    clearTimeout(timer);
    var txt = await resp.text();
    // GAS pode retornar JSONP callback(json) ou JSON puro
    var m = txt.match(/^[A-Za-z_$][A-Za-z0-9_$.]*\s*\((.+)\);?\s*$/s);
    var json = JSON.parse(m?m[1]:txt);
    return typeof tratarRespostaApi_==='function'
      ? tratarRespostaApi_(json)
      : (json.dados!==undefined?json.dados:(json.result!==undefined?json.result:json));
  }

  /* Comprovante — 1 arquivo por vez */
  window.apiUploadComprovante_ = apiUploadComprovante_ = async function(base64,file,loteria,metaExtra){
    var dados={fileData:base64,fileName:file.name,mimeType:file.type,email:ESTADO.email,loteria};
    if(metaExtra) Object.assign(dados,metaExtra);
    var args=[base64,file.name,ESTADO.email,loteria];
    try{
      return await uploadFetchV226_('uploadComprovante',dados,args,120000);
    }catch(errFetch){
      /* Fallback: iframe form (comportamento original V182) */
      if(typeof apiPostFormWindowName_==='function'){
        return await apiPostFormWindowName_('uploadComprovante',dados,args,180000);
      }
      throw errFetch;
    }
  };

  /* Jogos realizados — sequencial garantido, até MAX_FILES_JOGOS arquivos */
  window.apiUploadJogoRealizado_ = apiUploadJogoRealizado_ = async function(base64,file,loteria,concurso,dataJogo,obs){
    var dados={fileData:base64,fileName:file.name,mimeType:file.type,email:ESTADO.email,
               loteria:loteria,concurso:concurso||'',dataJogo:dataJogo||'',obs:obs||''};
    var args=[base64,file.name,ESTADO.email,loteria,concurso,dataJogo,obs];
    try{
      return await uploadFetchV226_('uploadJogoRealizadoBolao',dados,args,160000);
    }catch(errFetch){
      if(typeof apiPostFormWindowName_==='function'){
        return await apiPostFormWindowName_('uploadJogoRealizadoBolao',dados,args,240000);
      }
      throw errFetch;
    }
  };

  /* Guarda limite de arquivos acessível globalmente */
  window.PSS_MAX_FILES_JOGOS_V226 = MAX_FILES_JOGOS;

  /* Override do enviarJogoRealizadoBolao para respeitar limite máximo */
  var _envJogosBase = window.enviarJogoRealizadoBolao;
  window.enviarJogoRealizadoBolao = enviarJogoRealizadoBolao = async function(ev){
    if(ev&&typeof ev.preventDefault==='function') ev.preventDefault();
    var input=document.getElementById('arquivoJogoRealizado');
    var files=input&&input.files?Array.from(input.files):[];
    if(files.length>MAX_FILES_JOGOS){
      if(typeof toast==='function') toast('Máximo de '+MAX_FILES_JOGOS+' arquivos por envio. Selecione até '+MAX_FILES_JOGOS+' arquivos.','warn');
      return;
    }
    if(typeof _envJogosBase==='function') return _envJogosBase(ev);
  };

})();
/* FIM PATCH V226 — ULTRAVELOCIDADE */
  </script>

(function(){

  function partesPorFracaoV227_(v){
    var n = parseFloat(String(v||'1').replace(',','.'));
    if(!n || n >= 1) return 1;
    if(Math.abs(n - 0.5) < 0.001) return 2;
    if(Math.abs(n - 0.333333) < 0.02) return 3;
    if(Math.abs(n - 0.25) < 0.001) return 4;
    if(Math.abs(n - 0.2) < 0.001) return 5;
    return Math.max(2, Math.min(5, Math.round(1/n)));
  }

  function nomeSelecionadoTerceiroV227_(){
    return (document.getElementById('nomeParticipanteTerceiroV225')?.value ||
            document.getElementById('emailParticipanteTerceiroV225')?.value || '').trim();
  }

  window.renderCamposPartes = renderCamposPartes = function(){
    var box=document.getElementById('partesBox');
    if(!box)return;
    var tipo=document.getElementById('tipoCota')?.value || 'unica';
    if(tipo!=='dividida'){
      box.innerHTML='';
      return;
    }

    var fracao = document.getElementById('fracaoCotaTerceiroV225')?.value || '';
    var partes = partesPorFracaoV227_(fracao || document.getElementById('qtdPartes')?.value || 2);
    if(fracao === '1') partes = Number(document.getElementById('qtdPartes')?.value || 2);

    box.innerHTML=`
      <div class="v227-ajuda-fracao">
        Para cota fracionada, o sistema abre automaticamente a quantidade correta de participantes.
        O primeiro nome é o pagante do comprovante; os demais ficam marcados como pendentes até enviarem/pagarem no sistema.
      </div>
      <div class="wide-control">
        <label>Em quantas partes a cota foi dividida?</label>
        <select id="qtdPartes" onchange="renderNomesPartes()">
          <option value="2" ${partes===2?'selected':''}>2 partes</option>
          <option value="3" ${partes===3?'selected':''}>3 partes</option>
          <option value="4" ${partes===4?'selected':''}>4 partes</option>
          <option value="5" ${partes===5?'selected':''}>5 partes</option>
        </select>
      </div>
      <div id="nomesPartes"></div>
    `;
    renderNomesPartes();
  };

  window.renderNomesPartes = renderNomesPartes = function(){
    var box=document.getElementById('nomesPartes');
    var qtd=Number(document.getElementById('qtdPartes')?.value||2);
    if(!box)return;
    var nomePagante = nomeSelecionadoTerceiroV227_();
    var h='';
    for(var i=1;i<=qtd;i++){
      var valor = i===1 ? nomePagante : '';
      var classe = i===1 ? 'v227-pagante' : '';

    }

  };

    var tipoEnvio=document.getElementById('tipoEnvioComprovante')?.value || 'meu';
    if(tipoEnvio !== 'terceiro') return;

    var fracao=document.getElementById('fracaoCotaTerceiroV225')?.value || '1';
    var partes=partesPorFracaoV227_(fracao);
    var tipo=document.getElementById('tipoCota');

    if(tipo){
      tipo.value = partes > 1 ? 'dividida' : 'unica';
    }

    renderCamposPartes();

    if(partes > 1){
      var q=document.getElementById('qtdPartes');
      if(q){
        q.value=String(partes);
        renderNomesPartes();
      }
    }
  };

  async function uploadFetchV227_(action,dados,args,timeoutMs){
    var fd=new FormData();
    fd.append('mode','postmessage');
    fd.append('action',action);
    fd.append('fn',action);
    fd.append('fnName',action);
    fd.append('callback','callback');
    fd.append('email',ESTADO.email||dados.email||'');
    fd.append('payload',JSON.stringify(typeof montarPayloadApi_==='function'
      ? montarPayloadApi_(action,dados||{},args||null)
      : Object.assign({},dados||{action:action,args:args||null})));
    fd.append('_',String(Date.now()));
    Object.keys(dados||{}).forEach(function(k){
      if(dados[k]!==undefined && dados[k]!==null && k!=='fileData'){
        fd.append(k, typeof dados[k]==='object' ? JSON.stringify(dados[k]) : String(dados[k]));
      }
    });
    if(dados&&dados.fileData) fd.append('fileData', dados.fileData);
    if(Array.isArray(args)) fd.append('args', JSON.stringify(args));

    var ctrl=new AbortController();
    var timer=setTimeout(function(){ctrl.abort();}, timeoutMs||150000);
    var resp=await fetch(CONFIG.apiUrl,{method:'POST',body:fd,signal:ctrl.signal});
    clearTimeout(timer);
    var txt=await resp.text();
    var m=txt.match(/^[A-Za-z_$][A-Za-z0-9_$.]*\s*\((.+)\);?\s*$/s);
    var json=JSON.parse(m?m[1]:txt);
    return typeof tratarRespostaApi_==='function'
      ? tratarRespostaApi_(json)
      : (json.dados!==undefined?json.dados:(json.result!==undefined?json.result:json));
  }

  window.apiUploadComprovante_ = apiUploadComprovante_ = async function(base64,file,loteria,meta){
    meta = meta || {};
    var terceiro = meta.tipoEnvio === 'TERCEIRO';
    var emailEnvio = terceiro ? (ESTADO.email || '') : (ESTADO.email || meta.emailParticipante || '');
    var action = terceiro ? 'uploadComprovanteTerceiroAdmin' : 'uploadComprovante';
    var dados = {
      fileData: base64,
      fileName: file.name,
      mimeType: file.type,
      email: emailEnvio,
      loteria: loteria,
      meta: meta,
      tipoEnvio: meta.tipoEnvio || 'PROPRIO',
      emailParticipante: meta.emailParticipante || '',
      nomeParticipante: meta.nomeParticipante || '',
      fracaoCota: meta.fracaoCota || '',
      tipoCota: meta.tipoCota || '',
      qtdPartes: meta.qtdPartes || '',
      nomesPartes: meta.nomesPartes || [],
      obsAdmin: meta.obsAdmin || ''
    };
    var args=[base64,file.name,emailEnvio,loteria,meta];

    try{
      return await uploadFetchV227_(action,dados,args,150000);
    }catch(errFetch){
      if(typeof apiPostFormWindowName_ === 'function'){
        return await apiPostFormWindowName_(action,dados,args,180000);
      }
      throw errFetch;
    }
  };

  };

})();

(function(){

  function jogosLoteriasCacheV232_(){
    try{
      if(Array.isArray(ESTADO.boloes) && ESTADO.boloes.length) return ESTADO.boloes;
      const chave = ESTADO.email ? 'boloes_'+normalizar(ESTADO.email).replace(/[^A-Z0-9]+/g,'_') : 'boloes_publicos';

  window.renderJogosRealizados = renderJogosRealizados = async function(){
    setView(`
      <div class="panel">
        <h2>🎟️ Jogos realizados do bolão</h2>
        <p>Escolha a loteria e clique em <strong>Ver</strong>. A lista de arquivos só será carregada depois do clique, para não travar o celular.</p>

    try{
      let lista = jogosLoteriasCacheV232_();
      if(!lista.length) lista = await carregarBoloes(true);

      const ativos = (lista || []).filter(b => b && b.loteria && !isHistorico(b));
      const box = document.getElementById('jogosListaV232');
      if(!box) return;

      if(!ativos.length){
        box.innerHTML = `
          <div class="notice warn">Nenhum bolão ativo localizado para exibir jogos.</div>
          <div class="v232-actions">
            <button class="btn" onclick="renderJogosRealizados()">Atualizar</button>
          </div>
        `;
        return;
      }

      box.innerHTML = `
        <div class="v232-jogos-lista">
          ${ativos.map(b=>`
            <div class="v232-jogos-row">
              <div>
                <b>${escapeHtml(b.loteria)}</b>
                <small>${escapeHtml((b.status||'ATIVO'))}${b.dataSorteio?' • Sorteio: '+escapeHtml(b.dataSorteio):''}</small>

              <button type="button" class="v232-link-ver" onclick="abrirPaginaJogosRealizadosV232('${escapeAttr(encodeURIComponent(b.loteria))}')">Ver</button>
            </div>
          `).join('')}
        </div>
      `;
    }catch(err){
      const box = document.getElementById('jogosListaV232');
      if(box){
        box.innerHTML = `
          <div class="notice error">${escapeHtml(err.message || err)}</div>
          <div class="v232-actions"><button class="btn" onclick="renderJogosRealizados()">Tentar novamente</button></div>
        `;
      }

  window.abrirPaginaJogosRealizadosV232 = async function(loteriaCod){
    const loteria = decodeURIComponent(loteriaCod || '');
    ESTADO.bolaoSelecionado = loteria;
    localStorage.setItem('PSS_BOLAO_SELECIONADO', loteria);

    setView(`
      <div class="panel">
        <div class="v232-actions">
          <button class="btn btn-light" onclick="renderJogosRealizados()">← Voltar</button>
          <button class="btn" onclick="carregarJogosRealizadosBolaoV232('${escapeAttr(encodeURIComponent(loteria))}',true)">Atualizar jogos</button>
        </div>
        <h2>🎟️ Jogos realizados — ${escapeHtml(loteria)}</h2>
        <p>Todos os arquivos enviados para este bolão aparecem abaixo em formato de link.</p>

        ${isAdmin()?renderUploadJogosV232_(loteria):''}

        <div id="jogosDetalheV232">
          <div class="notice info">Carregando jogos enviados...</div>
        </div>
      </div>
    `);

    carregarJogosRealizadosBolaoV232(encodeURIComponent(loteria),false);
  };

  function renderUploadJogosV232_(loteria){
    return `
      <div class="v232-upload-box">
        <h3>⚡ Super envio dos jogos</h3>
        <div class="v232-super-note">
          Envio otimizado: vários arquivos são enviados em um único processamento, reduzindo chamadas externas.
        </div>
        <form onsubmit="enviarJogoRealizadoBolaoV232(event)">
          <input type="hidden" id="jogosBolaoV232" value="${escapeAttr(loteria)}">
          <div class="v232-upload-meta">
            <div class="field">
              <label>Concurso / Identificação</label>
              <input id="jogoConcurso" placeholder="Ex.: Concurso 1234 ou Jogo 01">
            </div>
            <div class="field">
              <label>Data do jogo/aposta</label>
              <input id="jogoData" type="date">
            </div>
          </div>
          <div class="field">
            <label>Observação</label>
            <input id="jogoObs" placeholder="Opcional: descrição do jogo, volante, observação interna">
          </div>

            <label>Arquivos dos jogos</label>
            <input id="arquivoJogoRealizado" type="file" accept="image/*,.pdf,application/pdf" multiple required>

              <span id="jogoUploadPercentual">0%</span>
            </div>

              <div class="upload-progress-fill" id="jogoUploadFill"></div>
            </div>

          </div>

  window.carregarJogosRealizadosBolaoV232 = async function(loteriaCod,forcar){
    const loteria = decodeURIComponent(loteriaCod || '');
    const box = document.getElementById('jogosDetalheV232') || document.getElementById('jogosRealizadosConteudo');
    if(!box) return;

    const cacheNome = cacheKeyLoteria_('jogos',loteria);
    const cached = !forcar ? cacheGet_(cacheNome,true) : null;

    if(cached){
      box.innerHTML = renderListaJogosRealizadosV232(extrairListaGenericaJogos_(cached),loteria) + `<div class="cache-hint ok">Lista exibida por cache. Atualizando em segundo plano...</div>`;
    }else{
      box.innerHTML = '<div class="notice info"><span class="loading-fast">Carregando jogos enviados...</span></div>';
    }

    try{
      const r = await carregarJogosCache_(loteria,true,(novo)=>{
        const b = document.getElementById('jogosDetalheV232') || document.getElementById('jogosRealizadosConteudo');
        if(b) b.innerHTML = renderListaJogosRealizadosV232(extrairListaGenericaJogos_(novo),loteria);

      box.innerHTML = renderListaJogosRealizadosV232(extrairListaGenericaJogos_(r),loteria);

      if(!cached){

      }
    }
  };

  window.renderListaJogosRealizados = renderListaJogosRealizadosV232;

    if(!Array.isArray(lista)||!lista.length){
      return `<div class="notice warn">Nenhum jogo realizado localizado para ${escapeHtml(loteria||'este bolão')}.</div>`;
    }

    return `

            const nome=j.nome||j.NOME||j.titulo||j.TITULO||j.concurso||j.CONCURSO||j.fileName||j.filename||j.nomeArquivo||`Jogo ${i+1}`;

              </tr>

          }).join('')}
        </tbody>
      </table>
    `;
  }

  async function apiUploadJogosLoteV232_(arquivos,loteria,concurso,dataJogo,obs){
    const dados = {email:ESTADO.email,loteria,arquivos,concurso,dataJogo,obs};
    const args = [arquivos,ESTADO.email,loteria,concurso,dataJogo,obs];
    return await apiPostFormWindowName_('uploadJogosRealizadosLoteBolao',dados,args,240000);
  }

  window.enviarJogoRealizadoBolaoV232 = async function(ev){
    ev.preventDefault();

    const loteria = document.getElementById('jogosBolaoV232')?.value || document.getElementById('jogosBolao')?.value || ESTADO.bolaoSelecionado || '';
    const input = document.getElementById('arquivoJogoRealizado');
    const btn = document.getElementById('btnEnviarJogoRealizado');
    const files = input && input.files ? Array.from(input.files) : [];
    const concurso = document.getElementById('jogoConcurso')?.value.trim() || '';
    const dataJogoInput = document.getElementById('jogoData')?.value || '';
    const dataJogo = dataJogoInput ? dataInputValorParaBR_(dataJogoInput) : '';
    const obs = document.getElementById('jogoObs')?.value.trim() || '';

    if(!loteria) return toast('Selecione a loteria/bolão.','error');
    if(!files.length) return toast('Selecione ao menos um arquivo dos jogos.','error');

    btn.disabled=true;
    btn.textContent='Enviando...';
    atualizarProgressoUploadJogos_(0.05,1,'Preparando super envio',`${files.length} arquivo(s) selecionado(s).`,'run');

    try{
      const arquivos = [];
      for(let i=0;i<files.length;i++){
        const file = files[i];
        atualizarProgressoUploadJogos_((i/files.length)*0.45,1,`Lendo ${i+1}/${files.length}`,file.name,'run');
        await aguardarFrame_();
        const fileData = await lerArquivoBase64(file);
        arquivos.push({fileData,fileName:file.name,mimeType:file.type,size:file.size});
      }

      atualizarProgressoUploadJogos_(0.55,1,'Enviando lote',`Enviando ${files.length} arquivo(s) em processamento único.`,'run');
      await aguardarFrame_();

      let r;
      try{
        r = await apiUploadJogosLoteV232_(arquivos,loteria,concurso,dataJogo,obs);
      }catch(errLote){
        atualizarProgressoUploadJogos_(0.62,1,'Lote falhou, usando envio seguro',errLote.message,'run');
        for(let i=0;i<files.length;i++){
          await apiUploadJogoRealizado_(arquivos[i].fileData,files[i],loteria,concurso,dataJogo,obs);
        }
        r = {sucesso:true,total:files.length,msg:'Arquivos enviados pelo modo seguro.'};
      }

      atualizarProgressoUploadJogos_(1,1,'Envio concluído',`${r.total||files.length} arquivo(s) enviado(s).`,'ok');
      toast((r&&r.msg)||'Jogos realizados enviados com sucesso.');
      cacheDel_(cacheKeyLoteria_('jogos',loteria));
      input.value='';
      setTimeout(()=>carregarJogosRealizadosBolaoV232(encodeURIComponent(loteria),true),650);
    }catch(err){
      atualizarProgressoUploadJogos_(0,1,'Falha no envio',err.message,'error');
      toast(err.message,'error');
    }finally{
      btn.disabled=false;
      btn.textContent='Enviar jogos realizados';
    }
  };

  window.enviarJogoRealizadoBolao = window.enviarJogoRealizadoBolaoV232;
})();
  </script>

(function(){

  function cacheConfigBoloesV233_(){
    return 'PSS_CONFIG_BOLOES_RAPIDO_V233_' + (ESTADO.email || 'admin').toLowerCase();

    let lista = Array.isArray(dados) ? dados : (dados && (dados.boloes || dados.lista || dados.ativas || dados.dados)) || [];

      loteria: b.loteria || b.LOTERIA || b.nome || b.NOME || '',
      status: b.status || b.STATUS || 'ATIVO',

      inicioPagamento: b.inicioPagamento || b.INICIO_PAGAMENTO || b.iniBol || b.INI_BOL || '',

  async function carregarConfigBoloesRapidoV233_(forcar){
    const key = cacheConfigBoloesV233_();

    if(!forcar){
      try{
        const cache = JSON.parse(localStorage.getItem(key) || 'null');
        if(cache && Date.now() - Number(cache.ts || 0) < 2 * 60 * 1000){
          return {origem:'cache local', lista:normalizarListaConfigV233_(cache.lista)};
        }
      }catch(e){}

      try{
        const listaMemoria = normalizarListaConfigV233_(ESTADO.boloes || []);

    const lista = normalizarListaConfigV233_(dados);

      localStorage.setItem(key, JSON.stringify({ts:Date.now(), lista}));

      cacheSet_('boloes_'+normalizar(ESTADO.email||'').replace(/[^A-Z0-9]+/g,'_'), lista, CACHE_TTL.curto || 60000);

  function postFormDiretoV242_(form, action, fields, fileInput, timeoutMs){
    fields=fields||{};
    timeoutMs=timeoutMs||180000;
    return new Promise(function(resolve,reject){
      if(!form) return reject(new Error('Formulário de envio não localizado.'));

      var token='PSSPOST_V242_'+Date.now()+'_'+Math.floor(Math.random()*1e9);

      var criados=[];
      var finalizado=false;
      var timer=null;

      function limpar(){

        if(old.action===null)form.removeAttribute('action');else form.setAttribute('action',old.action);

        try{resolve(typeof tratarRespostaApi_==='function'?tratarRespostaApi_(resp):resp);}catch(e){reject(e);}

        }
        if(msg && msg.pssBoloesApi===true && msg.token===token){
          ok(msg.response);
        }
      }

        if(finalizado)return;
        try{
          var raw=iframe.contentWindow && iframe.contentWindow.name ? iframe.contentWindow.name : '';
          if(raw){
            var msg=JSON.parse(raw);
            if(msg && msg.pssBoloesApi===true && msg.token===token){ok(msg.response);return;}
          }
        }catch(e){}
        setTimeout(tentarName,500);
      }

      document.body.appendChild(iframe);
      window.addEventListener('message',onMessage);

      form.method='POST';
      form.action=CONFIG.apiUrl;
      form.target=iframe.name;
      form.enctype='multipart/form-data';
      form.acceptCharset='UTF-8';
      fileInput.name='arquivoUpload';

      var payload=Object.assign({},fields,{action:action,fn:action,fnName:action,email:fields.email||ESTADO.email||''});
      addHiddenV242_(form,'mode','postmessage',criados);

      addHiddenV242_(form,'_',Date.now(),criados);
      Object.keys(fields).forEach(function(k){addHiddenV242_(form,k,fields[k],criados);});

      iframe.onload=function(){setTimeout(tentarName,100);};
      iframe.onerror=function(){erro(new Error('Falha ao abrir canal de envio.'));};
      timer=setTimeout(function(){erro(new Error('Tempo limite ao gravar arquivo no Drive. Verifique se o arquivo foi registrado antes de reenviar.'));},timeoutMs);

      try{

  function lerArquivoBase64V243_(file){
    return new Promise(function(resolve,reject){
      var reader = new FileReader();
      reader.onload = function(){ resolve(reader.result); };
      reader.onerror = function(error){ reject(error); };
      reader.readAsDataURL(file);
    });
  }

  function uploadIdV243_(){
    return 'UP243_' + Date.now() + '_' + Math.floor(Math.random() * 1000000);
  }

  function apiChunkV243_(action, dados, timeoutMs){
    if(typeof apiJsonpDireto_ === 'function'){
      return apiJsonpDireto_(action, dados || {}, null, timeoutMs || 22000);
    }
    return api(action, dados || {}, null);
  }

  async function enviarArquivoEmPedacosV243_(file, tipo, contexto, onProgress){
    contexto = contexto || {};
    var base64Completo = await lerArquivoBase64V243_(file);
    var uploadId = uploadIdV243_();
    var totalCaracteres = base64Completo.length;
    var totalBlocos = Math.ceil(totalCaracteres / PSS_CHUNK_SIZE_V243);

    if(onProgress) onProgress(2, 'Preparando arquivo', 'Arquivo será enviado em ' + totalBlocos + ' partes.');

    for(var i = 0; i < totalBlocos; i++){
      var inicio = i * PSS_CHUNK_SIZE_V243;
      var fim = Math.min(inicio + PSS_CHUNK_SIZE_V243, totalCaracteres);
      var pedaco = base64Completo.substring(inicio, fim);

      await apiChunkV243_('uploadChunkArquivoV243', {
        uploadId: uploadId,
        index: i,
        indice: i,
        total: totalBlocos,
        chunk: pedaco,
        tipo: tipo,
        fileName: file.name,
        mimeType: file.type || '',
        loteria: contexto.loteria || '',
        email: contexto.email || ESTADO.email || ''
      }, 22000);

      if(onProgress){
        var pct = Math.max(4, Math.min(92, Math.round(((i + 1) / totalBlocos) * 86)));
        onProgress(pct, 'Enviando arquivo', 'Parte ' + (i + 1) + ' de ' + totalBlocos + ' confirmada.');
      }

      if(typeof aguardarFrame_ === 'function') await aguardarFrame_();
    }

    if(onProgress) onProgress(94, 'Finalizando gravação', 'Juntando partes e gravando no Drive.');

    var final = await apiChunkV243_('finalizarUploadArquivoV243', {
      uploadId: uploadId,
      tipo: tipo,
      fileName: file.name,
      mimeType: file.type || '',
      loteria: contexto.loteria || '',
      email: contexto.email || ESTADO.email || '',
      meta: contexto.meta || {}
    }, 90000);

    if(onProgress) onProgress(100, 'Arquivo gravado', (final && final.msg) || 'Arquivo gravado no Drive.');
    return final;
  }

  function coletaMetaComprovanteV243_(){
    var tipoEnvio = document.getElementById('tipoEnvioComprovante')?.value || 'meu';
    var meta = {
      tipoEnvio: tipoEnvio === 'terceiro' ? 'TERCEIRO' : 'PROPRIO',

    if(meta.tipoCota === 'dividida'){
      document.querySelectorAll('#nomesPartes input').forEach(function(inp){ meta.nomesPartes.push(inp.value || ''); });
    }

    if(tipoEnvio === 'terceiro'){
      meta.emailParticipante = (document.getElementById('emailParticipanteTerceiroV225')?.value || '').trim();
      meta.nomeParticipante = (document.getElementById('nomeParticipanteTerceiroV225')?.value || '').trim();
      meta.fracaoCota = document.getElementById('fracaoCotaTerceiroV225')?.value || document.getElementById('fracaoComprovanteTerceiroV225')?.value || '1';
      meta.obsAdmin = document.getElementById('obsComprovanteTerceiroV225')?.value || '';
    }else{
      meta.emailParticipante = ESTADO.email || '';
    }

    return meta;
  }

  window.enviarComprovante = enviarComprovante = async function(ev){
    ev.preventDefault();

    var loteria = document.getElementById('uploadBolao')?.value || '';
    var input = document.getElementById('arquivoComprovante');
    var file = input && input.files ? input.files[0] : null;
    var btn = document.getElementById('btnEnviarComprovante');

    if(!loteria) return toast('Selecione a loteria do depósito.','error');
    if(!file) return toast('Selecione o arquivo do comprovante.','error');

      if(!isAdmin()) return toast('Apenas administrador pode enviar comprovante de terceiro.','error');
      if(!meta.emailParticipante) return toast('Selecione o participante vinculado ao comprovante.','error');
    }

    if(btn){ btn.disabled = true; btn.textContent = 'Enviando...'; }

    function progresso(pct,titulo,msg,st){
      atualizarProgressoUploadComprovante_(pct, titulo, msg, st || 'run');
    }

    progresso(1, 'Preparando envio', 'Arquivo será enviado em partes pequenas e depois gravado no Drive.', 'run');

    try{
      var r = await enviarArquivoEmPedacosV243_(file, 'COMPROVANTE', {
        loteria: loteria,
        email: meta.emailParticipante || ESTADO.email || '',
        meta: meta
      }, progresso);

      progresso(100, 'Comprovante gravado', (r && r.msg) || 'Comprovante gravado no Drive. OCR pendente.', 'ok');
      toast((r && r.msg) || 'Comprovante gravado no Drive. A conferência será feita em seguida.');

      var h3 = Array.from(document.querySelectorAll('h3')).find(function(x){ return /Meus Envios Recentes/i.test(x.textContent || ''); });

    }finally{
      if(btn){ btn.disabled = false; btn.textContent = 'Enviar agora'; }

  };

  window.enviarJogoRealizadoBolao = window.enviarJogoRealizadoBolaoV232 = async function(ev){
    ev.preventDefault();

    var sel = document.getElementById('jogosBolao');
    var input = document.getElementById('arquivoJogoRealizado');
    var btn = document.getElementById('btnEnviarJogoRealizado');

    var files = input && input.files ? Array.from(input.files) : [];
    var concurso = document.getElementById('jogoConcurso') ? document.getElementById('jogoConcurso').value.trim() : '';
    var dataJogoInput = document.getElementById('jogoData') ? document.getElementById('jogoData').value : '';
    var dataJogo = dataJogoInput ? dataInputValorParaBR_(dataJogoInput) : '';
    var obs = document.getElementById('jogoObs') ? document.getElementById('jogoObs').value.trim() : '';

    if(!loteria) return toast('Selecione a loteria/bolão.','error');
    if(!files.length) return toast('Selecione ao menos um arquivo dos jogos.','error');

    ESTADO.bolaoSelecionado = loteria;
    localStorage.setItem('PSS_BOLAO_SELECIONADO', loteria);

    if(btn){ btn.disabled = true; btn.textContent = 'Enviando...'; }

    function progresso(pct,titulo,msg,st){
      var decimal = Math.max(0, Math.min(1, Number(pct || 0) / 100));
      atualizarProgressoUploadJogos_(decimal, 1, titulo, msg, st || 'run');
    }

    progresso(1, 'Preparando envio', files.length + ' arquivo(s) serão enviados em partes.', 'run');

    var enviados = [];
    try{
      for(var f = 0; f < files.length; f++){
        var file = files[f];
        var baseOffset = Math.round((f / files.length) * 100);
        var peso = 100 / files.length;

        var r = await enviarArquivoEmPedacosV243_(file, 'JOGO', {
          loteria: loteria,
          email: ESTADO.email || '',
          meta: {
            adminEmail: ESTADO.email || '',
            concurso: concurso,
            dataJogo: dataJogo,
            obs: obs
          }
        }, function(pct,titulo,msg,st){
          var geral = Math.min(99, Math.round(baseOffset + ((pct / 100) * peso)));
          progresso(geral, 'Arquivo ' + (f + 1) + '/' + files.length + ' — ' + titulo, msg, st);
        });

        enviados.push(r);
      }

      progresso(100, 'Jogos gravados', enviados.length + ' arquivo(s) gravado(s) no Drive.', 'ok');
      toast(enviados.length + ' arquivo(s) de jogos gravado(s) no Drive.');
      input.value = '';
      cacheDel_(cacheKeyLoteria_('jogos', loteria));

      var box = document.getElementById('jogosRealizadosConteudo');
      if(box){
        box.insertAdjacentHTML('afterbegin','<div class="notice ok">Jogos recebidos e gravados no Drive. Clique em Carregar jogos para atualizar a lista.</div>');
      }
    }catch(err){
      progresso(0, 'Falha no envio', err.message || 'Falha ao enviar/gravar jogos.', 'error');
      toast(err.message || 'Falha ao enviar/gravar jogos.','error');
    }finally{
      if(btn){ btn.disabled = false; btn.textContent = 'Enviar jogos realizados'; }
    }
  };

})();
  </script>

})();

(function(){
  window.formatarPartesPagamento_ = formatarPartesPagamento_ = function(v){
    if(v===undefined||v===null||String(v).trim()==='')return '-';
    const raw=String(v).trim();
    if(!raw)return '-';
    if(raw.includes('/'))return raw;
    if(/[A-Za-zÀ-ÿ]/.test(raw) && !/^integral$/i.test(raw))return raw;
    if(/^integral$/i.test(raw))return '1/1';
    const n=num(raw);
    if(!n)return raw;
    if(Math.abs(n-1)<0.0001)return '1/1';
    if(n>0&&n<1){
      const partes=Math.round(1/n);
      return partes>1?'1/'+partes:String(n).replace('.',',');
    }
    return '1/'+n;
  };
})();
</script>

<script>
/* =====================================================================
 * PATCH V260 — RESTAURA CACHE PÚBLICO DA HOME / LETREIRO
 * - Não apaga cache da página pública.
 * - Mantém último letreiro válido mesmo se a API oscilar.
 * - Atualiza em segundo plano sem deixar a home vazia.
 * ===================================================================== */
(function(){
  'use strict';
  if(window.PSS_V260_CACHE_PUBLICO_HOME_APLICADO) return;
  window.PSS_V260_CACHE_PUBLICO_HOME_APLICADO = true;

  var KEYS_RESULTADOS_V260 = [
    'PSS_RESULTADOS_PUBLICOS_PERMANENTE_V260',
    'PSS_RESULTADOS_PUBLICOS_V237',
    'PSS_RESULTADOS_PUBLICOS_V213',
    'PSS_HOME_ULTRA_V237',
    'PSS_HOME_SNAPSHOT_V224',
    'PSS_HOME_PUBLICA_SNAPSHOT_V224'
  ];

  function v260TemResultado_(dados){
    var d = v260ExtrairResultados_(dados);
    return !!(d && (String(d.letreiroTexto||'').trim() || (Array.isArray(d.resultados) && d.resultados.length)));
  }

  function v260ExtrairResultados_(raw){
    var d = raw || {};
    if(d.dados !== undefined) d = d.dados;
    if(d.result !== undefined) d = d.result;
    if(d.resultadosPublicos) d = d.resultadosPublicos;
    if(d.resultados_publicos) d = d.resultados_publicos;
    if(d.ultimosResultados && !d.resultados) d.resultados = d.ultimosResultados;
    return d || {};
  }

  function v260LerObjeto_(key){
    try{
      var o = JSON.parse(localStorage.getItem(key) || 'null');
      if(!o) return null;
      if(o.dados !== undefined) return o.dados;
      return o;
    }catch(e){ return null; }
  }

  function v260LerResultadosCache_(){
    for(var i=0;i<KEYS_RESULTADOS_V260.length;i++){
      var raw = v260LerObjeto_(KEYS_RESULTADOS_V260[i]);
      var d = v260ExtrairResultados_(raw);
      if(v260TemResultado_(d)) return d;
    }
    return null;
  }

  function v260SalvarResultadosCache_(dados){
    var d = v260ExtrairResultados_(dados);
    if(!v260TemResultado_(d)) return;
    try{
      var payload = {
        ts: Date.now(),
        dados: {
          sucesso: d.sucesso !== false,
          atualizadoEm: d.atualizadoEm || d.dataHora || (typeof dataHoraAtualCurta === 'function' ? dataHoraAtualCurta() : ''),
          titulo: d.titulo || 'Últimos resultados',
          letreiroTexto: d.letreiroTexto || d.letreiroResultadosTexto || '',
          resultados: Array.isArray(d.resultados) ? d.resultados : []
        }
      };
      localStorage.setItem('PSS_RESULTADOS_PUBLICOS_PERMANENTE_V260', JSON.stringify(payload));
      localStorage.setItem('PSS_RESULTADOS_PUBLICOS_V237', JSON.stringify(payload));
      localStorage.setItem('PSS_RESULTADOS_PUBLICOS_V213', JSON.stringify(payload));
    }catch(e){}
  }

  var renderBase = window.renderLetreiroResultadosPublicosV213;
  if(typeof renderBase === 'function'){
    window.renderLetreiroResultadosPublicosV213 = function(dados){
      var d = v260ExtrairResultados_(dados);
      if(v260TemResultado_(d)){
        v260SalvarResultadosCache_(d);
        return renderBase.call(this, d);
      }
      var cached = v260LerResultadosCache_();
      if(cached){
        return renderBase.call(this, cached);
      }
      return renderBase.apply(this, arguments);
    };
  }

  var carregarBase = window.carregarLetreiroResultadosPublicosV213;
  if(typeof carregarBase === 'function'){
    window.carregarLetreiroResultadosPublicosV213 = async function(forcar){
      var cached = v260LerResultadosCache_();
      if(cached && typeof window.renderLetreiroResultadosPublicosV213 === 'function'){
        try{ window.renderLetreiroResultadosPublicosV213(cached); }catch(e){}
      }
      try{
        await carregarBase.apply(this, arguments);
        var atual = v260ExtrairResultados_(window.PSS_RESULTADOS_PUBLICOS_V213 || {});
        if(v260TemResultado_(atual)){
          v260SalvarResultadosCache_(atual);
        }else if(cached && typeof window.renderLetreiroResultadosPublicosV213 === 'function'){
          window.renderLetreiroResultadosPublicosV213(cached);
        }
      }catch(err){
        if(cached && typeof window.renderLetreiroResultadosPublicosV213 === 'function'){
          window.renderLetreiroResultadosPublicosV213(cached);
          return;
        }
        throw err;
      }
    };
  }

  /* Renderiza cache imediatamente após a home montar, sem esperar API. */
  document.addEventListener('DOMContentLoaded', function(){
    setTimeout(function(){
      var cached = v260LerResultadosCache_();
      if(cached && typeof window.renderLetreiroResultadosPublicosV213 === 'function'){
        try{ window.renderLetreiroResultadosPublicosV213(cached); }catch(e){}
      }
    }, 250);
  });
})();

<script>
/* =====================================================================
 * PATCH V261 — CACHE PERMANENTE DO SNAPSHOT DA HOME PÚBLICA
 * Objetivo:
 * - Persiste o snapshot completo da home (bolões + resultados) no
 *   localStorage do browser, assim como V260 já faz para o letreiro.
 * - Na próxima visita/reload, renderiza os bolões da home instantaneamente
 *   sem esperar a API, e atualiza em segundo plano.
 * - Nunca apaga o cache ao recarregar — apenas substitui quando a API
 *   retornar dados válidos mais recentes.
 * ===================================================================== */
(function(){
  'use strict';
  if(window.PSS_V261_CACHE_HOME_SNAP_APLICADO) return;
  window.PSS_V261_CACHE_HOME_SNAP_APLICADO = true;

  var KEY_SNAP = 'PSS_HOME_PUBLICA_SNAPSHOT_PERMANENTE_V261';
  var KEY_SNAP_V224 = 'PSS_HOME_PUBLICA_SNAPSHOT_V224';
  // V261: máximo 24h para considerar o snapshot do browser válido para exibição imediata
  var MAX_AGE_MS = 24 * 60 * 60 * 1000;

  /* ------- utilitários de leitura/escrita do localStorage ------- */
  function v261SnapValido_(snap) {
    return !!(snap && snap.sucesso !== false && Array.isArray(snap.boloes) && snap.boloes.length > 0);
  }

  function v261LerSnap_() {
    var keys = [KEY_SNAP, KEY_SNAP_V224];
    for (var i = 0; i < keys.length; i++) {
      try {
        var raw = localStorage.getItem(keys[i]);
        if (!raw) continue;
        var obj = JSON.parse(raw);
        var snap = (obj && obj.dados !== undefined) ? obj.dados : obj;
        if (!v261SnapValido_(snap)) continue;
        // Verifica idade do snapshot no browser
        var ts = obj && obj.ts ? Number(obj.ts) : 0;
        if (ts && (Date.now() - ts) > MAX_AGE_MS) continue;
        return snap;
      } catch(e) {}
    }
    return null;
  }

  function v261SalvarSnap_(snap) {
    if (!v261SnapValido_(snap)) return;
    var payload = JSON.stringify({ ts: Date.now(), dados: snap });
    try { localStorage.setItem(KEY_SNAP, payload); } catch(e) {}
    try { localStorage.setItem(KEY_SNAP_V224, payload); } catch(e) {}
  }

  /* ------- hook na função que carrega/renderiza a home pública ------- */
  /* Intercepta getHomePublicaRapidaV224 ou carregarHomePublica para:
     1) Renderizar o snap do browser imediatamente (zero espera)
     2) Após resposta da API, atualizar o snap no browser */

  function v261HookCarregarHome_(fnOriginal) {
    return async function() {
      // Pré-renderiza com snapshot local antes de chamar a API
      var snapLocal = v261LerSnap_();
      if (snapLocal) {
        try {
          if (typeof window.renderHomePublicaV224 === 'function') {
            window.renderHomePublicaV224(snapLocal);
          } else if (typeof window.renderInicio === 'function' && !window._pss261_renderInicio_renderizando) {
            // não força render do inicio aqui para não causar loop
          }
        } catch(eRender) {}
      }
      // Chama a função original
      var resultado;
      try {
        resultado = await fnOriginal.apply(this, arguments);
      } catch(err) {
        // Se falhar e tiver snap local, mantém o que foi renderizado
        if (!snapLocal) throw err;
        return snapLocal;
      }
      // Salva o snapshot mais recente da API no browser
      if (resultado && v261SnapValido_(resultado)) {
        v261SalvarSnap_(resultado);
      }
      return resultado;
    };
  }

  /* Hook na função de renderização da home para salvar snap após render */
  var renderHomeBase = window.renderHomePublicaV224;
  if (typeof renderHomeBase === 'function') {
    window.renderHomePublicaV224 = function(snap) {
      var r = renderHomeBase.apply(this, arguments);
      if (snap && v261SnapValido_(snap)) v261SalvarSnap_(snap);
      return r;
    };
  }

  /* Hook em carregarHomePublicaRapida e variantes */
  var nomesFns = [
    'carregarHomePublicaRapidaV224',
    'carregarHomePublica',
    'carregarSnapshotHomePublicaV224',
    'carregarHomeUltraV237'
  ];
  nomesFns.forEach(function(nome) {
    if (typeof window[nome] === 'function') {
      window[nome] = v261HookCarregarHome_(window[nome]);
    }
  });

  /* Hook em window.PSS_HOME_ULTRA_V237 / PSS_HOME_SNAPSHOT_V224 — variáveis globais usadas
     em alguns patches anteriores para armazenar o resultado bruto da API */
  var _pssHomeUltraProxy = {};
  ['PSS_HOME_ULTRA_V237', 'PSS_HOME_SNAPSHOT_V224'].forEach(function(globalKey) {
    Object.defineProperty(window, globalKey, {
      configurable: true,
      get: function() { return _pssHomeUltraProxy[globalKey]; },
      set: function(val) {
        _pssHomeUltraProxy[globalKey] = val;
        // Extrai snap do envelope padrão da API
        var snap = val;
        if (snap && snap.dados !== undefined) snap = snap.dados;
        if (snap && snap.result !== undefined) snap = snap.result;
        if (v261SnapValido_(snap)) v261SalvarSnap_(snap);
      }
    });
  });

  /* Pré-renderiza snapshot local logo após DOMContentLoaded (antes da API responder) */
  document.addEventListener('DOMContentLoaded', function() {
    setTimeout(function() {
      var snap = v261LerSnap_();
      if (!snap) return;
      // Só pré-renderiza se a home pública estiver visível (não logado)
      var app = document.getElementById('app') || document.getElementById('view');
      if (!app) return;
      if (typeof window.renderHomePublicaV224 === 'function') {
        try { window.renderHomePublicaV224(snap); } catch(e) {}
      }
    }, 60);
  });

  try { localStorage.setItem('PSS_INDEX_VERSION', 'V261_ULTRA_CACHE_PERMANENTE_HOME'); } catch(e) {}
})();
</script>
