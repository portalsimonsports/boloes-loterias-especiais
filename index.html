<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bolões de Loterias Especiais | Portal SimonSports</title>

  <style>
    :root {
      --bg: #071526;
      --bg-2: #0d2037;
      --card: #ffffff;
      --soft: #f4f7fb;
      --text: #142033;
      --muted: #64748b;
      --primary: #0f8f5f;
      --primary-2: #0b6f4a;
      --danger: #b91c1c;
      --warning: #b7791f;
      --line: #dbe4ef;
      --shadow: 0 12px 30px rgba(0,0,0,.16);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(160deg, var(--bg), #0d2f4e 55%, #082033);
      color: var(--text);
      min-height: 100vh;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(7, 21, 38, .94);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,.08);
      color: #fff;
    }

    .topbar-inner {
      max-width: 1180px;
      margin: 0 auto;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .brand strong {
      font-size: 17px;
      letter-spacing: .2px;
    }

    .brand small {
      color: #b8c7d9;
      font-size: 12px;
    }

    .menu {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .menu button,
    .btn {
      border: 0;
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 700;
      background: rgba(255,255,255,.11);
      color: #fff;
      transition: .2s ease;
    }

    .menu button:hover,
    .btn:hover {
      transform: translateY(-1px);
      background: rgba(255,255,255,.18);
    }

    .menu button.active {
      background: var(--primary);
      color: #fff;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--primary-2);
    }

    .btn-light {
      background: #e8f2ee;
      color: var(--primary-2);
    }

    .btn-danger {
      background: var(--danger);
      color: #fff;
    }

    .wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 28px 18px 60px;
    }

    .hero {
      background: rgba(255,255,255,.95);
      border-radius: 28px;
      padding: 28px;
      box-shadow: var(--shadow);
      display: grid;
      grid-template-columns: 1.3fr .7fr;
      gap: 20px;
      align-items: center;
      margin-bottom: 20px;
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 4vw, 46px);
      line-height: 1.05;
      color: #0b2036;
    }

    .hero p {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.55;
    }

    .hero-card {
      background: linear-gradient(160deg, #0f8f5f, #063d6b);
      color: #fff;
      border-radius: 24px;
      padding: 22px;
      min-height: 210px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .hero-card .big {
      font-size: 42px;
      font-weight: 900;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 16px;
    }

    .card {
      grid-column: span 12;
      background: var(--card);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,.6);
    }

    .card h2,
    .card h3 {
      margin: 0 0 12px;
      color: #102033;
    }

    .card p {
      color: var(--muted);
      line-height: 1.55;
    }

    .col-3 { grid-column: span 3; }
    .col-4 { grid-column: span 4; }
    .col-6 { grid-column: span 6; }
    .col-8 { grid-column: span 8; }
    .col-12 { grid-column: span 12; }

    .stat {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .stat strong {
      font-size: 28px;
      color: var(--primary-2);
    }

    .stat span {
      color: var(--muted);
      font-weight: 700;
      font-size: 13px;
    }

    .table-wrap {
      width: 100%;
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 14px;
    }

    table {
      width: 100%;
      min-width: 760px;
      border-collapse: collapse;
      background: #fff;
    }

    th,
    td {
      padding: 11px 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      font-size: 14px;
      vertical-align: top;
    }

    th {
      background: #eef6f2;
      color: #0e3d2c;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .4px;
    }

    tr:last-child td {
      border-bottom: none;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 5px 9px;
      font-size: 12px;
      font-weight: 800;
      background: #e8f2ee;
      color: var(--primary-2);
      white-space: nowrap;
    }

    .tag.warn {
      background: #fff7df;
      color: var(--warning);
    }

    .tag.danger {
      background: #fee2e2;
      color: var(--danger);
    }

    .login-box {
      max-width: 440px;
      margin: 34px auto;
      background: #fff;
      border-radius: 26px;
      padding: 24px;
      box-shadow: var(--shadow);
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 6px;
      color: #23364d;
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 12px 13px;
      border-radius: 14px;
      border: 1px solid #cfd9e6;
      outline: none;
      font-size: 15px;
      background: #fff;
    }

    textarea {
      min-height: 110px;
      resize: vertical;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(15,143,95,.14);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }

    .field {
      margin-bottom: 12px;
    }

    .notice {
      border-radius: 16px;
      padding: 12px 14px;
      background: #eef6f2;
      color: #0e3d2c;
      margin: 12px 0;
      font-weight: 700;
    }

    .notice.error {
      background: #fee2e2;
      color: #991b1b;
    }

    .notice.warn {
      background: #fff7df;
      color: #8a5a00;
    }

    .hidden {
      display: none !important;
    }

    .footer {
      color: rgba(255,255,255,.75);
      text-align: center;
      font-size: 13px;
      padding: 24px 10px;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 50;
      background: rgba(0,0,0,.6);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .modal-backdrop.open {
      display: flex;
    }

    .modal {
      width: min(620px, 100%);
      background: #fff;
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 20px;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .modal-head h3 {
      margin: 0;
    }

    .close {
      width: 36px;
      height: 36px;
      border: 0;
      border-radius: 999px;
      background: #eef2f7;
      cursor: pointer;
      font-weight: 900;
    }

    @media (max-width: 900px) {
      .hero {
        grid-template-columns: 1fr;
      }

      .col-3,
      .col-4,
      .col-6,
      .col-8 {
        grid-column: span 12;
      }

      .topbar-inner {
        align-items: flex-start;
        flex-direction: column;
      }

      .menu {
        justify-content: flex-start;
      }

      .form-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <strong>Bolões de Loterias Especiais</strong>
        <small>Portal SimonSports • controle, transparência e gestão de participantes</small>
      </div>

      <nav class="menu" id="menuPrincipal">
        <button type="button" data-tela="inicio" class="active">Início</button>
        <button type="button" data-tela="boloes">Bolões</button>
        <button type="button" data-tela="palpites">Palpites</button>
        <button type="button" data-tela="pagamentos">Pagamentos</button>
        <button type="button" data-tela="regulamento">Regulamento</button>
        <button type="button" data-tela="participar">Participar</button>
        <button type="button" id="btnSair" class="hidden">Sair</button>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <section id="view"></section>
  </main>

  <footer class="footer">
    Portal SimonSports • Sistema externo integrado ao Google Planilhas
  </footer>

  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal">
      <div class="modal-head">
        <h3 id="modalTitulo">Aviso</h3>
        <button type="button" class="close" onclick="fecharModal()">×</button>
      </div>
      <div id="modalConteudo"></div>
    </div>
  </div>

  <script>
    /********************************************************
     * CONFIGURAÇÃO PRINCIPAL
     ********************************************************/

    const CONFIG = {
      /**
       * Depois de publicar o Apps Script como Web App,
       * cole a URL /exec abaixo.
       *
       * Exemplo:
       * apiUrl: 'https://script.google.com/macros/s/AKfycbxxxx/exec'
       */
      apiUrl: 'https://script.google.com/macros/s/AKfycbxUkLEyfR76jVncO-HwhfS-yLM7aLXCTf7oG4h--OIh2-Ohy8/exec'
    };

    const ESTADO = {
      usuario: null,
      codigo: localStorage.getItem('PSS_BOLAO_CODIGO') || '',
      tela: 'inicio',
      boloes: [],
      bolaoSelecionado: ''
    };

    /********************************************************
     * INICIALIZAÇÃO
     ********************************************************/

    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('#menuPrincipal button[data-tela]').forEach(btn => {
        btn.addEventListener('click', () => navegar(btn.dataset.tela));
      });

      document.getElementById('btnSair').addEventListener('click', sair);

      if (ESTADO.codigo) {
        api('login', { codigo: ESTADO.codigo })
          .then(res => {
            ESTADO.usuario = res.dados.usuario;
            document.getElementById('btnSair').classList.remove('hidden');
            navegar('inicio');
          })
          .catch(() => {
            localStorage.removeItem('PSS_BOLAO_CODIGO');
            ESTADO.codigo = '';
            renderLogin();
          });
      } else {
        renderPublico();
      }
    });

    /********************************************************
     * API JSONP
     ********************************************************/

    function api(action, dados = {}) {
      return new Promise((resolve, reject) => {
        if (!CONFIG.apiUrl || CONFIG.apiUrl.includes('COLE_AQUI')) {
          reject(new Error('Configure a URL da API no index.html.'));
          return;
        }

        const callback = 'PSS_CB_' + Date.now() + '_' + Math.floor(Math.random() * 100000);
        const payload = encodeURIComponent(JSON.stringify(dados || {}));

        const url = CONFIG.apiUrl
          + '?action=' + encodeURIComponent(action)
          + '&codigo=' + encodeURIComponent(ESTADO.codigo || dados.codigo || '')
          + '&payload=' + payload
          + '&callback=' + callback;

        const script = document.createElement('script');
        let timeout;

        window[callback] = function(resposta) {
          clearTimeout(timeout);
          delete window[callback];
          script.remove();

          if (!resposta || resposta.ok !== true) {
            reject(new Error((resposta && resposta.erro) ? resposta.erro : 'Erro na API.'));
            return;
          }

          resolve(resposta);
        };

        script.onerror = function() {
          clearTimeout(timeout);
          delete window[callback];
          script.remove();
          reject(new Error('Falha ao conectar à API.'));
        };

        timeout = setTimeout(() => {
          delete window[callback];
          script.remove();
          reject(new Error('Tempo limite excedido ao conectar à API.'));
        }, 25000);

        script.src = url;
        document.body.appendChild(script);
      });
    }

    /********************************************************
     * NAVEGAÇÃO
     ********************************************************/

    function navegar(tela) {
      ESTADO.tela = tela;

      document.querySelectorAll('#menuPrincipal button[data-tela]').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.tela === tela);
      });

      if (!ESTADO.usuario && !['inicio', 'regulamento', 'participar'].includes(tela)) {
        renderLogin();
        return;
      }

      if (tela === 'inicio') renderInicio();
      if (tela === 'boloes') renderBoloes();
      if (tela === 'palpites') renderPalpites();
      if (tela === 'pagamentos') renderPagamentos();
      if (tela === 'regulamento') renderRegulamento();
      if (tela === 'participar') renderParticipar();
    }

    function view(html) {
      document.getElementById('view').innerHTML = html;
    }

    function setLoading(texto = 'Carregando...') {
      view(`<div class="card"><h2>${escapeHtml(texto)}</h2><p>Aguarde enquanto os dados são carregados.</p></div>`);
    }

    function renderPublico() {
      view(`
        <section class="hero">
          <div>
            <h1>Controle transparente para bolões de loterias especiais</h1>
            <p>
              Sistema externo do Portal SimonSports para gestão de participantes,
              cotas, palpites, pagamentos e regulamento interno, usando Google Planilhas
              como base de dados.
            </p>
            <button class="btn btn-primary" onclick="renderLogin()">Acessar sistema</button>
            <button class="btn btn-light" onclick="navegar('participar')">Solicitar participação</button>
          </div>
          <div class="hero-card">
            <div>
              <div class="big">100%</div>
              <p style="color:#e4fff3;margin:6px 0 0;">Gestão com foco em transparência e controle.</p>
            </div>
            <small>Compatível com celular via GitHub Pages.</small>
          </div>
        </section>

        <section class="grid">
          <div class="card col-4">
            <h3>Bolões especiais</h3>
            <p>Organização de bolões de loterias especiais, mantendo o jogo no ambiente oficial da Caixa.</p>
          </div>
          <div class="card col-4">
            <h3>Controle de cotas</h3>
            <p>Acompanhamento das cotas, participantes e pagamentos registrados.</p>
          </div>
          <div class="card col-4">
            <h3>Transparência</h3>
            <p>Visualização de regras internas, resumos e informações essenciais.</p>
          </div>
        </section>
      `);
    }

    /********************************************************
     * LOGIN
     ********************************************************/

    function renderLogin() {
      view(`
        <div class="login-box">
          <h2>Acesso ao sistema</h2>
          <p>Informe seu código de acesso para consultar bolões, palpites e pagamentos.</p>

          <div id="loginMsg"></div>

          <form onsubmit="fazerLogin(event)">
            <div class="field">
              <label>Código de acesso</label>
              <input id="codigoLogin" type="password" placeholder="Digite seu código" autocomplete="current-password" required />
            </div>
            <button class="btn btn-primary" type="submit" style="width:100%;">Entrar</button>
          </form>

          <div class="notice warn">
            Caso não tenha código, use o menu Participar para solicitar acesso.
          </div>
        </div>
      `);
    }

    async function fazerLogin(event) {
      event.preventDefault();
      const codigo = document.getElementById('codigoLogin').value.trim();
      const msg = document.getElementById('loginMsg');

      msg.innerHTML = `<div class="notice">Verificando acesso...</div>`;

      try {
        const res = await api('login', { codigo });
        ESTADO.usuario = res.dados.usuario;
        ESTADO.codigo = codigo;
        localStorage.setItem('PSS_BOLAO_CODIGO', codigo);
        document.getElementById('btnSair').classList.remove('hidden');
        navegar('inicio');
      } catch (err) {
        msg.innerHTML = `<div class="notice error">${escapeHtml(err.message)}</div>`;
      }
    }

    function sair() {
      ESTADO.usuario = null;
      ESTADO.codigo = '';
      localStorage.removeItem('PSS_BOLAO_CODIGO');
      document.getElementById('btnSair').classList.add('hidden');
      renderPublico();
    }

    /********************************************************
     * INÍCIO / DASHBOARD
     ********************************************************/

    async function renderInicio() {
      if (!ESTADO.usuario) {
        renderPublico();
        return;
      }

      setLoading('Carregando início');

      try {
        const res = await api('dashboard');
        const d = res.dados;
        const cards = d.cards || {};

        view(`
          <section class="hero">
            <div>
              <h1>Olá, ${escapeHtml(ESTADO.usuario.nome || 'usuário')}</h1>
              <p>
                Painel inicial dos bolões de loterias especiais.
                Use os menus para consultar bolões, palpites, pagamentos e regulamento.
              </p>
              <button class="btn btn-primary" onclick="navegar('boloes')">Ver bolões</button>
              <button class="btn btn-light" onclick="navegar('pagamentos')">Resumo financeiro</button>
            </div>
            <div class="hero-card">
              <div>
                <div class="big">${escapeHtml(cards.boloesAtivos || 0)}</div>
                <p style="color:#e4fff3;margin:6px 0 0;">Bolões ativos no momento.</p>
              </div>
              <small>${dataHoraAtual()}</small>
            </div>
          </section>

          <section class="grid">
            ${cardStat('Bolões ativos', cards.boloesAtivos || 0)}
            ${cardStat('Total de bolões', cards.totalBoloes || 0)}
            ${cardStat('Total arrecadado', moeda(cards.totalArrecadado || 0))}
            ${cardStat('Pendências', cards.pagamentosPendentes || 0)}
          </section>

          <section class="grid" style="margin-top:16px;">
            <div class="card col-12">
              <h2>Últimos bolões</h2>
              ${tabelaBoloes(d.boloes || [])}
            </div>
          </section>
        `);
      } catch (err) {
        view(`<div class="card"><div class="notice error">${escapeHtml(err.message)}</div></div>`);
      }
    }

    function cardStat(titulo, valor) {
      return `
        <div class="card col-3">
          <div class="stat">
            <span>${escapeHtml(titulo)}</span>
            <strong>${escapeHtml(valor)}</strong>
          </div>
        </div>
      `;
    }

    /********************************************************
     * BOLÕES
     ********************************************************/

    async function renderBoloes() {
      setLoading('Carregando bolões');

      try {
        const res = await api('listarBoloes');
        ESTADO.boloes = res.dados.boloes || [];

        view(`
          <section class="grid">
            <div class="card col-12">
              <h2>Bolões ativos e cadastrados</h2>
              <p>Consulta dos bolões, cotas totais, cotas adquiridas e disponibilidade.</p>
              ${tabelaBoloes(ESTADO.boloes)}
            </div>
          </section>
        `);
      } catch (err) {
        view(`<div class="card"><div class="notice error">${escapeHtml(err.message)}</div></div>`);
      }
    }

    function tabelaBoloes(boloes) {
      if (!boloes.length) {
        return `<div class="notice warn">Nenhum bolão localizado.</div>`;
      }

      const linhas = boloes.map(b => `
        <tr>
          <td><strong>${escapeHtml(b.nome)}</strong><br><small>${escapeHtml(b.id)}</small></td>
          <td>${escapeHtml(b.loteria)}</td>
          <td>${escapeHtml(b.concurso)}</td>
          <td>${escapeHtml(b.dataSorteio)}</td>
          <td>${moeda(b.valorCota)}</td>
          <td>${escapeHtml(b.cotasAdquiridas)} / ${escapeHtml(b.cotasTotal)}</td>
          <td>${escapeHtml(b.cotasDisponiveis)}</td>
          <td>${moeda(b.premioEstimado)}</td>
          <td><span class="tag">${escapeHtml(b.status || 'ATIVO')}</span></td>
          <td>
            <button class="btn btn-primary" onclick="selecionarBolao('${escapeAttr(b.id)}')">Selecionar</button>
          </td>
        </tr>
      `).join('');

      return `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Bolão</th>
                <th>Loteria</th>
                <th>Concurso</th>
                <th>Sorteio</th>
                <th>Valor cota</th>
                <th>Cotas adquiridas</th>
                <th>Disponíveis</th>
                <th>Prêmio estimado</th>
                <th>Status</th>
                <th>Ação</th>
              </tr>
            </thead>
            <tbody>${linhas}</tbody>
          </table>
        </div>
      `;
    }

    function selecionarBolao(id) {
      ESTADO.bolaoSelecionado = id;
      abrirModal('Bolão selecionado', `
        <div class="notice">Bolão selecionado: <strong>${escapeHtml(id)}</strong></div>
        <button class="btn btn-primary" onclick="fecharModal(); navegar('palpites')">Ver palpites</button>
        <button class="btn btn-light" onclick="fecharModal(); navegar('pagamentos')">Ver pagamentos</button>
      `);
    }

    /********************************************************
     * PALPITES
     ********************************************************/

    async function renderPalpites() {
      setLoading('Carregando palpites');

      try {
        const resBoloes = await api('listarBoloes');
        ESTADO.boloes = resBoloes.dados.boloes || [];

        const res = await api('listarPalpites', { idBolao: ESTADO.bolaoSelecionado || '' });
        const palpites = res.dados.palpites || [];

        view(`
          <section class="grid">
            <div class="card col-4">
              <h2>Novo palpite</h2>
              <form onsubmit="salvarPalpite(event)">
                <div class="field">
                  <label>Bolão</label>
                  <select id="palpiteBolao" required>
                    <option value="">Selecione</option>
                    ${ESTADO.boloes.map(b => `<option value="${escapeAttr(b.id)}" ${b.id === ESTADO.bolaoSelecionado ? 'selected' : ''}>${escapeHtml(b.nome)} - ${escapeHtml(b.loteria)}</option>`).join('')}
                  </select>
                </div>
                <div class="field">
                  <label>Participante</label>
                  <input id="palpiteParticipante" value="${escapeAttr(ESTADO.usuario ? ESTADO.usuario.nome : '')}" required />
                </div>
                <div class="field">
                  <label>Palpite</label>
                  <textarea id="palpiteTexto" placeholder="Digite os números ou informações do palpite" required></textarea>
                </div>
                <button class="btn btn-primary" type="submit" style="width:100%;">Salvar palpite</button>
              </form>
            </div>

            <div class="card col-8">
              <h2>Palpites registrados</h2>
              ${tabelaPalpites(palpites)}
            </div>
          </section>
        `);
      } catch (err) {
        view(`<div class="card"><div class="notice error">${escapeHtml(err.message)}</div></div>`);
      }
    }

    async function salvarPalpite(event) {
      event.preventDefault();

      const dados = {
        idBolao: document.getElementById('palpiteBolao').value,
        participante: document.getElementById('palpiteParticipante').value,
        palpite: document.getElementById('palpiteTexto').value
      };

      try {
        const res = await api('salvarPalpite', dados);
        abrirModal('Palpite salvo', `<div class="notice">${escapeHtml(res.dados.mensagem)}</div>`);
        ESTADO.bolaoSelecionado = dados.idBolao;
        renderPalpites();
      } catch (err) {
        abrirModal('Erro ao salvar', `<div class="notice error">${escapeHtml(err.message)}</div>`);
      }
    }

    function tabelaPalpites(palpites) {
      if (!palpites.length) return `<div class="notice warn">Nenhum palpite registrado.</div>`;

      const linhas = palpites.map(p => `
        <tr>
          <td>${escapeHtml(p.participante)}</td>
          <td>${escapeHtml(p.idBolao)}</td>
          <td>${escapeHtml(p.palpite)}</td>
          <td>${escapeHtml(p.data)}</td>
          <td><span class="tag">${escapeHtml(p.status || 'REGISTRADO')}</span></td>
        </tr>
      `).join('');

      return `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Participante</th>
                <th>Bolão</th>
                <th>Palpite</th>
                <th>Data</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody>${linhas}</tbody>
          </table>
        </div>
      `;
    }

    /********************************************************
     * PAGAMENTOS
     ********************************************************/

    async function renderPagamentos() {
      setLoading('Carregando pagamentos');

      try {
        const res = await api('resumoFinanceiro', { idBolao: ESTADO.bolaoSelecionado || '' });
        const resumo = res.dados.resumo || {};
        const pagamentos = res.dados.pagamentos || [];

        view(`
          <section class="grid">
            ${cardStat('Registros', resumo.totalRegistros || 0)}
            ${cardStat('Total geral', moeda(resumo.totalGeral || 0))}
            ${cardStat('Total pago', moeda(resumo.totalPago || 0))}
            ${cardStat('Pendente', moeda(resumo.totalPendente || 0))}

            <div class="card col-12">
              <h2>Pagamentos</h2>
              <p>Resumo financeiro e listagem dos pagamentos registrados.</p>
              ${tabelaPagamentos(pagamentos)}
            </div>
          </section>
        `);
      } catch (err) {
        view(`<div class="card"><div class="notice error">${escapeHtml(err.message)}</div></div>`);
      }
    }

    function tabelaPagamentos(pagamentos) {
      if (!pagamentos.length) return `<div class="notice warn">Nenhum pagamento localizado.</div>`;

      const linhas = pagamentos.map(p => {
        const status = normalizar(p.status);
        const classe = status === 'PAGO' || status === 'SIM' ? '' : 'warn';

        return `
          <tr>
            <td>${escapeHtml(p.participante)}</td>
            <td>${escapeHtml(p.idBolao)}</td>
            <td>${moeda(p.valor)}</td>
            <td>${escapeHtml(p.partes || '')}</td>
            <td><span class="tag ${classe}">${escapeHtml(p.status || 'PENDENTE')}</span></td>
            <td>${escapeHtml(p.data)}</td>
            <td>${p.comprovanteUrl ? `<a class="tag" href="${escapeAttr(p.comprovanteUrl)}" target="_blank" rel="noopener">Abrir</a>` : ''}</td>
          </tr>
        `;
      }).join('');

      return `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Participante</th>
                <th>Bolão</th>
                <th>Valor</th>
                <th>Partes</th>
                <th>Status</th>
                <th>Data</th>
                <th>Comprovante</th>
              </tr>
            </thead>
            <tbody>${linhas}</tbody>
          </table>
        </div>
      `;
    }

    /********************************************************
     * REGULAMENTO
     ********************************************************/

    async function renderRegulamento() {
      if (!ESTADO.usuario) {
        view(`
          <section class="hero">
            <div>
              <h1>Regulamento interno</h1>
              <p>Faça login para carregar o regulamento diretamente da planilha.</p>
              <button class="btn btn-primary" onclick="renderLogin()">Entrar</button>
            </div>
            <div class="hero-card">
              <div class="big">📄</div>
              <small>Regras e transparência</small>
            </div>
          </section>
        `);
        return;
      }

      setLoading('Carregando regulamento');

      try {
        const res = await api('obterRegulamento');
        const d = res.dados || {};
        view(`
          <div class="card">
            <h2>${escapeHtml(d.titulo || 'Regulamento interno')}</h2>
            <div style="white-space:pre-wrap;line-height:1.7;color:#334155;">${escapeHtml(d.texto || '')}</div>
          </div>
        `);
      } catch (err) {
        view(`<div class="card"><div class="notice error">${escapeHtml(err.message)}</div></div>`);
      }
    }

    /********************************************************
     * PARTICIPAR
     ********************************************************/

    async function renderParticipar() {
      let opcoes = '';
      try {
        const codigoBackup = ESTADO.codigo;
        if (!ESTADO.codigo && ESTADO.usuario) ESTADO.codigo = ESTADO.usuario.codigo;
        if (ESTADO.codigo) {
          const res = await api('listarBoloes');
          ESTADO.boloes = res.dados.boloes || [];
          opcoes = ESTADO.boloes.map(b => `<option value="${escapeAttr(b.id)}">${escapeHtml(b.nome)} - ${escapeHtml(b.loteria)}</option>`).join('');
        }
        ESTADO.codigo = codigoBackup;
      } catch (err) {
        opcoes = '';
      }

      view(`
        <section class="grid">
          <div class="card col-6">
            <h2>Solicitar participação</h2>
            <p>Preencha os dados para registrar uma solicitação de participação.</p>

            <form onsubmit="solicitarParticipacao(event)">
              <div class="field">
                <label>Nome</label>
                <input id="partNome" required />
              </div>

              <div class="field">
                <label>Telefone / WhatsApp</label>
                <input id="partTelefone" />
              </div>

              <div class="field">
                <label>ID do bolão</label>
                ${opcoes
                  ? `<select id="partBolao" required><option value="">Selecione</option>${opcoes}</select>`
                  : `<input id="partBolao" placeholder="Informe o ID do bolão" required />`
                }
              </div>

              <div class="field">
                <label>Quantidade de cotas</label>
                <input id="partCotas" type="number" min="1" step="1" value="1" required />
              </div>

              <button class="btn btn-primary" type="submit" style="width:100%;">Enviar solicitação</button>
            </form>
          </div>

          <div class="card col-6">
            <h2>Observações</h2>
            <p>
              Esta ferramenta serve para controle e transparência interna.
              Os jogos e apostas oficiais continuam sendo realizados nos canais oficiais da Caixa,
              conforme regulamento aplicável.
            </p>
            <div class="notice warn">
              A solicitação não confirma automaticamente participação. Aguarde validação do organizador.
            </div>
          </div>
        </section>
      `);
    }

    async function solicitarParticipacao(event) {
      event.preventDefault();

      const dados = {
        nome: document.getElementById('partNome').value,
        telefone: document.getElementById('partTelefone').value,
        idBolao: document.getElementById('partBolao').value,
        cotas: document.getElementById('partCotas').value
      };

      try {
        const res = await api('solicitarParticipacao', dados);
        abrirModal('Solicitação enviada', `<div class="notice">${escapeHtml(res.dados.mensagem)}</div>`);
        event.target.reset();
      } catch (err) {
        abrirModal('Erro ao enviar', `<div class="notice error">${escapeHtml(err.message)}</div>`);
      }
    }

    /********************************************************
     * MODAL
     ********************************************************/

    function abrirModal(titulo, html) {
      document.getElementById('modalTitulo').textContent = titulo;
      document.getElementById('modalConteudo').innerHTML = html;
      document.getElementById('modalBackdrop').classList.add('open');
    }

    function fecharModal() {
      document.getElementById('modalBackdrop').classList.remove('open');
    }

    /********************************************************
     * HELPERS DE INTERFACE
     ********************************************************/

    function moeda(valor) {
      const n = Number(valor || 0);
      return n.toLocaleString('pt-BR', {
        style: 'currency',
        currency: 'BRL'
      });
    }

    function normalizar(s) {
      return String(s || '')
        .trim()
        .toUpperCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '');
    }

    function escapeHtml(value) {
      return String(value === undefined || value === null ? '' : value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, '&#096;');
    }

    function dataHoraAtual() {
      return new Date().toLocaleString('pt-BR', {
        timeZone: 'America/Sao_Paulo',
        day: '2-digit',
        month: '2-digit',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
    }
  </script>
</body>
</html>
