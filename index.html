<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Bolões de Loterias Especiais | Portal SimonSports</title>

  <style>
    :root {
      --primary: #1b5e20;
      --primary-2: #0d3f15;
      --accent: #ffa000;
      --bg: #071526;
      --bg-2: #0f2438;
      --card: rgba(255,255,255,.98);
      --soft: #f5f8f6;
      --text: #172033;
      --muted: #64748b;
      --line: #dbe4ef;
      --danger: #b91c1c;
      --warning: #b7791f;
      --success: #1b5e20;
      --radius: 18px;
      --shadow: 0 18px 45px rgba(0,0,0,.22);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: "Segoe UI", Arial, Helvetica, sans-serif;
      color: var(--text);
      background: #071526;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(255,160,0,.18), transparent 32%),
        radial-gradient(circle at bottom right, rgba(27,94,32,.35), transparent 35%),
        linear-gradient(160deg, #071526, #102a43 54%, #061321);
    }

    button, input, select, textarea { font: inherit; }

    a {
      color: inherit;
      text-decoration: none;
    }

    .hidden { display: none !important; }

    .app-shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      background: rgba(7,21,38,.94);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,.10);
      color: #fff;
    }

    .topbar-inner {
      max-width: 1180px;
      margin: 0 auto;
      padding: 13px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 210px;
    }

    .brand strong {
      font-size: 17px;
      letter-spacing: .2px;
      line-height: 1.15;
    }

    .brand small {
      color: #b8c7d9;
      font-size: 12px;
      line-height: 1.25;
    }

    .user-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 8px 11px;
      background: rgba(255,255,255,.10);
      color: #dfefff;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .clock {
      color: #dfefff;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .nav-wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 0 16px 10px;
      display: none;
    }

    .nav-wrap.open { display: block; }

    .menu {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
      -webkit-overflow-scrolling: touch;
    }

    .menu button {
      border: 0;
      border-radius: 999px;
      padding: 10px 14px;
      background: rgba(255,255,255,.10);
      color: #cdd9e7;
      cursor: pointer;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .25px;
      text-transform: uppercase;
      white-space: nowrap;
      transition: .18s ease;
    }

    .menu button:hover {
      transform: translateY(-1px);
      background: rgba(255,255,255,.17);
      color: #fff;
    }

    .menu button.active {
      background: var(--accent);
      color: #111827;
    }

    .menu button.danger { color: #ffd4d4; }

    .wrap {
      width: min(1180px, 100%);
      margin: 0 auto;
      padding: 24px 16px 56px;
      flex: 1;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.25fr) minmax(300px, .75fr);
      gap: 18px;
      align-items: stretch;
      margin-bottom: 18px;
    }

    .hero-main,
    .hero-side,
    .card,
    .login-card,
    .modal {
      background: var(--card);
      border: 1px solid rgba(255,255,255,.68);
      box-shadow: var(--shadow);
      border-radius: 28px;
    }
    .hero-main { padding: clamp(22px, 3vw, 34px); }

    .hero-main h1 {
      margin: 0 0 12px;
      font-size: clamp(28px, 4.4vw, 48px);
      line-height: 1.05;
      color: #0b2036;
      letter-spacing: -1.1px;
    }

    .hero-main p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.58;
      font-size: 16px;
    }

    .hero-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .hero-side {
      padding: 22px;
      background:
        linear-gradient(150deg, rgba(27,94,32,.98), rgba(7,42,78,.98)),
        #0b4221;
      color: #fff;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
      position: relative;
    }

    .hero-side::after {
      content: "";
      position: absolute;
      width: 190px;
      height: 190px;
      right: -70px;
      top: -70px;
      border-radius: 50%;
      background: rgba(255,160,0,.18);
    }

    .hero-side .big {
      font-size: 45px;
      font-weight: 950;
      line-height: 1;
      margin-bottom: 8px;
    }

    .hero-side p {
      color: #e7fff0;
      margin: 0;
      line-height: 1.45;
      position: relative;
      z-index: 1;
    }
    .hero-side small {
      color: rgba(255,255,255,.80);
      position: relative;
      z-index: 1;
      font-weight: 700;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 16px;
    }

    .card {
      grid-column: span 12;
      padding: 18px;
      border-radius: var(--radius);
    }

    .card h2,
    .card h3,
    .card h4 {
      margin: 0 0 12px;
      color: #102033;
    }

    .card p {
      color: var(--muted);
      line-height: 1.55;
    }

    .col-3 { grid-column: span 3; }
    .col-4 { grid-column: span 4; }
    .col-5 { grid-column: span 5; }
    .col-6 { grid-column: span 6; }
    .col-7 { grid-column: span 7; }
    .col-8 { grid-column: span 8; }
    .col-12 { grid-column: span 12; }

    .btn {
      border: 0;
      border-radius: 999px;
      padding: 11px 16px;
      cursor: pointer;
      font-weight: 900;
      transition: .18s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      min-height: 42px;
    }

    .btn:hover {
      transform: translateY(-1px);
      filter: brightness(.98);
    }

    .btn:disabled {
      opacity: .65;
      cursor: not-allowed;
      transform: none;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-accent {
      background: var(--accent);
      color: #111827;
    }

    .btn-light {
      background: #e8f2ee;
      color: var(--primary-2);
    }

    .btn-danger {
      background: var(--danger);
      color: #fff;
    }
    .btn-block {
      width: 100%;
      border-radius: 14px;
    }

    .login-wrap {
      display: grid;
      min-height: calc(100vh - 120px);
      place-items: center;
      padding: 20px 0;
    }

    .login-card {
      width: min(430px, 100%);
      padding: 26px;
      border-radius: 26px;
    }

    .login-card h1 {
      margin: 0 0 6px;
      color: var(--primary);
      font-size: 25px;
      line-height: 1.1;
      text-align: center;
    }

    .login-card p {
      margin: 0 0 18px;
      color: var(--muted);
      text-align: center;
      line-height: 1.45;
      font-size: 14px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 12px;
      font-weight: 900;
      color: #23364d;
      text-transform: uppercase;
      letter-spacing: .35px;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid #cfd9e6;
      border-radius: 14px;
      background: #fff;
      color: var(--text);
      padding: 12px 13px;
      outline: none;
      font-size: 15px;
      min-height: 46px;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(27,94,32,.14);
    }

    textarea {
      min-height: 110px;
      resize: vertical;
    }

    .field { margin-bottom: 13px; }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .notice {
      border-radius: 16px;
      padding: 12px 14px;
      background: #eef6f2;
      color: #0e3d2c;
      margin: 12px 0;
      font-weight: 800;
      line-height: 1.38;
      font-size: 13px;
    }

    .notice.error {
      background: #fee2e2;
      color: #991b1b;
    }

    .notice.warn {
      background: #fff7df;
      color: #8a5a00;
    }

    .notice.info {
      background: #eaf2ff;
      color: #123c74;
    }

    .api-mini {
      margin-top: 10px;
      padding: 9px 11px;
      border-radius: 12px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      color: #475569;
      font-size: 12px;
      line-height: 1.35;
      word-break: break-word;
    }

    .table-wrap {
      width: 100%;
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      -webkit-overflow-scrolling: touch;
    }

    table {
      width: 100%;
      min-width: 780px;
      border-collapse: collapse;
      background: #fff;
    }

    th, td {
      padding: 11px 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      font-size: 13px;
      vertical-align: top;
    }

    th {
      background: #eef6f2;
      color: #0e3d2c;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .38px;
    }

    tr:last-child td { border-bottom: none; }

    .tag {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 5px 9px;
      font-size: 11px;
      font-weight: 900;
      background: #e8f2ee;
      color: var(--primary-2);
      white-space: nowrap;
      line-height: 1.2;
    }

    .tag.warn {
      background: #fff7df;
      color: var(--warning);
    }
    .tag.danger {
      background: #fee2e2;
      color: var(--danger);
    }

    .tag.info {
      background: #eaf2ff;
      color: #123c74;
    }

    .stat {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .stat span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .35px;
    }

    .stat strong {
      font-size: 27px;
      color: var(--primary-2);
      line-height: 1.1;
      word-break: break-word;
    }

    .bolao-card {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 15px;
      background: #fff;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 100%;
    }
    .bolao-card h3 {
      margin-bottom: 3px;
      color: var(--primary-2);
    }

    .bolao-meta {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      font-size: 13px;
    }

    .bolao-meta div {
      background: #f7faf8;
      border: 1px solid #e2eadf;
      border-radius: 12px;
      padding: 8px;
      color: #334155;
    }

    .bolao-meta b {
      display: block;
      color: #0e3d2c;
      font-size: 11px;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .numbers-grid {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 8px;
      max-width: 520px;
      margin: 18px auto;
    }

    .ball {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 1px solid #ccd6e2;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      cursor: pointer;
      background: #fff;
      transition: .16s ease;
      user-select: none;
    }

    .ball:hover {
      border-color: var(--primary);
      transform: scale(1.04);
    }

    .ball.selected {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
      transform: scale(1.08);
    }
    .palpite-resumo {
      max-width: 680px;
      margin: 0 auto 14px;
      display: grid;
      gap: 10px;
    }

    .palpite-box {
      background: #fff;
      border: 1px solid #ddd;
      border-left: 5px solid var(--primary);
      border-radius: 12px;
      padding: 12px;
      box-shadow: 0 3px 10px rgba(0,0,0,.06);
      font-size: 13px;
    }

    .palpite-box .nums {
      font-weight: 950;
      letter-spacing: .5px;
      margin: 7px 0;
      color: #111827;
    }

    .footer {
      color: rgba(255,255,255,.75);
      text-align: center;
      font-size: 12px;
      padding: 20px 10px;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 80;
      background: rgba(0,0,0,.72);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }
    .modal-backdrop.open { display: flex; }

    .modal {
      width: min(620px, 100%);
      padding: 20px;
      max-height: 92vh;
      overflow-y: auto;
      border-radius: 22px;
    }

    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .modal-head h3 {
      margin: 0;
      color: var(--primary-2);
    }

    .close {
      width: 38px;
      height: 38px;
      border: 0;
      border-radius: 999px;
      background: #eef2f7;
      cursor: pointer;
      font-weight: 950;
      font-size: 20px;
    }

    .regulamento-box {
      max-height: 230px;
      overflow-y: auto;
      border: 1px solid #d9e5d9;
      border-radius: 14px;
      padding: 12px;
      background: #fff;
      color: #334155;
      font-size: 13px;
      line-height: 1.55;
      white-space: pre-wrap;
    }

    .checkline {
      display: flex;
      gap: 9px;
      align-items: flex-start;
      margin: 12px 0;
      font-size: 13px;
      line-height: 1.38;
      color: #334155;
      cursor: pointer;
      text-transform: none;
      letter-spacing: 0;
      font-weight: 700;
    }

    .checkline input {
      width: auto;
      min-height: auto;
      margin-top: 2px;
    }

    .toast-container {
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 120;
      display: grid;
      gap: 10px;
      width: min(360px, calc(100vw - 32px));
    }

    .toast {
      background: #fff;
      color: #172033;
      border-left: 6px solid var(--primary);
      box-shadow: var(--shadow);
      border-radius: 14px;
      padding: 13px 15px;
      font-weight: 800;
      font-size: 13px;
      line-height: 1.35;
      animation: toastIn .25s ease-out;
    }

    .toast.error { border-left-color: var(--danger); }
    .toast.warn { border-left-color: var(--accent); }
    .toast.info { border-left-color: #1565c0; }

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 920px) {
      .topbar-inner {
        align-items: flex-start;
        flex-direction: column;
      }
      .hero { grid-template-columns: 1fr; }

      .col-3, .col-4, .col-5, .col-6, .col-7, .col-8 {
        grid-column: span 12;
      }

      .form-row { grid-template-columns: 1fr; }

      .numbers-grid {
        grid-template-columns: repeat(5, 1fr);
        max-width: 250px;
      }

      .ball {
        width: 40px;
        height: 40px;
      }

      .bolao-meta { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <strong>Bolões de Loterias Especiais</strong>
          <small>Portal SimonSports • controle, transparência e gestão de participantes</small>
        </div>

        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
          <span class="clock" id="clock">--/--/---- --:--</span>
          <span class="user-chip hidden" id="userDisplay">Acesso restrito</span>
        </div>
      </div>

      <div class="nav-wrap" id="navWrap">
        <nav class="menu" id="menuPrincipal">
          <button type="button" data-view="inicio" class="active">Início</button>
          <button type="button" data-view="boloes">Bolões</button>
          <button type="button" data-view="palpites">Palpite</button>
          <button type="button" data-view="comprovante">Comprovante</button>
          <button type="button" data-view="pagamentos">Pagamentos</button>
          <button type="button" data-view="regulamento">Regulamento</button>
          <button type="button" data-view="admin" id="btnAdmin" class="hidden">Admin</button>
          <button type="button" class="danger" onclick="logout()">Sair</button>
        </nav>
      </div>
    </header>

    <main class="wrap">
      <section id="view"></section>
    </main>

    <footer class="footer">
      Portal SimonSports • Sistema externo GitHub Pages integrado ao Google Planilhas
    </footer>
  </div>

  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal">
      <div class="modal-head">
        <h3 id="modalTitulo">Aviso</h3>
        <button type="button" class="close" onclick="fecharModal()">×</button>
      </div>
      <div id="modalConteudo"></div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    /********************************************************
     * BOLÕES DE LOTERIAS ESPECIAIS — INDEX GITHUB PAGES
     * Portal SimonSports
     *
     * Atualização focada:
     * - URL base da API corrigida, sem parâmetros fixos.
     * - Comunicação JSONP ajustada para usar callback=teste, igual ao teste manual que funcionou.
     * - Tratamento de retorno mais tolerante: dados/data/result/rows/lista.
     * - Mensagens de falha mais claras, sem quebrar sessão salva.
     * - Correção das colunas CSS col-5/col-7.
     ********************************************************/

    const CONFIG = {
      apiUrl: 'https://script.google.com/macros/s/AKfycbxUkLEyfR76jVncO-HwhfS-yLM7aLXCTf7oG4h-uOGsnFk6Oda3vTm8MQ-OIh2-Ohy8/exec',
      versaoRegulamento: '2026.1',
      timeoutApiMs: 45000
    };

    const ESTADO = {
      usuario: null,
      email: localStorage.getItem('PSS_BOLAO_EMAIL') || '',
      role: '',
      view: 'inicio',
      boloes: [],
      bolaoSelecionado: localStorage.getItem('PSS_BOLAO_SELECIONADO') || '',
      palpiteInfo: null,
      palpiteStatus: null,
      palpiteSlot: 1,
      numerosSelecionados: [],
      qtdEscolha: 6,
      podeEditarPalpite: true
    };

    /********************************************************
     * INICIALIZAÇÃO
     ********************************************************/
    document.addEventListener('DOMContentLoaded', () => {
      atualizarRelogio();
      setInterval(atualizarRelogio, 1000);

      document.querySelectorAll('#menuPrincipal button[data-view]').forEach(btn => {
        btn.addEventListener('click', () => navegar(btn.dataset.view));
      });

      const sessao = carregarSessao();
      if (sessao && sessao.email) {
        ESTADO.usuario = sessao;
        ESTADO.email = sessao.email;
        ESTADO.role = String(sessao.role || sessao.perfil || '').toLowerCase();
        aplicarSessaoVisual();
        navegar('inicio');
      } else {
        renderPublico();
      }
    });

    /********************************************************
     * API JSONP — COMPATÍVEL COM APPS SCRIPT PUBLICADO COMO /exec
     ********************************************************/
    let PSS_API_FILA = Promise.resolve();

    function api(action, dados = {}, args = null) {
      const executar = () => apiJsonpSerialCompatTeste_(action, dados, args);
      PSS_API_FILA = PSS_API_FILA.then(executar, executar);
      return PSS_API_FILA;
    }

    function apiJsonpSerialCompatTeste_(action, dados = {}, args = null) {
      return new Promise((resolve, reject) => {
        if (!CONFIG.apiUrl || !String(CONFIG.apiUrl).startsWith('https://script.google.com/macros/s/')) {
          reject(new Error('URL da API não configurada corretamente no index.html.'));
          return;
        }

        /****************************************************
         * IMPORTANTE
         * Seu teste manual funcionou com:
         * ?action=ping&callback=teste
         *
         * Por isso este index agora usa o callback fixo "teste",
         * exatamente no padrão já aceito pelo seu GS atual.
         * A fila PSS_API_FILA impede conflito entre chamadas.
         ****************************************************/
        const callback = 'teste';

        const payloadObj = Object.assign({}, dados || {});
        if (Array.isArray(args)) payloadObj.args = args;

        payloadObj.fnName = action;
        payloadObj.action = action;
        payloadObj.email = payloadObj.email || ESTADO.email || '';

        const params = new URLSearchParams();
        params.set('action', action);
        params.set('callback', callback);
        params.set('_', String(Date.now()));

        if (action !== 'ping') {
          params.set('fn', action);
          params.set('fnName', action);
          params.set('payload', JSON.stringify(payloadObj));
          params.set('email', payloadObj.email || '');

          Object.keys(payloadObj).forEach(k => {
            const v = payloadObj[k];
            if (k === 'payload' || k === 'callback' || k === '_' || k === 'fileData') return;
            if (Array.isArray(v) || (v && typeof v === 'object')) return;
            if (v !== undefined && v !== null) params.set(k, String(v));
          });
        }

        const script = document.createElement('script');
        let finalizado = false;
        const callbackAnterior = window[callback];
        const limpar = () => {
          try {
            if (callbackAnterior === undefined) {
              delete window[callback];
            } else {
              window[callback] = callbackAnterior;
            }
          } catch (e) {
            window[callback] = callbackAnterior;
          }

          if (script && script.parentNode) script.parentNode.removeChild(script);
        };

        const timer = setTimeout(() => {
          if (finalizado) return;
          finalizado = true;
          limpar();
          reject(new Error('Tempo limite excedido ao conectar à API usando callback=teste.'));
        }, CONFIG.timeoutApiMs);
        window[callback] = function(resposta) {
          if (finalizado) return;
          finalizado = true;
          clearTimeout(timer);
          limpar();

          try {
            validarRespostaApi(resposta);
            resolve(desembrulharResposta(resposta));
          } catch (err) {
            reject(err);
          }
        };

        script.onerror = function() {
          if (finalizado) return;
          finalizado = true;
          clearTimeout(timer);
          limpar();
          reject(new Error('Falha ao carregar a API usando o mesmo padrão do teste: action=' + action + '&callback=teste.'));
        };

        script.async = true;
        script.src = CONFIG.apiUrl + '?' + params.toString();

        document.body.appendChild(script);
      });
    }

    function validarRespostaApi(resposta) {
      if (resposta === undefined || resposta === null) {
        throw new Error('A API respondeu vazia.');
      }

      if (typeof resposta === 'string') {
        const s = normalizar(resposta);
        if (s.includes('ERRO') || s.includes('FALHA') || s.includes('INVALID')) {
          throw new Error(resposta);
        }
        return;
      }
      if (resposta.ok === false) {
        throw new Error(resposta.erro || resposta.msg || resposta.message || 'Erro retornado pela API.');
      }

      if (resposta.sucesso === false) {
        throw new Error(resposta.msg || resposta.erro || resposta.message || 'Erro retornado pela API.');
      }

      if (resposta.erro && !resposta.sucesso && !resposta.ok) {
        throw new Error(resposta.msg || resposta.erro || resposta.message || 'Erro retornado pela API.');
      }
    }

    function desembrulharResposta(resposta) {
      if (!resposta || typeof resposta !== 'object') return resposta;

      if (resposta.dados !== undefined) return resposta.dados;
      if (resposta.data !== undefined) return resposta.data;
      if (resposta.result !== undefined) return resposta.result;
      if (resposta.resultado !== undefined) return resposta.resultado;
      if (resposta.payload !== undefined && resposta.payload !== null && typeof resposta.payload !== 'string') return resposta.payload;

      return resposta;
    }

    async function apiMulti(tentativas) {
      let ultimoErro = null;

      for (const t of tentativas) {
        try {
          const res = await api(t.action, t.dados || {}, t.args || null);
          return res;
        } catch (err) {
          ultimoErro = err;
          const msg = normalizar(err && err.message ? err.message : '');
          const erroRota = (
            msg.includes('FUNCAO') ||
            msg.includes('FUNÇÃO') ||
            msg.includes('ACTION') ||
            msg.includes('ROTA') ||
            msg.includes('NAO ENCONTR') ||
            msg.includes('NÃO ENCONTR') ||
            msg.includes('INVALID')
          );

          if (!erroRota && tentativas.length === 1) break;
        }
      }

      throw ultimoErro || new Error('Nenhuma rota da API respondeu.');
    }

      const senha = document.getElementById('loginSenha').value.trim();
      const btn = document.getElementById('btnLogin');
      const msg = document.getElementById('loginMsg');

      }

      btn.disabled = true;

      msg.innerHTML = `<div class="notice info">Verificando acesso na planilha...</div>`;

      try {
        const r = await apiMulti([
          { action: 'processarLogin', dados: { email, senha }, args: [email, senha] },
          { action: 'login', dados: { email, senha }, args: [email, senha] }
        ]);

        if (!r || r.erro || r.sucesso === false) {
          throw new Error((r && (r.msg || r.erro)) || 'E-mail ou senha incorretos.');
        }

        const usuario = {
          nome: r.nome || r.usuario || r.name || r.Nome || r.NOME || 'Usuário',
          email: r.email || r.Email || r.EMAIL || email,
          role: String(r.role || r.perfil || r.Perfil || r.PERFIL || r.status || 'usuario').toLowerCase()
        };

        ESTADO.usuario = usuario;
        ESTADO.email = usuario.email;
        ESTADO.role = usuario.role;
        if (document.getElementById('lembrarEmail').checked) {
          localStorage.setItem('PSS_BOLAO_EMAIL', usuario.email);
        } else {
          localStorage.removeItem('PSS_BOLAO_EMAIL');
        }

        salvarSessao(usuario);

        toast('Acesso autorizado.', 'success');

        btn.disabled = false;
        btn.textContent = 'Entrar no sistema';

    function normalizarDashboard(dados) {
      const base = dados || {};
      const cards = base.cards || base.resumo || {};

      return {
        loteria: base.loteria || base.loteriaAtiva || base.Loteria_Ativa || cards.loteria || cards.loteriaAtiva || '',
        valorCota: base.valorCota || base.valor_cota || base.VALOR_COTA || cards.valorCota || 0,
        totalCotas: base.totalCotas || base.cotasTotal || base.COTAS_TOTAIS || cards.totalCotas || 0,
        cotasAdquiridas: base.cotasAdquiridas || base.COTAS_ADQUIRIDAS || cards.cotasAdquiridas || 0,
        valorMensal: base.valorMensal || base.VALOR_MENSAL || cards.valorMensal || 0,
        qtdParcelas: base.qtdParcelas || base.QTD_PARCELAS || cards.qtdParcelas || '',
        inicioPalpites: base.inicioPalpites || base.INI_PAL || cards.inicioPalpites || '',

    /********************************************************
     * BOLÕES
     ********************************************************/
    async function obterBoloesAtivos() {
      const r = await apiMulti([
        { action: 'getLoteriasPagamentoAtivas', args: [] },
        { action: 'listarBoloes', dados: { email: ESTADO.email }, args: [ESTADO.email] },
        { action: 'PSS_getEstruturaSubmenusBoloes', dados: { email: ESTADO.email }, args: [ESTADO.email] }
      ]);

      const lista = extrairLista(r, ['boloes', 'ativas', 'loterias', 'rows', 'lista', 'dados']);
      return normalizarListaBoloes(lista);
    }

    function extrairLista(obj, chaves = []) {
      if (Array.isArray(obj)) return obj;
      if (!obj || typeof obj !== 'object') return [];

      for (const k of chaves) {
        if (Array.isArray(obj[k])) return obj[k];
        if (obj[k] && typeof obj[k] === 'object') {
          const aninhada = extrairLista(obj[k], chaves);
          if (aninhada.length) return aninhada;
        }
      }

      return [];
    }

    function normalizarListaBoloes(lista) {
      return (lista || []).map((b, i) => {
        const nome = b.nome || b.loteria || b.NOME || b.LOTERIA || b.id || b.ID || `Bolão ${i + 1}`;
        return {
          id: b.id || b.ID || b.eventoId || b.EVENTO_ID || nome,
          nome,
          loteria: b.loteria || b.LOTERIA || nome,
          status: b.status || b.STATUS || 'ATIVO',
          dataSorteio: b.dataSorteio || b.DATA_SORTEIO || b.sorteio || b.SORTEIO || '-',
          inicioPagamento: b.inicioPagamento || b.INI_BOL || b.iniBol || b.inicioBolao || '-',
          fimPagamento: b.fimPagamento || b.FIM_BOL || b.fimBol || b.fimBolao || '-',
          inicioPalpite: b.inicioPalpite || b.INI_PAL || b.iniPal || '-',
          fimPalpite: b.fimPalpite || b.FIM_PAL || b.fimPal || '-',
          valorCota: b.valorCota || b.VALOR_COTA || b.valor || b.VALOR || 0,
          cotas: b.cotas || b.COTAS || b.cotasAdquiridas || '',
          recebedor: b.recebedor || b.RECEBEDOR || b.recebedorNome || ''
        };
      });
    }

          { action: 'getStatusPalpite', dados: { email: ESTADO.email, loteria: ESTADO.bolaoSelecionado }, args: [ESTADO.email, ESTADO.bolaoSelecionado] }
        ]).catch(() => ({}));

        ESTADO.podeEditarPalpite = status.podeEditar !== false;

        const numeros = ESTADO.palpiteInfo.numerosDisponiveis.length
          ? ESTADO.palpiteInfo.numerosDisponiveis
          : Array.from({ length: ESTADO.palpiteInfo.nMax || 60 }, (_, i) => i + 1);

        view(`
          <section class="grid">
            <div class="card col-12">
              <h2>Palpite — ${escapeHtml(ESTADO.palpiteInfo.nome)}</h2>

              <div class="numbers-grid" id="gridNumeros">

            <div class="hero-actions">
              <button class="btn btn-primary" onclick="navegar('boloes')">Selecionar bolão</button>
              <button class="btn btn-light" onclick="testarApiManual()">Testar API</button>
            </div>
          </div>
        `);
      }
    }

    function normalizarPalpiteInfo(info) {
      info = info || {};
      const nums = Array.isArray(info.numerosDisponiveis) ? info.numerosDisponiveis : [];
      return {
        nome: info.loteria || info.loteriaOriginal || ESTADO.bolaoSelecionado || 'Loteria',
        qtdEscolha: Number(info.qtdEscolha || info.qtd_palpites || info.qtdPalpite || 6),
        nMax: Number(info.nMax || info.range || info.max || 60),
        numerosDisponiveis: nums
      };
    }

    function renderResumoPalpites(status) {
      status = status || {};
      const palpites = Array.isArray(status.palpites) ? status.palpites : [];
      const maxJogos = Number(status.maxJogos || status.cotas || status.qtdCotas || 1);

      let html = `<div class="palpite-resumo">`;
      html += `<div class="palpite-box"><b>Resumo</b><br>Cotas: <b>${escapeHtml(maxJogos)}</b> • Palpites feitos: <b>${escapeHtml(palpites.length)}/${escapeHtml(maxJogos)}</b></div>`;

      if (status.msgErro || status.msg) {
        html += `<div class="notice warn">${escapeHtml(status.msgErro || status.msg)}</div>`;
      }

      palpites.forEach(p => {
        html += `
          <div class="palpite-box">
            <b>Palpite ${escapeHtml(p.jogo || p.slot || '')}</b>
            <div class="nums">${escapeHtml(p.numerosTexto || formatarNumeros(p.numeros))}</div>
            <small>Atualizado em: ${escapeHtml(p.data || p.atualizadoEm || '-')}</small>
          </div>
        `;
      });

      html += `</div>`;
      return html;
    }

    function toggleNumero(n, el) {
      if (!ESTADO.podeEditarPalpite) return;

      const idx = ESTADO.numerosSelecionados.indexOf(n);
      if (idx >= 0) {
        ESTADO.numerosSelecionados.splice(idx, 1);
        el.classList.remove('selected');
      } else {
        if (ESTADO.numerosSelecionados.length >= ESTADO.qtdEscolha) {
          toast(`Você já selecionou ${ESTADO.qtdEscolha} número(s).`, 'warn');
          return;
        }
        ESTADO.numerosSelecionados.push(n);
        el.classList.add('selected');
      }

      atualizarBotaoPalpite();
    }

    function atualizarBotaoPalpite() {
      const btn = document.getElementById('btnSalvarPalpite');
      if (!btn) return;
      const qtd = ESTADO.numerosSelecionados.length;
      btn.textContent = `CONFIRMAR PALPITE (${qtd}/${ESTADO.qtdEscolha})`;
      btn.disabled = !ESTADO.podeEditarPalpite || qtd !== ESTADO.qtdEscolha;
    }

    async function salvarPalpite() {
      const btn = document.getElementById('btnSalvarPalpite');
      btn.disabled = true;
      btn.textContent = 'SALVANDO...';

      try {
        const nums = ESTADO.numerosSelecionados.slice().sort((a, b) => a - b);

        const r = await apiMulti([
          { action: 'salvarPalpite', dados: { numeros: nums, email: ESTADO.email, jogo: ESTADO.palpiteSlot, loteria: ESTADO.bolaoSelecionado }, args: [nums, ESTADO.email, ESTADO.palpiteSlot, ESTADO.bolaoSelecionado] },
          { action: 'registrarPalpite', dados: { numeros: nums, email: ESTADO.email, loteria: ESTADO.bolaoSelecionado }, args: [ESTADO.email, ESTADO.bolaoSelecionado, nums] }
        ]);

        if (r && r.sucesso === false) throw new Error(r.msg || 'Não foi possível salvar o palpite.');
        toast((r && r.msg) || 'Palpite salvo com sucesso.', 'success');
        renderPalpites();
      } catch (err) {
        toast(err.message, 'error');
        atualizarBotaoPalpite();
      }
    }

    async function enviarComprovante(event) {
      event.preventDefault();

      const loteria = document.getElementById('uploadBolao').value;
      const fileInput = document.getElementById('arquivoComprovante');
      const file = fileInput.files[0];
      const btn = document.getElementById('btnEnviarComprovante');

      if (!loteria) return toast('Selecione o bolão/loteria do depósito.', 'error');
      if (!file) return toast('Selecione um arquivo.', 'error');

      ESTADO.bolaoSelecionado = loteria;
      localStorage.setItem('PSS_BOLAO_SELECIONADO', loteria);

      btn.disabled = true;
      btn.textContent = 'Enviando...';

      try {
        const base64 = await lerArquivoBase64(file);

        const r = await apiMulti([
          { action: 'uploadComprovante', dados: { fileData: base64, fileName: file.name, mimeType: file.type, email: ESTADO.email, loteria }, args: [base64, file.name, ESTADO.email, loteria] },
          { action: 'enviarComprovante', dados: { fileData: base64, fileName: file.name, mimeType: file.type, email: ESTADO.email, loteria }, args: [base64, file.name, ESTADO.email, loteria] }
        ]);

        if (r && r.sucesso === false) throw new Error(r.msg || 'Não foi possível enviar o comprovante.');

        toast((r && r.msg) || 'Comprovante enviado com sucesso.', 'success');
        fileInput.value = '';
        renderComprovante();
      } catch (err) {
        toast(err.message, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Enviar agora';
      }
    }

    function lerArquivoBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = e => resolve(e.target.result);
        reader.onerror = () => reject(new Error('Erro ao ler o arquivo.'));
        reader.readAsDataURL(file);
      });
    }

    async function renderPagamentos() {
      loading('Carregando pagamentos');

        ]).catch(() => []);

          </div>
        `);
      }
    }

    function normalizarResumoFinanceiro(dem, lista) {
      const obj = dem && typeof dem === 'object' && !Array.isArray(dem) ? dem : {};
      const totalPago = obj.totalPago || obj.pago || obj.total_pago || obj.TOTAL_PAGO || somarPossiveis(lista, ['pago', 'totalPago', 'valorPago', 'VALOR_PAGO', 'PAGO']);
      const restante = obj.restante || obj.pendente || obj.valorRestante || obj.RESTANTE || somarPossiveis(lista, ['restante', 'pendente', 'valorRestante', 'RESTANTE', 'PENDENTE']);
      return { totalPago: num(totalPago), restante: num(restante) };
    }

    function renderDemonstrativo(lista, resumo = null) {
      lista = Array.isArray(lista) ? lista : [];
      if (!lista.length) {
        if (resumo && (num(resumo.totalPago) || num(resumo.restante))) {
          return `
            <div class="table-wrap">
              <table>
                <thead>
                  <tr><th>Nome</th><th>Pago</th><th>Restante</th><th>Status</th></tr>
                </thead>
                <tbody>
                  <tr>
                    <td>${escapeHtml(ESTADO.usuario.nome || '-')}</td>
                    <td>${moeda(resumo.totalPago || 0)}</td>
                    <td>${moeda(resumo.restante || 0)}</td>
                    <td><span class="tag ${num(resumo.restante) > 0 ? 'warn' : ''}">${num(resumo.restante) > 0 ? 'Pendente' : 'Em dia'}</span></td>
                  </tr>
                </tbody>
              </table>
            </div>
          `;
        }
        return `<div class="notice warn">Nenhum resumo financeiro localizado.</div>`;
      }

      return `
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>Nome</th><th>Pago</th><th>Restante</th><th>Status</th></tr>
            </thead>
            <tbody>
              ${lista.map(r => {
                const pago = valorPorChaves(r, ['pago', 'totalPago', 'valorPago', 'VALOR_PAGO', 'PAGO']);
                const restante = valorPorChaves(r, ['restante', 'pendente', 'valorRestante', 'RESTANTE', 'PENDENTE']);
                return `
                  <tr>
                    <td>${escapeHtml(r.nome || r.participante || r.NOME || r.PARTICIPANTE || ESTADO.usuario.nome || '-')}</td>
                    <td>${moeda(pago || 0)}</td>
                    <td>${moeda(restante || 0)}</td>
                    <td><span class="tag ${num(restante) > 0 ? 'warn' : ''}">${num(restante) > 0 ? 'Pendente' : 'Em dia'}</span></td>
                  </tr>
                `;
              }).join('')}
            </tbody>
          </table>
        </div>
      `;
    }
    function somarPossiveis(lista, chaves) {
      return (Array.isArray(lista) ? lista : []).reduce((acc, item) => acc + num(valorPorChaves(item, chaves)), 0);
    }

    function valorPorChaves(obj, chaves) {
      if (!obj || typeof obj !== 'object') return '';
      for (const k of chaves) {
        if (obj[k] !== undefined && obj[k] !== null && obj[k] !== '') return obj[k];
      }
      return '';
    }

    async function renderRegulamento() {
      loading('Carregando regulamento');

      try {
        const txt = await apiMulti([
          { action: 'getRegulamento', args: [] },
          { action: 'getRegulamentoCadastro', args: [] },
          { action: 'obterRegulamento', args: [] }
        ]);

        const conteudo = typeof txt === 'string'
          ? txt
          : (txt.texto || txt.regulamento || 'Regulamento definido pela administração.');

        view(`
          <div class="card">
            <h2>Regulamento</h2>
            <div style="white-space:pre-wrap;line-height:1.7;color:#334155;">${escapeHtml(conteudo)}</div>
          </div>
        `);
      } catch (err) {
        view(`<div class="card"><div class="notice error">${escapeHtml(err.message)}</div></div>`);
      }
    }

    /********************************************************
     * ADMIN
     ********************************************************/
    async function renderAdmin() {
      if (!isAdmin()) {
        view(`<div class="card"><div class="notice error">Acesso restrito ao administrador.</div></div>`);
        return;
      }

      view(`
        <section class="grid">
          <div class="card col-12">
            <h2>Administração</h2>
            <p>Escolha uma aba para consultar os dados administrativos.</p>
            <div class="hero-actions">
              <button class="btn btn-primary" onclick="carregarAbaAdmin('SOLICITACOES_CADASTRO')">Solicitações cadastro</button>
              <button class="btn btn-light" onclick="carregarAbaAdmin('Usuarios')">Usuários</button>
              <button class="btn btn-light" onclick="carregarAbaAdmin('PAGAMENTOS')">Pagamentos</button>
              <button class="btn btn-light" onclick="carregarAbaAdmin('BASE_LOTERIAS')">Base loterias</button>
              <button class="btn btn-light" onclick="carregarAbaAdmin('EVENTOS_ESPECIAIS')">Eventos especiais</button>
              <button class="btn btn-light" onclick="carregarAbaAdmin('Config')">Config</button>
              <button class="btn btn-light" onclick="testarApiManual()">Testar API</button>
            </div>
          </div>
          <div class="card col-12" id="adminConteudo">
            <div class="notice info">Selecione uma aba acima.</div>
          </div>
        </section>
      `);
    }

    async function carregarAbaAdmin(nomeAba) {
      const box = document.getElementById('adminConteudo');
      box.innerHTML = `<h2>${escapeHtml(nomeAba)}</h2><p>Carregando...</p>`;

      try {
        const r = await apiMulti([
          { action: 'getDadosAdmin', dados: { nomeAba, email: ESTADO.email }, args: [nomeAba, ESTADO.email] },
          { action: 'listarAbaAdmin', dados: { nomeAba, email: ESTADO.email }, args: [nomeAba, ESTADO.email] }
        ]);

        const dados = r || {};
        const headers = dados.headers || dados.cabecalhos || [];
        const rows = dados.rows || dados.linhas || extrairLista(dados, ['dados', 'lista', 'rows']);

        if (!headers.length && rows.length && Array.isArray(rows[0])) {
          box.innerHTML = renderTabelaAdmin(nomeAba, rows[0], rows.slice(1));
          return;
        }

        if (!headers.length) {
          box.innerHTML = `<h2>${escapeHtml(nomeAba)}</h2><div class="notice warn">Aba sem dados ou não localizada.</div>`;
          return;
        }

        box.innerHTML = renderTabelaAdmin(nomeAba, headers, rows);
      } catch (err) {
        box.innerHTML = `<h2>${escapeHtml(nomeAba)}</h2><div class="notice error">${escapeHtml(err.message)}</div>`;
      }
    }

    function renderTabelaAdmin(nomeAba, headers, rows) {
      return `
        <h2>${escapeHtml(String(nomeAba).replace(/_/g, ' '))}</h2>
        <div class="table-wrap">
          <table>
            <thead><tr>${headers.map(h => `<th>${escapeHtml(h)}</th>`).join('')}</tr></thead>
            <tbody>
              ${(rows || []).map(row => {
                const arr = Array.isArray(row) ? row : headers.map(h => row[h] || row[normalizar(h)] || '');
                return `<tr>${arr.map(cell => `<td>${formatarCelulaAdmin(cell)}</td>`).join('')}</tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>
      `;
    }

    function formatarCelulaAdmin(cell) {
      const s = String(cell === undefined || cell === null ? '' : cell);
      if (s.startsWith('http')) return `<a class="tag info" href="${escapeAttr(s)}" target="_blank" rel="noopener">Abrir</a>`;
      return escapeHtml(s || '-');
    }

    /********************************************************
     * MODAL / TOAST
     ********************************************************/
    function abrirModal(titulo, html) {
      document.getElementById('modalTitulo').textContent = titulo;
      document.getElementById('modalConteudo').innerHTML = html;
      document.getElementById('modalBackdrop').classList.add('open');
    }

    function fecharModal() {
      document.getElementById('modalBackdrop').classList.remove('open');
    }

    document.getElementById('modalBackdrop').addEventListener('click', (ev) => {
      if (ev.target.id === 'modalBackdrop') fecharModal();
    });

    function toast(msg, type = 'success') {
      const container = document.getElementById('toastContainer');
      const el = document.createElement('div');
      el.className = `toast ${type}`;
      el.textContent = msg;
      container.appendChild(el);
      setTimeout(() => {
        el.style.opacity = '0';
        el.style.transform = 'translateY(10px)';
        setTimeout(() => el.remove(), 250);
      }, 3800);
    }

    /********************************************************
     * HELPERS
     ********************************************************/
    function atualizarRelogio() {
      const el = document.getElementById('clock');
      if (el) el.textContent = dataHoraAtual();
    }

    function dataHoraAtual() {
      return new Date().toLocaleString('pt-BR', {
        timeZone: 'America/Sao_Paulo',
        day: '2-digit',
        month: '2-digit',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      }).replace(',', '');
    }

    function moeda(valor) {
      const n = num(valor);
      return n.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }

    function num(v) {
      if (typeof v === 'number') return isNaN(v) ? 0 : v;
      const s = String(v || '0')
        .replace(/R\$/g, '')
        .replace(/\s/g, '')
        .replace(/\./g, '')
        .replace(',', '.')
        .replace(/[^0-9.\-]/g, '');
      const n = Number(s);
      return isNaN(n) ? 0 : n;
    }

    function normalizar(s) {
      return String(s || '')
        .trim()
        .toUpperCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '');
    }

    function validarEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(String(email || '').trim());
    }

    function escapeHtml(value) {
      return String(value === undefined || value === null ? '' : value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, '&#096;');
    }

    function formatNum(n) {
      const x = Number(n);
      if (isNaN(x)) return escapeHtml(n);
      return x < 10 ? '0' + x : String(x);
    }

    function formatarNumeros(nums) {
      if (!nums) return '';
      const arr = Array.isArray(nums)
        ? nums
        : String(nums).split(/[-,;\s]+/).filter(Boolean);
      return arr.map(formatNum).join('-');
    }

    function classeStatus(status) {
      const s = normalizar(status);
      if (s.includes('PAGO') || s.includes('APROV')) return '';
      if (s.includes('ERRO') || s.includes('RECUS') || s.includes('DUPLIC')) return 'danger';
      if (s.includes('PEND') || s.includes('ANALISE') || s.includes('ANÁLISE')) return 'warn';
      return 'info';
    }
  </script>
