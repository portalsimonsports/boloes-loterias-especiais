    const CONFIG={apiUrl:'https://script.google.com/macros/s/AKfycbxUkLEyfR76jVncO-HwhfS-yLM7aLXCTf7oG4h-uOGsnFk6Oda3vTm8MQ-OIh2-Ohy8/exec',versao:'V202_FIX_TELA_BRANCA_BADGE_INSCRITOS_QR_VISUAL',versaoRegulamento:'2026.1'};

    const FIREBASE_CONFIG={

      projectId:"boloes-loterias-especiais",

    let FIREBASE_APP=null,FIREBASE_AUTH=null,FIREBASE_DB=null,FIREBASE_INIT_PROMISE=null;

    function firebaseEmailKey_(email){
      return String(email||'').trim().toLowerCase();
    }

    function aguardarGlobalFirebase_(timeoutMs){
      timeoutMs=timeoutMs||9000;
      return new Promise((resolve,reject)=>{
        const ini=Date.now();
        (function checar(){
          if(window.firebase && firebase.auth && firebase.firestore) return resolve(true);
          if(Date.now()-ini>timeoutMs) return reject(new Error('Firebase não carregou. Verifique conexão, bloqueio do navegador ou scripts do Firebase.'));
          setTimeout(checar,120);
        })();
      });
    }

    async function inicializarFirebase_(){
      if(FIREBASE_AUTH&&FIREBASE_DB)return {auth:FIREBASE_AUTH,db:FIREBASE_DB};
      if(FIREBASE_INIT_PROMISE)return FIREBASE_INIT_PROMISE;
      FIREBASE_INIT_PROMISE=(async()=>{
        await aguardarGlobalFirebase_(10000);
        FIREBASE_APP=(firebase.apps&&firebase.apps.length)?firebase.app():firebase.initializeApp(FIREBASE_CONFIG);
        FIREBASE_AUTH=firebase.auth();
        FIREBASE_DB=firebase.firestore();
        try{await FIREBASE_AUTH.setPersistence(firebase.auth.Auth.Persistence.LOCAL);}catch(e){}
        return {auth:FIREBASE_AUTH,db:FIREBASE_DB};
      })();
      return FIREBASE_INIT_PROMISE;
    }

    function firebaseUsuarioRef_(email){
      if(!FIREBASE_DB)throw new Error('Firestore não inicializado.');
      return FIREBASE_DB.collection('usuarios').doc(firebaseEmailKey_(email));
    }

    function firebaseNormalizarPerfil_(snap,emailPadrao){
      if(!snap||!snap.exists)throw new Error('Cadastro não localizado no Firebase. Aguarde aprovação da administração.');
      const d=snap.data()||{};
      const status=String(d.status||'').trim().toUpperCase();
      const perfil=String(d.perfil||'USUARIO').trim().toUpperCase();
      const ativo=d.ativo===true || String(d.ativo||'').toUpperCase()==='TRUE' || String(d.ativo||'').toUpperCase()==='SIM';
      if(!ativo)throw new Error('Cadastro inativo ou bloqueado.');
      if(status!=='APROVADO')throw new Error('Cadastro ainda não aprovado pela administração.');
      return {
        nome:String(d.nome||d.name||emailPadrao||'Usuário').trim()||'Usuário',
        email:firebaseEmailKey_(d.email||emailPadrao),
        perfil:perfil,
        role:perfil.indexOf('ADMIN')>=0?'admin':'usuario',
        status:status,
        ativo:true
      };
    }

    async function firebaseValidarUsuarioAprovado_(email){
      const key=firebaseEmailKey_(email);
      if(!key)throw new Error('E-mail inválido para validação no Firebase.');
      await inicializarFirebase_();
      const snap=await firebaseUsuarioRef_(key).get({source:'default'});
      return firebaseNormalizarPerfil_(snap,key);
    }

    async function firebaseCriarUsuarioPendente_(dados){
      dados=dados||{};
      const email=firebaseEmailKey_(dados.email);
      if(!email)throw new Error('E-mail inválido.');
      await inicializarFirebase_();
      await firebaseUsuarioRef_(email).set({
        email:email,
        nome:String(dados.nome||'').trim(),
        cpf:String(dados.cpf||'').trim(),
        telefone:String(dados.telefone||'').trim(),
        loteria:String(dados.loteria||'').trim(),
        cotas:Number(dados.cotas||1)||1,
        status:'PENDENTE',
        perfil:'USUARIO',
        ativo:false,
        origem:'SITE_CADASTRO',
        receberAvisoNovoBolao:String(dados.receberAvisoNovoBolao||'SIM').toUpperCase()==='SIM',
        atualizadoEm:firebase.firestore.FieldValue.serverTimestamp(),
        criadoEm:firebase.firestore.FieldValue.serverTimestamp()
      },{merge:true});
    }

    async function firebaseSincronizarUsuarioAdmin_(dados){
      dados=dados||{};
      const email=firebaseEmailKey_(dados.email);
      if(!email)return;

    function firebaseMensagemErro_(err){
      const code=String((err&&err.code)||'');
      const msg=String((err&&err.message)||err||'Erro ao acessar.');
      if(code==='auth/user-not-found'||code==='auth/invalid-credential'||code==='auth/wrong-password')return 'E-mail ou senha inválidos no Firebase.';
      if(code==='auth/email-already-in-use')return 'Este e-mail já existe no Firebase. Use “Esqueci a senha” ou aguarde aprovação.';
      if(code==='auth/weak-password')return 'A senha precisa ter pelo menos 6 caracteres.';
      if(code==='auth/too-many-requests')return 'Muitas tentativas. Aguarde alguns minutos e tente novamente.';
      if(code==='auth/network-request-failed')return 'Falha de rede ao acessar o Firebase.';
      return msg;
    }

    function api(action,dados={},args=null){
      const executar=()=>apiHibridaComFallback_(action,dados,args);

    function apiHibridaComFallback_(action,dados={},args=null){
      return apiJsonpDireto_(action,dados,args,18000)
        .catch(()=>apiPostMessageBridge_(action,dados,args,22000))
        .catch(()=>apiWindowNameBridge_(action,dados,args,30000));
    }

    function montarPayloadApi_(action,dados,args){
      const payload=Object.assign({},dados||{});
      payload.action=action;
      payload.fnName=action;
      if(Array.isArray(args))payload.args=args;
      return payload;
    }

    function tratarRespostaApi_(r){
      if(!r||r.ok!==true){
        throw new Error((r&&(r.erro||r.msg))||'Erro retornado pela API.');
      }
      return r.dados!==undefined?r.dados:(r.result!==undefined?r.result:r);
    }

    function apiJsonpDireto_(action,dados={},args=null,timeoutMs=18000){
      return new Promise((resolve,reject)=>{
        const cb='PSS_CB_'+Date.now()+'_'+Math.floor(Math.random()*1e9);
        const payload=montarPayloadApi_(action,dados,args);

        const params=new URLSearchParams();
        params.set('action',action);
        params.set('fn',action);
        params.set('fnName',action);
        params.set('callback',cb);
        params.set('payload',JSON.stringify(payload));
        params.set('email',ESTADO.email||dados.email||'');
        params.set('_',String(Date.now()));

        const script=document.createElement('script');
        let finalizado=false;

        const aliases=[cb,'callback','teste'];
        const anteriores={};
        aliases.forEach(n=>anteriores[n]=window[n]);

        function limpar(){
          aliases.forEach(n=>{
            try{
              if(anteriores[n]===undefined)delete window[n];
              else window[n]=anteriores[n];
            }catch(e){window[n]=anteriores[n];}
          });
          if(script&&script.parentNode)script.parentNode.removeChild(script);
        }

        const handler=r=>{
          if(finalizado)return;
          finalizado=true;
          clearTimeout(timer);
          limpar();
          try{resolve(tratarRespostaApi_(r));}catch(e){reject(e);}
        };

        aliases.forEach(n=>{window[n]=handler;});

        const timer=setTimeout(()=>{
          if(finalizado)return;
          finalizado=true;
          limpar();
          reject(new Error('Tempo limite JSONP.'));
        },timeoutMs);

        script.onerror=()=>{
          if(finalizado)return;
          finalizado=true;
          clearTimeout(timer);
          limpar();
          reject(new Error('Falha JSONP.'));
        };

        script.async=true;
        script.src=CONFIG.apiUrl+'?'+params.toString();
        document.body.appendChild(script);
      });
    }

    function apiPostMessageBridge_(action,dados={},args=null,timeoutMs=22000){
      return new Promise((resolve,reject)=>{
        const token='PSSBRIDGE_'+Date.now()+'_'+Math.floor(Math.random()*1e9);
        const payload=montarPayloadApi_(action,dados,args);

        const params=new URLSearchParams();
        params.set('mode','bridge');
        params.set('action',action);
        params.set('fn',action);
        params.set('fnName',action);
        params.set('payload',JSON.stringify(payload));
        params.set('email',ESTADO.email||dados.email||'');
        params.set('token',token);
        params.set('_',String(Date.now()));

        const iframe=document.createElement('iframe');
        iframe.style.position='fixed';
        iframe.style.left='-9999px';
        iframe.style.top='-9999px';
        iframe.style.width='1px';
        iframe.style.height='1px';
        iframe.style.opacity='0';
        iframe.style.pointerEvents='none';
        iframe.setAttribute('aria-hidden','true');

        let finalizado=false;

        function limpar(){
          window.removeEventListener('message',receber);
          if(iframe&&iframe.parentNode)iframe.parentNode.removeChild(iframe);
        }

        const timer=setTimeout(()=>{
          if(finalizado)return;
          finalizado=true;
          limpar();
          reject(new Error('Tempo limite postMessage.'));
        },timeoutMs);

        function normalizarMensagemBridge_(data){
          if(!data)return null;
          if(typeof data==='string'){
            try{
              const parsed=JSON.parse(data);
              if(parsed&&parsed.pssBoloesApi===true)return parsed;
            }catch(e){}
            return null;
          }
          if(typeof data==='object'&&data.pssBoloesApi===true)return data;
          return null;
        }

        function receber(ev){
          const msg=normalizarMensagemBridge_(ev&&ev.data);
          if(!msg||msg.token!==token)return;
          if(finalizado)return;
          finalizado=true;
          clearTimeout(timer);
          limpar();

          try{resolve(tratarRespostaApi_(msg.response));}catch(e){reject(e);}
        }

        window.addEventListener('message',receber);
        document.body.appendChild(iframe);
        iframe.src=CONFIG.apiUrl+'?'+params.toString();
      });
    }

    function apiWindowNameBridge_(action,dados={},args=null,timeoutMs=30000){
      return new Promise((resolve,reject)=>{
        const token='PSSWN_'+Date.now()+'_'+Math.floor(Math.random()*1e9);
        const payload=montarPayloadApi_(action,dados,args);
        const returnUrl=location.origin+location.pathname+'?pss_bridge_return=1&v='+encodeURIComponent(CONFIG.versao)+'&t='+Date.now();

        const params=new URLSearchParams();
        params.set('mode','windowname');
        params.set('action',action);
        params.set('fn',action);
        params.set('fnName',action);
        params.set('payload',JSON.stringify(payload));
        params.set('email',ESTADO.email||dados.email||'');
        params.set('token',token);
        params.set('returnUrl',returnUrl);
        params.set('_',String(Date.now()));

        const iframe=document.createElement('iframe');
        iframe.style.position='fixed';
        iframe.style.left='-9999px';
        iframe.style.top='-9999px';
        iframe.style.width='1px';
        iframe.style.height='1px';
        iframe.style.opacity='0';
        iframe.style.pointerEvents='none';
        iframe.setAttribute('aria-hidden','true');

        let finalizado=false;

        function limpar(){
          if(iframe&&iframe.parentNode)iframe.parentNode.removeChild(iframe);
        }

        const timer=setTimeout(()=>{
          if(finalizado)return;
          finalizado=true;
          limpar();
          reject(new Error('Tempo limite window.name.'));
        },timeoutMs);

        function tentarLer(){
          if(finalizado)return;

          try{
            const raw=iframe.contentWindow&&iframe.contentWindow.name?iframe.contentWindow.name:'';
            if(raw){
              const msg=JSON.parse(raw);
              if(msg&&msg.pssBoloesApi===true&&msg.token===token){
                finalizado=true;
                clearTimeout(timer);
                limpar();
                try{resolve(tratarRespostaApi_(msg.response));}catch(e){reject(e);}
                return;
              }
            }
          }catch(e){}

          setTimeout(tentarLer,250);
        }

        iframe.onload=()=>setTimeout(tentarLer,80);
        document.body.appendChild(iframe);
        iframe.src=CONFIG.apiUrl+'?'+params.toString();
        setTimeout(tentarLer,400);
      });
    }

    function apiPostFormWindowName_(action,dados={},args=null,timeoutMs=90000){
      return new Promise((resolve,reject)=>{
        const token='PSSPOST_'+Date.now()+'_'+Math.floor(Math.random()*1e9);
        const payload=montarPayloadApi_(action,dados,args);

        const iframe=document.createElement('iframe');
        iframe.name='pss_upload_iframe_'+token;
        iframe.style.position='fixed';
        iframe.style.left='-9999px';
        iframe.style.top='-9999px';
        iframe.style.width='1px';
        iframe.style.height='1px';
        iframe.style.opacity='0';
        iframe.style.pointerEvents='none';
        iframe.setAttribute('aria-hidden','true');

        const form=document.createElement('form');
        form.method='POST';
        form.action=CONFIG.apiUrl;
        form.target=iframe.name;
        form.acceptCharset='UTF-8';
        form.enctype='application/x-www-form-urlencoded';
        form.style.display='none';

        function add(name,value){
          const input=document.createElement('input');
          input.type='hidden';
          input.name=name;
          input.value=value==null?'':String(value);
          form.appendChild(input);
        }

        add('mode','postmessage');
        add('action',action);
        add('fn',action);
        add('fnName',action);
        add('callback','callback');
        add('token',token);
        add('email',ESTADO.email||dados.email||'');
        add('payload',JSON.stringify(payload));
        add('_',String(Date.now()));

        let finalizado=false;
        let timer=null;

        function limpar(){
          window.removeEventListener('message',onMessage);
          if(form&&form.parentNode)form.parentNode.removeChild(form);
          if(iframe&&iframe.parentNode)iframe.parentNode.removeChild(iframe);
        }

        function finalizarOk(resposta){
          if(finalizado)return;
          finalizado=true;
          clearTimeout(timer);
          limpar();
          try{resolve(tratarRespostaApi_(resposta));}catch(e){reject(e);}
        }

        function finalizarErro(err){
          if(finalizado)return;
          finalizado=true;
          clearTimeout(timer);
          limpar();
          reject(err instanceof Error?err:new Error(String(err||'Falha no envio.')));
        }

        function onMessage(ev){
          if(finalizado)return;

          let msg=ev.data;
          if(typeof msg==='string'){
            try{msg=JSON.parse(msg);}catch(e){}
          }

          if(msg&&msg.pssBoloesApi===true&&msg.token===token){
            finalizarOk(msg.response);
          }
        }

        function tentarWindowNameFallback(){
          if(finalizado)return;
          try{
            const raw=iframe.contentWindow&&iframe.contentWindow.name?iframe.contentWindow.name:'';
            if(raw){
              const msg=JSON.parse(raw);
              if(msg&&msg.pssBoloesApi===true&&msg.token===token){
                finalizarOk(msg.response);
                return;
              }
            }
          }catch(e){}
          setTimeout(tentarWindowNameFallback,500);
        }

        window.addEventListener('message',onMessage);

        timer=setTimeout(()=>{
          finalizarErro(new Error('Tempo limite ao enviar arquivo. O servidor não confirmou o recebimento.'));
        },timeoutMs);

        iframe.onerror=()=>finalizarErro(new Error('Falha ao abrir canal de upload.'));
        iframe.onload=()=>setTimeout(tentarWindowNameFallback,150);

        document.body.appendChild(iframe);
        document.body.appendChild(form);

        try{
          form.submit();
          setTimeout(tentarWindowNameFallback,800);
        }catch(err){
          finalizarErro(err);
        }
      });
    }

    /**************** CACHE E PRÉ-CARREGAMENTO — V165 ****************/

    const CACHE_TTL = {
      curto: 2 * 60 * 1000,
      medio: 10 * 60 * 1000,
      longo: 6 * 60 * 60 * 1000
    };

    function cacheKey_(nome){
      return 'PSS_BOLAO_CACHE_' + CONFIG.versao + '_' + nome;
    }

    function cacheSet_(nome,dados,ttlMs){
      try{
        localStorage.setItem(cacheKey_(nome),JSON.stringify({
          ts:Date.now(),
          ttl:ttlMs||CACHE_TTL.medio,
          dados:dados
        }));
      }catch(e){}
    }

    function cacheGet_(nome,aceitarExpirado=false){
      try{
        const raw=localStorage.getItem(cacheKey_(nome));
        if(!raw)return null;
        const obj=JSON.parse(raw);
        if(!obj||obj.dados===undefined)return null;
        const expirado=Date.now()-(obj.ts||0)>(obj.ttl||CACHE_TTL.medio);
        if(expirado&&!aceitarExpirado)return null;
        return obj.dados;
      }catch(e){
        return null;
      }
    }

    function cacheDel_(nome){
      try{localStorage.removeItem(cacheKey_(nome));}catch(e){}
    }

    function promiseTimeout_(promise,ms,msg){
      let timer=null;
      const tempo=new Promise((_,reject)=>{
        timer=setTimeout(()=>reject(new Error(msg||'Tempo limite excedido.')),ms);
      });
      return Promise.race([promise,tempo]).finally(()=>clearTimeout(timer));
    }

    function cacheKeyLoteria_(prefixo,loteria){
      return prefixo + '_' + normalizar(loteria||'geral').replace(/[^A-Z0-9]+/g,'_');
    }

    async function apiCached_(cacheNome,ttlMs,loader,opts={}){
      const cached=cacheGet_(cacheNome,!!opts.aceitarExpirado);
      if(cached!==null&&opts.usarCachePrimeiro!==false){
        if(opts.atualizarSegundoPlano!==false){
          loader().then(d=>{
            cacheSet_(cacheNome,d,ttlMs);
            if(typeof opts.onRefresh==='function')opts.onRefresh(d);
          }).catch(()=>{});
        }
        return cached;
      }

      const dados=await loader();
      cacheSet_(cacheNome,dados,ttlMs);
      return dados;
    }

    async function carregarBoloes(usarCacheRapido=false){
      const cacheNome=ESTADO.email?'boloes_'+normalizar(ESTADO.email).replace(/[^A-Z0-9]+/g,'_'):'boloes_publicos';
      const cached=cacheGet_(cacheNome,true);

      if(usarCacheRapido&&cached){
        ESTADO.boloes=listaSegura_(cached);
        return ESTADO.boloes;
      }

      const loader=async()=>{
        const lista=await promiseTimeout_(apiMulti([{action:'getLoteriasPagamentoAtivas',args:[]},{action:'listarBoloes',args:[ESTADO.email]}]),16000,'Tempo limite ao carregar bolões.');
        const arr=Array.isArray(lista)?lista:(lista.boloes||lista.ativas||[]),map={};
        arr.forEach(b=>{
          const nome=b.loteria||b.nome||b.NOME||b.id||'';
          if(!nome)return;
          const key=normalizar(nome+'|'+(b.dataSorteio||b.sorteio||''));
          const item={
            id:b.id||b.ID||b.eventoId||b.EVENTO_ID||nome,
            nome:b.nome||b.NOME||nome,
            loteria:b.loteria||b.LOTERIA||nome,
            status:b.status||b.STATUS||'ATIVO',
            dataSorteio:b.dataSorteio||b.DATA_SORTEIO||b.sorteio||'',
            inicioPagamento:b.inicioPagamento||b.INI_BOL||b.iniBol||b.INICIO_PAGAMENTO||'',
            fimPagamento:b.fimPagamento||b.FIM_BOL||b.fimBol||b.FIM_PAGAMENTO||'',
            inicioPalpite:b.inicioPalpite||b.inicioPalpites||b.INI_PAL||b.iniPal||b.INICIO_PALPITES||'',
            fimPalpite:b.fimPalpite||b.fimPalpites||b.FIM_PAL||b.fimPal||b.PRAZO_PALPITES||'',
            valorCota:b.valorCota||b.VALOR_COTA||'',
            totalCotas:b.totalCotas||b.cotasTotal||b.TOTAL_COTAS||b.COTAS_TOTAL||'',
            cotasTotal:b.cotasTotal||b.totalCotas||b.TOTAL_COTAS||b.COTAS_TOTAL||'',
            cotasAdquiridas:b.cotasAdquiridas||b.cotasTotaisAdquiridas||b.COTAS_TOTAIS_ADQUIRIDAS||b.COTAS_ADQUIRIDAS||0,
            cotasDisponiveis:(b.cotasDisponiveis!==undefined?b.cotasDisponiveis:(b.cotasDisponíveis!==undefined?b.cotasDisponíveis:'')),
            qtdParcelas:b.qtdParcelas||b.QTD_PARCELAS||'1',
            premiacao:b.premiacao||b.premiacaoEstimado||b.premioEstimado||b.PREMIACAO||b.PREMIO||'',
            premioPorCota:b.premioPorCota||b.premiacaoPorCota||b.PREMIO_POR_COTA||b.PREMIACAO_POR_COTA||b.PREMIO_COTA||b.valorPremioPorCota||'',
            range:b.range||b.RANGE||'',
            qtdMin:b.qtdMin||b.QTD_MIN||'',
            qtdMax:b.qtdMax||b.QTD_MAX||'',
            qtdPalpite:b.qtdPalpite||b.QTD_PALPITE||b.qtdEscolha||b.qtdEscolhaPalpite||'',
            participanteInscrito:b.participanteInscrito!==false
          };
          if((item.cotasDisponiveis===''||item.cotasDisponiveis===undefined) && item.totalCotas!=='') item.cotasDisponiveis=Math.max(0,num(item.totalCotas)-num(item.cotasAdquiridas));
          if(!map[key]) map[key]=item;
          else map[key]=Object.assign(map[key],Object.fromEntries(Object.entries(item).filter(([k,v])=>v!==''&&v!==undefined&&v!==null)));
        });
        return Object.values(map).sort((a,b)=>String(a.dataSorteio).localeCompare(String(b.dataSorteio)));
      };

      if(cached){
        ESTADO.boloes=listaSegura_(cached);
        loader().then(novos=>{
          ESTADO.boloes=listaSegura_(novos);
          cacheSet_(cacheNome,ESTADO.boloes,CACHE_TTL.curto);
        }).catch(()=>{});
        return ESTADO.boloes;
      }

      const novos=listaSegura_(await loader());
      ESTADO.boloes=novos;
      cacheSet_(cacheNome,novos,CACHE_TTL.curto);
      return novos;
    }

          ${isPix?`

    function labelTipoRecebimento_(tipo){
      const t=normalizar(tipo);
      if(t.includes('DADOS')&&t.includes('PIX'))return 'Pix + dados bancários';
      if(t.includes('DADOS')||t.includes('BANC'))return 'Dados bancários';
      if(t.includes('PIX'))return 'PIX';
      return String(tipo||'Recebimento').replace(/_/g,' ');
    }

    function copiarTextoPagamento(txt){
      txt=String(txt||'').trim();
      if(!txt)return toast('Nada para copiar.','warn');
      if(navigator.clipboard&&navigator.clipboard.writeText){
        navigator.clipboard.writeText(txt).then(()=>toast('Código copiado.')).catch(()=>toast('Não foi possível copiar automaticamente.','warn'));

    function gerarPixCopiaECola_(m,valor,loteria){
      const chave=String(m.chavePix||'').trim();
      if(!chave)return '';
      const nome=sanitizarPix_(m.nomeCompleto||'PORTAL SIMONSPORTS').slice(0,25)||'PORTAL SIMONSPORTS';
      const cidade='SAO PAULO';
      const txid=sanitizarPix_((loteria||'BOLAO').replace(/\s+/g,'')).slice(0,25)||'BOLAO';
      const gui=tlvPix_('00','br.gov.bcb.pix')+tlvPix_('01',chave);
      let payload='000201'+tlvPix_('26',gui)+'52040000'+'5303986';
      if(valor&&valor>0)payload+=tlvPix_('54',Number(valor).toFixed(2));
      payload+='5802BR'+tlvPix_('59',nome)+tlvPix_('60',cidade)+tlvPix_('62',tlvPix_('05',txid))+'6304';
      return payload+crc16Pix_(payload);
    }

    function tlvPix_(id,value){
      value=String(value||'');
      return id+String(value.length).padStart(2,'0')+value;
    }

    function sanitizarPix_(s){
      return String(s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^A-Za-z0-9 ]/g,'').toUpperCase().trim();
    }

    function crc16Pix_(payload){
      let crc=0xFFFF;
      for(let i=0;i<payload.length;i++){
        crc^=payload.charCodeAt(i)<<8;
        for(let j=0;j<8;j++){
          crc=(crc&0x8000)?((crc<<1)^0x1021):(crc<<1);
          crc&=0xFFFF;
        }
      }
      return crc.toString(16).toUpperCase().padStart(4,'0');
    }

    function qrUrl_(text){
      return 'https://api.qrserver.com/v1/create-qr-code/?size=220x220&data='+encodeURIComponent(text||'');
    }

      const input=document.getElementById('arquivoComprovante');
      const file=input&&input.files?input.files[0]:null;

    async function carregarJogosRealizadosBolao(){
      const box=document.getElementById('jogosRealizadosConteudo');
      const sel=document.getElementById('jogosBolao');
      if(!box||!sel)return;

      const loteria=sel.value;
      ESTADO.bolaoSelecionado=loteria;
      localStorage.setItem('PSS_BOLAO_SELECIONADO',loteria);

      const cacheNome=cacheKeyLoteria_('jogos',loteria);
      const cached=cacheGet_(cacheNome,true);

      if(cached){
        const listaCache=extrairListaGenericaJogos_(cached);
        box.innerHTML=renderListaJogosRealizados(listaCache,loteria)+`<div class="cache-hint ok">Jogos exibidos imediatamente. Atualizando em segundo plano...</div>`;
      }else{
        box.innerHTML='<div class="notice info"><span class="loading-fast">Buscando jogos enviados...</span></div>';
      }

      try{
        const r=await carregarJogosCache_(loteria,true,(novo)=>{
          const boxAtual=document.getElementById('jogosRealizadosConteudo');
          const selAtual=document.getElementById('jogosBolao');
          if(boxAtual&&selAtual&&selAtual.value===loteria){
            boxAtual.innerHTML=renderListaJogosRealizados(extrairListaGenericaJogos_(novo),loteria);
          }
        });

        const lista=extrairListaGenericaJogos_(r);
        box.innerHTML=renderListaJogosRealizados(lista,loteria);
      }catch(err){
        if(!cached){
          box.innerHTML=`
            <div class="notice warn">
              Não foi possível carregar os jogos agora. Tente novamente em instantes.
            </div>
            <div class="actions" style="margin-top:10px;">
              <button class="btn btn-light" onclick="carregarJogosRealizadosBolao()">Tentar novamente</button>
            </div>
          `;
        }
      }
    }

    function extrairListaGenericaJogos_(r){
      if(Array.isArray(r))return r;
      if(!r||typeof r!=='object')return [];
      if(Array.isArray(r.jogos))return r.jogos;
      if(Array.isArray(r.rows))return r.rows;
      if(Array.isArray(r.lista))return r.lista;
      if(Array.isArray(r.dados))return r.dados;
      if(r.dados&&Array.isArray(r.dados.jogos))return r.dados.jogos;
      return [];
    }

    function renderListaJogosRealizados(lista,loteria){
      if(!Array.isArray(lista)||!lista.length){
        return `<div class="notice warn">Nenhum jogo realizado localizado para ${escapeHtml(loteria||'este bolão')}.</div>`;
      }

      return `
        <h3>Jogos disponíveis — ${escapeHtml(loteria||'Bolão')}</h3>
        <div class="jogos-gallery">
          ${lista.map((j,i)=>{
            const url=j.url||j.URL||j.link||j.LINK||j.arquivo||j.ARQUIVO||'';
            const nome=j.nome||j.NOME||j.titulo||j.TITULO||j.fileName||j.filename||`Jogo ${i+1}`;
            const data=formatarDataHoraPtBR(j.data||j.DATA||j.dataHora||j.DATA_HORA||'');
            const obs=j.obs||j.OBS||j.observacao||j.OBSERVACAO||j.descricao||'';
            const isImg=/\.(png|jpg|jpeg|webp|gif)(\?|$)/i.test(url);
            return `
              <div class="jogo-card">
                ${isImg?`<a href="${escapeAttr(url)}" target="_blank" rel="noopener"><img src="${escapeAttr(url)}" alt="${escapeAttr(nome)}"></a>`:`<div class="notice info" style="margin:0 0 8px;">Arquivo disponível</div>`}
                <div class="jogo-title">${escapeHtml(nome)}</div>
                <div class="jogo-meta">${data&&data!=='-'?escapeHtml(data)+'<br>':''}${escapeHtml(obs||'')}</div>
                ${url?`<div style="margin-top:10px;"><a class="btn btn-light" href="${escapeAttr(url)}" target="_blank" rel="noopener">Abrir arquivo</a></div>`:''}
              </div>
            `;
          }).join('')}
        </div>
      `;
    }

    async function enviarJogoRealizadoBolao(ev){
      ev.preventDefault();

      const sel=document.getElementById('jogosBolao');
      const input=document.getElementById('arquivoJogoRealizado');
      const btn=document.getElementById('btnEnviarJogoRealizado');
      const loteria=sel?sel.value:'';
      const files=input&&input.files?Array.from(input.files):[];
      const concurso=document.getElementById('jogoConcurso')?document.getElementById('jogoConcurso').value.trim():'';
      const dataJogoInput=document.getElementById('jogoData')?document.getElementById('jogoData').value:'';
      const dataJogo=dataJogoInput?dataInputValorParaBR_(dataJogoInput):'';
      const obs=document.getElementById('jogoObs')?document.getElementById('jogoObs').value.trim():'';

      if(!loteria)return toast('Selecione a loteria/bolão.','error');
      if(!files.length)return toast('Selecione ao menos um arquivo dos jogos.','error');

      ESTADO.bolaoSelecionado=loteria;
      localStorage.setItem('PSS_BOLAO_SELECIONADO',loteria);

      btn.disabled=true;
      btn.textContent='Enviando...';
      atualizarProgressoUploadJogos_(0.01,files.length,'Iniciando envio...',`${files.length} arquivo(s) selecionado(s).`,'run');

      const inicioEnvio=Date.now();
      let enviados=0;

      try{
        for(let i=0;i<files.length;i++){
          const file=files[i];
          const atual=i+1;
          const baseFeitos=i;

          atualizarProgressoUploadJogos_(baseFeitos+0.10,files.length,`Arquivo ${atual}/${files.length}`,`Lendo arquivo: ${file.name}`,'run');
          await aguardarFrame_();

          const base64=await lerArquivoBase64(file);

          atualizarProgressoUploadJogos_(baseFeitos+0.35,files.length,`Arquivo ${atual}/${files.length}`,`Enviando para o servidor: ${file.name}`,'run');
          await aguardarFrame_();

          await apiUploadJogoRealizado_(base64,file,loteria,concurso,dataJogo,obs);

          enviados++;
          atualizarProgressoUploadJogos_(enviados,files.length,`Enviado ${enviados}/${files.length}`,`Concluído: ${file.name}`,'ok');
          await aguardarFrame_();
        }

        const segundos=Math.max(1,Math.round((Date.now()-inicioEnvio)/1000));
        atualizarProgressoUploadJogos_(files.length,files.length,'Envio concluído',`${files.length} arquivo(s) enviado(s) em ${segundos}s. Atualizando lista...`,'ok');

        toast('Jogos realizados enviados com sucesso.');
        cacheDel_(cacheKeyLoteria_('jogos',loteria));
        input.value='';

        setTimeout(()=>carregarJogosRealizadosBolao(),700);
      }catch(err){
        atualizarProgressoUploadJogos_(enviados,files.length,'Falha no envio',`Enviados: ${enviados}/${files.length}. ${err.message}`,'error');
        toast(err.message,'error');
      }finally{
        btn.disabled=false;
        btn.textContent='Enviar jogos realizados';
      }
    }

    function aguardarFrame_(){
      return new Promise(resolve=>requestAnimationFrame(()=>setTimeout(resolve,0)));
    }

    function atualizarProgressoUploadJogos_(feito,total,titulo,detalhe,tipo){
      const box=document.getElementById('jogoUploadProgressBox');
      const fill=document.getElementById('jogoUploadFill');
      const pct=document.getElementById('jogoUploadPercentual');
      const tit=document.getElementById('jogoUploadTitulo');
      const det=document.getElementById('jogoUploadDetalhe');

      if(!box)return;

      box.classList.add('open');

      const percentual=total?Math.max(1,Math.min(100,Math.round((Number(feito||0)/total)*100))):1;

      if(fill){
        fill.style.width=percentual+'%';
        fill.classList.toggle('indeterminate',tipo==='run');
      }
      if(pct)pct.textContent=percentual+'%';
      if(tit)tit.textContent=titulo||'Enviando...';
      if(det){
        det.textContent=detalhe||'Processando...';
        det.classList.remove('upload-progress-ok','upload-progress-error');
        if(tipo==='ok')det.classList.add('upload-progress-ok');
        if(tipo==='error')det.classList.add('upload-progress-error');
      }
    }

    function dataInputValorParaBR_(v){
      if(!v)return '';
      const p=String(v).split('-');
      if(p.length!==3)return v;
      return `${p[2]}/${p[1]}/${p[0]}`;
    }

    async function carregarBaseEspecial(nome){
      const base = {range:'',qtdMin:'',qtdMax:'',qtdPalpite:''};
      if(!nome) return base;

      try{
        const r = await adminDados('BASE_LOTERIAS');
        const headers = r.headers || [];
        const rows = r.rows || [];
        const alvo = chaveBaseEspecial(nome);

        for(const row of rows){
          const o = rowObj(headers,row);
          const nomeLinha = cellObj(o,['NOME','LOTERIA']);
          if(chaveBaseEspecial(nomeLinha) === alvo){
            return {
              range: valorNumeroConfig(cellObj(o,['RANGE']),''),
              qtdMin: valorNumeroConfig(cellObj(o,['QTD_MIN','QTD MIN']),''),
              qtdMax: valorNumeroConfig(cellObj(o,['QTD_MAX','QTD MAX']),''),
              qtdPalpite: valorNumeroConfig(cellObj(o,['QTD_PALPITE','QTD PALPITE','QTD_ESCOLHA']),'')
            };
          }
        }
      }catch(e){}

      return base;
    }

    function chaveBaseEspecial(nome){
      return normalizar(String(nome||'').replace(/\b20\d{2}\b/g,'').replace(/[()]/g,' ').replace(/\s+/g,' '));
    }

    function nomeFinalEspecial(nomeBase, ano, tipo){
      let nome = String(nomeBase||'').trim();
      const a = String(ano||'').trim();
      if(!nome) return '';
      if(tipo === 'mega') return 'MEGA DA VIRADA';
      if(a && !/\b20\d{2}\b/.test(nome)) nome += ' ' + a;
      return nome;
    }

    async function ativarBolaoEspecialGit(tipo){
      const btn = document.getElementById('btnAtivarEspecial');
      const nomeBase = document.getElementById('esp_nome').value.trim();
      const ano = document.getElementById('esp_ano').value.trim();
      const nome = nomeFinalEspecial(nomeBase, ano, tipo);

      if(!nomeBase){
        toast('Informe o nome da loteria.','error');
        return;
      }

      const dados = {
        nome: nome,
        loteria: nome,
        status: 'ATIVO',
        valorCota: '',
        totalCotas: '',
        cotasTotaisAdquiridas: '0',
        qtdParcelas: '1',
        premiacao: valorNumeroConfig(document.getElementById('esp_premioPorCota').value,''),
        premioPorCota: valorNumeroConfig(document.getElementById('esp_premioPorCota').value,''),
        dataSorteio: dataInputParaBR('esp_dataSorteio'),
        iniBol: dataInputParaBR('esp_iniBol'),
        fimBol: dataInputParaBR('esp_fimBol'),
        iniPal: dataInputParaBR('esp_iniPal'),
        fimPal: dataInputParaBR('esp_fimPal'),
        range: valorNumeroConfig(document.getElementById('esp_range').value,''),
        qtdMin: valorNumeroConfig(document.getElementById('esp_qtdMin').value,''),
        qtdMax: valorNumeroConfig(document.getElementById('esp_qtdMax').value,''),
        qtdPalpite: valorNumeroConfig(document.getElementById('esp_qtdPalpite').value,'')
      };

      btn.disabled = true;
      btn.textContent = 'Ativando...';

      try{
        const r = await api('salvarConfigBolaoAtivoAdmin',{},[dados]);
        toast((r&&r.msg)||'Bolão especial ativado.');
        await carregarBoloes();
        renderEspeciais(tipo);
      }catch(err){
        toast(err.message,'error');
      }finally{
        btn.disabled = false;
        btn.textContent = 'Ativar Bolão Especial';
      }
    }

    function dataInputParaBR(id){
      const v = document.getElementById(id).value;
      if(!v) return '';
      const p = v.split('-');
      if(p.length !== 3) return v;
      return `${p[2]}/${p[1]}/${p[0]}`;
    }

    function filtrarSolicitacoesAdmin(status=''){
      const cache=window.PSS_SOLICITACOES_CACHE||{headers:[],rows:[]};
      const termoEl=document.getElementById('buscaSolicitacaoAdmin');
      const termo=termoEl?termoEl.value:'';
      const box=document.getElementById('solicitacoesAdminBox');
      if(!box)return;
      box.innerHTML=renderSolicitacoesCards_(cache.headers,cache.rows,status||'TODAS',termo);
    }

    function renderSolicitacoesCards_(headers,rows,statusFiltro='TODAS',termo=''){
      headers=headers||[];
      rows=rows||[];

      if(!headers.length){
        return '<div class="notice warn">Nenhuma solicitação localizada.</div>';
      }

      const termoNorm=normalizar(termo||'');
      const statusFiltroNorm=normalizar(statusFiltro||'TODAS');

      const lista=rows.map((row,idx)=>({row,linha:idx+2}))
        .filter(item=>{
          const status=normalizar(getCelulaPorAlias_(headers,item.row,['STATUS','SITUACAO','SITUAÇÃO'])||'');
          const texto=normalizar(item.row.join(' | '));

          if(statusFiltroNorm&&statusFiltroNorm!=='TODAS'&&!status.includes(statusFiltroNorm))return false;
          if(termoNorm&&!texto.includes(termoNorm))return false;
          return true;
        });

      if(!lista.length){
        return '<div class="notice warn">Nenhuma solicitação encontrada para o filtro aplicado.</div>';
      }

      return `
        <div class="solicitacoes-grid">
          ${lista.map(item=>renderSolicitacaoCard_(headers,item.row,item.linha)).join('')}
        </div>
      `;
    }

    function renderSolicitacaoCard_(headers,row,linha){
      const nome=getCelulaPorAlias_(headers,row,['NOME','NOME_COMPLETO','PARTICIPANTE'])||'Participante';
      const email=getCelulaPorAlias_(headers,row,['EMAIL','E-MAIL'])||'-';
      const celular=getCelulaPorAlias_(headers,row,['CELULAR','TELEFONE','WHATSAPP'])||'-';
      const status=getCelulaPorAlias_(headers,row,['STATUS','SITUACAO','SITUAÇÃO'])||'Pendente';
      const cotas=getCelulaPorAlias_(headers,row,['COTAS','QTD_COTAS','QUANTIDADE_COTAS'])||'-';
      const loteria=getCelulaPorAlias_(headers,row,['LOTERIA','BOLAO','BOLÃO','EVENTO','NOME_BOLAO','LOTERIA_BOLAO'])||'-';
      const cpf=getCelulaPorAlias_(headers,row,['CPF'])||'-';
      const tipo=getCelulaPorAlias_(headers,row,['TIPO_SOLICITACAO','TIPO SOLICITACAO','TIPO'])||'-';
      const aceite=getCelulaPorAlias_(headers,row,['ACEITOU_REGULAMENTO','ACEITE_REGULAMENTO','ACEITE REGULAMENTO'])||'-';
      const dataAceite=getCelulaPorAlias_(headers,row,['DATA_ACEITE_REGULAMENTO','DATA ACEITE REGULAMENTO','CRIADO_EM','DATA'])||'-';
      const versao=getCelulaPorAlias_(headers,row,['VERSAO_REGULAMENTO','VERSÃO_REGULAMENTO'])||'-';

      const stNorm=normalizar(status);
      const aprovado=stNorm.includes('APROV');
      const recusado=stNorm.includes('RECUS')||stNorm.includes('REPROV');
      const pendente=!aprovado&&!recusado;

      return `
        <article class="sol-card" id="sol-card-${linha}">
          <div class="sol-card-head">
            <div>
              <h3>${escapeHtml(nome)}</h3>
              <small>${escapeHtml(email)}</small>
            </div>
            <span class="status-pill ${recusado?'danger':(pendente?'warn':'')}">${escapeHtml(status)}</span>
          </div>

          <div class="sol-info">
            <div><b>Linha</b>${escapeHtml(linha)}</div>
            <div><b>Loteria/Bolão</b>${escapeHtml(loteria)}</div>
            <div><b>Cotas</b>${escapeHtml(cotas)}</div>
            <div><b>Celular</b>${escapeHtml(celular)}</div>
            <div><b>CPF</b>${escapeHtml(cpf)}</div>
            <div><b>Tipo</b>${escapeHtml(tipo)}</div>
            <div><b>Aceite regulamento</b>${escapeHtml(aceite)}</div>
            <div><b>Data aceite</b>${escapeHtml(formatarDataHoraPtBR(dataAceite))}</div>
            <div><b>Versão regulamento</b>${escapeHtml(versao)}</div>
          </div>

          <div class="sol-actions">
            ${!aprovado?`<button class="btn" onclick="confirmarAcaoSolicitacaoAdmin('aprovarSolicitacaoCadastro',${linha},'Aprovar esta solicitação e criar/ativar o usuário?')">Aprovar</button>`:''}
            ${!recusado?`<button class="btn btn-light" onclick="confirmarAcaoSolicitacaoAdmin('recusarSolicitacaoCadastro',${linha},'Recusar esta solicitação?')">Recusar</button>`:''}
            ${aprovado?`<button class="btn btn-light" onclick="confirmarAcaoSolicitacaoAdmin('tornarUsuarioAdministradorLinha',${linha},'Tornar este usuário administrador?')">Tornar administrador</button>`:`<button class="btn btn-muted" disabled title="Disponível após aprovar a solicitação">Tornar administrador após aprovar</button>`}
            <button class="btn btn-outline-danger" onclick="confirmarAcaoSolicitacaoAdmin('excluirSolicitacaoCadastro',${linha},'Excluir definitivamente esta solicitação?')">Excluir</button>
          </div>
        </article>
      `;
    }

    function getCelulaPorAlias_(headers,row,aliases){
      const alvo=(aliases||[]).map(a=>normalizar(a));
      for(let i=0;i<headers.length;i++){
        if(alvo.includes(normalizar(headers[i])))return row[i]===undefined||row[i]===null?'':row[i];
      }
      return '';
    }

    function atualizarCamposRecebimentoAdmin(i){

      const showBank=tipo==='DADOS_BANCARIOS'||tipo==='PIX_E_DADOS_BANCARIOS';
      document.querySelectorAll(`[data-rec-pix="${i}"]`).forEach(el=>el.classList.toggle('rec-hidden',!showPix));
      document.querySelectorAll(`[data-rec-bank="${i}"]`).forEach(el=>el.classList.toggle('rec-hidden',!showBank));
      const pill=document.getElementById('rec_tipo_pill_'+i);
      if(pill)pill.textContent=tipo.replace(/_/g,' ');
    }

    function renderResumoPagamentosAdmin_(headers,rows){
      let totalPago=0,totalAnalise=0,totalPendente=0,totalErro=0,qtdPago=0,qtdAnalise=0,qtdPendente=0,qtdErro=0;
      (rows||[]).forEach(row=>{
        const o=pagamentoObj_(headers,row);
        const st=normalizar(o.status);
        const valor=num(o.valor);
        if(st.includes('PAGO')||st.includes('APROV')){totalPago+=valor;qtdPago++;}
        else if(st.includes('ANALISE')||st.includes('ANÁLISE')){totalAnalise+=valor;qtdAnalise++;}
        else if(st.includes('ERRO')||st.includes('DUPLIC')){totalErro+=valor;qtdErro++;}
        else {totalPendente+=valor;qtdPendente++;}
      });
      return `
        <div class="pay-summary-grid">
          <div class="pay-summary-card"><b>Pago confirmado</b><strong>${escapeHtml(moeda(totalPago))}</strong><div class="pay-admin-sub">${qtdPago} registro(s)</div></div>
          <div class="pay-summary-card warn"><b>Em análise</b><strong>${escapeHtml(moeda(totalAnalise))}</strong><div class="pay-admin-sub">${qtdAnalise} registro(s)</div></div>
          <div class="pay-summary-card warn"><b>Pendente</b><strong>${escapeHtml(moeda(totalPendente))}</strong><div class="pay-admin-sub">${qtdPendente} registro(s)</div></div>
          <div class="pay-summary-card danger"><b>Erro/Duplicado</b><strong>${escapeHtml(moeda(totalErro))}</strong><div class="pay-admin-sub">${qtdErro} registro(s)</div></div>
        </div>
      `;
    }

    function renderListaPagamentosCardsAdmin_(headers,rows){
      rows=rows||[];
      if(!rows.length)return '<div class="notice warn">Nenhum pagamento localizado.</div>';
      return `<div class="pay-list">${rows.map((row,i)=>renderPagamentoCardAdmin_(headers,row,i)).join('')}</div>`;

    function renderPagamentoCardAdmin_(headers,row,i){
      const o=pagamentoObj_(headers,row);

      return `
        <article class="pay-admin-card-pro ${cls.card}" data-pay-row="${linha}">
          <div class="pay-admin-head">
            <div>
              <div class="pay-admin-title">${escapeHtml(o.loteria||'Pagamento sem loteria informada')}</div>

          </div>
          <div class="pay-admin-grid">
            <div class="pay-admin-info"><b>Valor</b><span>${escapeHtml(o.valor?moeda(o.valor):'-')}</span></div>

            <div class="pay-admin-info"><b>Recebedor</b><span>${escapeHtml(o.recebedor||'-')}</span></div>
            <div class="pay-admin-info"><b>Mês referência</b><span>${escapeHtml(o.mesReferencia||'-')}</span></div>
            <div class="pay-admin-info"><b>ID transação</b><span>${escapeHtml(o.idTransacao||'-')}</span></div>
            <div class="pay-admin-info"><b>Autenticação</b><span>${escapeHtml(o.autenticacao||'-')}</span></div>
            <div class="pay-admin-info"><b>Tipo cota</b><span>${escapeHtml(o.tipoCota||'-')}</span></div>
            <div class="pay-admin-info"><b>Partes</b><span>${escapeHtml(formatarPartesPagamento_(o.partesCota))}</span></div>
            <div class="pay-admin-info full"><b>Validação / observação</b><span>${escapeHtml(o.validacao||'-')}</span></div>
            ${o.participantesCota?`<div class="pay-admin-info full"><b>Participantes da cota</b><span>${escapeHtml(o.participantesCota)}</span></div>`:''}
          </div>
          <div class="pay-card-actions">
            ${url?`<button class="btn btn-blue" onclick="abrirComprovanteAdmin('${escapeAttr(url)}')">Ver comprovante</button>`:''}

          </div>
        </article>
      `;
    }

    function pagamentoObj_(headers,row){
      const o=rowObj(headers,row);
      return {
        data:cellObj(o,['DATA']),
        email:cellObj(o,['EMAIL','E-MAIL']),
        loteria:cellObj(o,['LOTERIA','BOLAO','BOLÃO']),
        urlComprovante:cellObj(o,['URL_COMPROVANTE','URL COMPROVANTE']),
        status:cellObj(o,['STATUS']),
        pagador:cellObj(o,['PAGADOR']),
        valor:cellObj(o,['VALOR']),
        idTransacao:cellObj(o,['ID_TRANSACAO','ID TRANSAÇÃO','ID TRANSACAO']),
        autenticacao:cellObj(o,['AUTENTICACAO','AUTENTICAÇÃO']),
        arquivoUrl:cellObj(o,['ARQUIVO_URL','ARQUIVO URL']),
        recebedor:cellObj(o,['RECEBEDOR']),
        pixDestino:cellObj(o,['PIX_DESTINO','PIX DESTINO']),
        validacao:cellObj(o,['VALIDACAO','VALIDAÇÃO','OBS']),
        mesReferencia:cellObj(o,['MES_REFERENCIA','MÊS_REFERENCIA','MES REFERENCIA']),
        tipoCota:cellObj(o,['TIPO_COTA','TIPO COTA']),
        partesCota:cellObj(o,['PARTES_COTA','PARTES COTA']),
        participantesCota:cellObj(o,['PARTICIPANTES_COTA','PARTICIPANTES COTA']),
        linhaPlanilha:cellObj(o,['_LINHA_PLANILHA','LINHA_PLANILHA','LINHA PLANILHA']),
        _linhaPlanilha:cellObj(o,['_LINHA_PLANILHA'])
      };
    }

    function pagamentoStatusClasse_(status){
      const st=normalizar(status);
      if(st.includes('PAGO')||st.includes('APROV'))return {card:'',badge:''};
      if(st.includes('ANALISE')||st.includes('ANÁLISE'))return {card:'warn',badge:'warn'};
      if(st.includes('ERRO')||st.includes('DUPLIC')||st.includes('RECUS'))return {card:'danger',badge:'danger'};
      return {card:'muted',badge:'muted'};
    }

    function formatarPartesPagamento_(v){
      const n=num(v);
      if(!n)return '-';
      if(n===1)return 'Integral';
      return '1/'+n;
    }

    function abrirComprovanteAdmin(url){

    function filtrarPagamentosAdmin(){
      const cache=ESTADO.pagamentosAdminCache||{headers:[],rows:[]};
      const termo=normalizar(document.getElementById('payBuscaAdmin')?document.getElementById('payBuscaAdmin').value:'');
      const status=document.getElementById('payStatusAdmin')?document.getElementById('payStatusAdmin').value:'TODOS';
      const mes=normalizar(document.getElementById('payMesAdmin')?document.getElementById('payMesAdmin').value:'');
      const filtradas=(cache.rows||[]).filter(row=>{
        const o=pagamentoObj_(cache.headers,row);
        const texto=normalizar(Object.values(o).join(' | '));
        const st=normalizar(o.status);
        const mesLinha=normalizar(o.mesReferencia||o.data||'');
        if(termo&&!texto.includes(termo))return false;
        if(mes&&!mesLinha.includes(mes))return false;
        if(status==='PAGO'&&!(st.includes('PAGO')||st.includes('APROV')))return false;
        if(status==='ANALISE'&&!(st.includes('ANALISE')||st.includes('ANÁLISE')))return false;
        if(status==='PENDENTE'&&(st.includes('PAGO')||st.includes('APROV')||st.includes('ANALISE')||st.includes('ANÁLISE')||st.includes('ERRO')||st.includes('DUPLIC')))return false;
        if(status==='ERRO'&&!(st.includes('ERRO')||st.includes('DUPLIC')))return false;
        return true;
      });
      const box=document.getElementById('pagamentosCardsAdminBox');
      if(box)box.innerHTML=renderListaPagamentosCardsAdmin_(cache.headers,filtradas);
    }

    function limparFiltrosPagamentosAdmin(){
      if(document.getElementById('payBuscaAdmin'))document.getElementById('payBuscaAdmin').value='';
      if(document.getElementById('payStatusAdmin'))document.getElementById('payStatusAdmin').value='TODOS';
      if(document.getElementById('payMesAdmin'))document.getElementById('payMesAdmin').value='';
      filtrarPagamentosAdmin();
    }

    function rowObj(headers,row){const o={};(headers||[]).forEach((h,i)=>o[normalizar(h)]=row[i]);return o}
    function cellObj(o,names){for(const n of names){const k=normalizar(n);if(Object.prototype.hasOwnProperty.call(o,k))return o[k]}return ''}
    function linhaPlanilha(i){return Number(i)+2}
    async function chamarAcaoAdmin(action,args,okMsg){try{const r=await api(action,{},args||[]);await firebaseSincronizarResultadoAdmin_(action,r);toast((r&&r.msg)||okMsg||'Ação executada.');if(ESTADO.view==='solicitacoes')renderSolicitacoesAdmin();else if(ESTADO.view==='pagamentos')renderPagamentosAdmin();else if(ESTADO.view==='usuarios')renderUsuariosAdmin();else if(ESTADO.view==='config')renderConfigBoloesAdmin();else if(ESTADO.view==='baseLoterias')renderBaseLoteriasAdmin();else if(ESTADO.view==='participantes')renderParticipantesBolaoAdmin();else if(ESTADO.view==='boloes')renderBoloes('ativos')}catch(err){toast(firebaseMensagemErro_(err),'error')}}

    async function renderConfigBoloesAdmin(){if(!isAdmin()){setView('<div class="panel"><div class="notice error">Acesso restrito ao administrador.</div></div>');return}loading('Carregando configurações');try{const todosBoloes=listaSegura_(await carregarBoloes());const lista=todosBoloes.filter(b=>!isHistorico(b)&&normalizar(b.status).includes('ATIVO'));setView(`<div class="panel"><h2>⚙️ Configurações dos bolões ativos</h2><p>Gerencie valores, prazos, cotas e regras de palpites dos bolões em andamento.</p>${lista.length?lista.map((b,i)=>`<div class="config-card"><h3>${escapeHtml(b.nome||b.loteria)} (2026)</h3><div class="config-grid"><div class="field"><label>Status</label><select id="cfg_status_${i}"><option ${normalizar(b.status).includes('ATIVO')?'selected':''}>ATIVO</option><option ${normalizar(b.status).includes('INATIVO')?'selected':''}>INATIVO</option><option ${normalizar(b.status).includes('HISTORICO')?'selected':''}>HISTORICO</option></select></div><div class="field"><label>Valor da cota</label><input id="cfg_valor_${i}" value="${escapeAttr(formatarMoedaCampoConfig(b.valorCota))}" onfocus="limparMoedaCampoConfig(this)" onblur="formatarMoedaInputConfig(this)"></div><div class="field"><label>Total de cotas</label><input id="cfg_total_${i}" value="${escapeAttr(valorNumeroConfig(b.totalCotas||b.cotasTotal,''))}"></div><div class="field"><label>Cotas totais adquiridas</label><input id="cfg_cotas_${i}" value="${escapeAttr(valorNumeroConfig(b.cotasAdquiridas,'0'))}" oninput="atualizarPremioPorCotaConfig(${i})"></div><div class="field"><label>Qtd parcelas</label><input id="cfg_parc_${i}" value="${escapeAttr(valorNumeroConfig(b.qtdParcelas,'1'))}"></div><div class="field"><label>Premiação</label><input id="cfg_premio_${i}" value="${escapeAttr(formatarMoedaCampoConfig(b.premiacao))}" onfocus="limparMoedaCampoConfig(this)" onblur="formatarMoedaInputConfig(this);atualizarPremioPorCotaConfig(${i})" oninput="atualizarPremioPorCotaConfig(${i})"></div><div class="field"><label>Premiação por cota</label><input id="cfg_premioCota_${i}" value="${escapeAttr(calcularPremioPorCotaValor(b.premiacao,b.cotasAdquiridas))}" readonly style="background:#f3f6f4;font-weight:900;color:#003b12;"></div><div class="field"><label>Data sorteio</label><input id="cfg_sorteio_${i}" value="${escapeAttr(formatarDataHoraPtBR(b.dataSorteio||''))}"></div><div class="field"><label>Início pagamento</label><input id="cfg_iniBol_${i}" value="${escapeAttr(formatarDataHoraPtBR(b.inicioPagamento||''))}"></div><div class="field"><label>Fim pagamento</label><input id="cfg_fimBol_${i}" value="${escapeAttr(formatarDataHoraPtBR(b.fimPagamento||''))}"></div><div class="field"><label>Início palpites</label><input id="cfg_iniPal_${i}" value="${escapeAttr(formatarDataHoraPtBR(b.inicioPalpite||''))}"></div><div class="field"><label>Fim palpites</label><input id="cfg_fimPal_${i}" value="${escapeAttr(formatarDataHoraPtBR(b.fimPalpite||''))}"></div><div class="field"><label>Range</label><input id="cfg_range_${i}" value="${escapeAttr(valorNumeroConfig(b.range,''))}"></div><div class="field"><label>Qtd mínima</label><input id="cfg_min_${i}" value="${escapeAttr(valorNumeroConfig(b.qtdMin,''))}"></div><div class="field"><label>Qtd máxima</label><input id="cfg_max_${i}" value="${escapeAttr(valorNumeroConfig(b.qtdMax,''))}"></div><div class="field"><label>Qtd por palpite</label><input id="cfg_qtdPal_${i}" value="${escapeAttr(valorNumeroConfig(b.qtdPalpite,''))}"></div></div><div class="actions" style="margin-top:14px;"><button class="btn" onclick="salvarConfigBolaoGit(${i})">Salvar este bolão</button><button class="btn btn-light" onclick="inativarBolaoGit(${i})">Inativar</button><button class="btn btn-danger" onclick="excluirBolaoGit(${i})">Excluir</button></div></div>`).join(''):'<div class="notice warn">Nenhum bolão ativo localizado para configuração.</div>'}</div>`)}catch(err){setView(`<div class="panel"><div class="notice error">${escapeHtml(err.message)}</div></div>`)}}

    function calcularPremioPorCotaValor(premiacao,cotasAdquiridas){
      const premio=num(premiacao);
      const cotas=num(cotasAdquiridas);
      if(!isFinite(premio)||!isFinite(cotas)||cotas<=0)return moeda(0);
      return moeda(premio/cotas);
    }

    function atualizarPremioPorCotaConfig(i){
      const elPremio=document.getElementById('cfg_premio_'+i);
      const elCotas=document.getElementById('cfg_cotas_'+i);
      const elResultado=document.getElementById('cfg_premioCota_'+i);
      if(!elPremio||!elCotas||!elResultado)return;
      elResultado.value=calcularPremioPorCotaValor(elPremio.value,elCotas.value);
    }


    function formatarMoedaCampoConfig(valor){
      if(valor===undefined||valor===null||valor==='')return '';
      return moeda(valor);
    }

    function limparMoedaCampoConfig(el){
      if(!el)return;
      const n=num(el.value);
      el.value=n?String(n).replace('.',','):'';
      setTimeout(()=>{try{el.select()}catch(e){}},10);
    }

    function formatarMoedaInputConfig(el){
      if(!el)return;
      el.value=moeda(num(el.value));
    }

    function valorMoedaSalvarConfig(valor){
      const n=num(valor);
      if(!isFinite(n)||isNaN(n))return '0';
      return String(Math.round(n*100)/100).replace('.',',');
    }

    function formatarNumeroCampoConfig_(valor){
      const n=Number(valor);
      if(!isFinite(n)||isNaN(n))return '0';
      const arred=Math.round(n*100)/100;

    function formatarDataHoraPtBR(valor){
      if(valor===undefined||valor===null||valor==='')return '-';
      if(valor instanceof Date && !isNaN(valor.getTime()))return montarDataHoraPtBR_(valor,true);
      const bruto=String(valor).trim();
      if(!bruto)return '-';

      if(/^\d{2}\/\d{2}\/\d{4}/.test(bruto)){
        return bruto.replace(',', '');
      }

      const iso=bruto.match(/^(\d{4})-(\d{2})-(\d{2})(?:[T\s](\d{2}):(\d{2})(?::(\d{2}))?)?/);
      if(iso){
        const yyyy=iso[1],mm=iso[2],dd=iso[3],hh=iso[4]||'',mi=iso[5]||'',ss=iso[6]||'';
        if(hh&&mi)return `${dd}/${mm}/${yyyy} ${hh}:${mi}${ss?':'+ss:''}`;
        return `${dd}/${mm}/${yyyy}`;
      }

      const slash=bruto.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})(?:[\s,]+(\d{1,2}):(\d{2})(?::(\d{2}))?)?/);
      if(slash){
        let p1=Number(slash[1]),p2=Number(slash[2]);
        const ano=slash[3];
        const hora=slash[4]?String(slash[4]).padStart(2,'0'):'';
        const minuto=slash[5]||'';
        const segundo=slash[6]||'';

        let dia,mes;

        if(p2>12 && p1<=12){
          mes=p1;
          dia=p2;
        }else{
          dia=p1;
          mes=p2;
        }

        const dd=String(dia).padStart(2,'0');
        const mm=String(mes).padStart(2,'0');

        if(hora&&minuto)return `${dd}/${mm}/${ano} ${hora}:${minuto}${segundo?':'+segundo:''}`;
        return `${dd}/${mm}/${ano}`;
      }

      if(/^\d{4,6}$/.test(bruto)){
        const serial=Number(bruto);
        if(serial>20000&&serial<80000){
          const base=Date.UTC(1899,11,30);
          const dt=new Date(base+serial*86400000);
          return montarDataHoraPtBR_(dt,false);
        }
      }

      const dt=new Date(bruto);
      if(!isNaN(dt.getTime()) && /\d{4}/.test(bruto)){
        return montarDataHoraPtBR_(dt, bruto.includes(':'));
      }

      return bruto;
    }

    function normalizarDataPtBRParaSalvar(valor){
      const f=formatarDataHoraPtBR(valor);
      return f==='-'?'':f.split(' ')[0];
    }

    function montarDataHoraPtBR_(dt,comHora){
      const dd=String(dt.getDate()).padStart(2,'0');
      const mm=String(dt.getMonth()+1).padStart(2,'0');
      const yyyy=dt.getFullYear();
      if(!comHora)return `${dd}/${mm}/${yyyy}`;
      const hh=String(dt.getHours()).padStart(2,'0');
      const mi=String(dt.getMinutes()).padStart(2,'0');
      const ss=String(dt.getSeconds()).padStart(2,'0');
      return `${dd}/${mm}/${yyyy} ${hh}:${mi}:${ss}`;
    }

    function pareceDataHora_(valor){
      const s=String(valor||'').trim();
      if(!s)return false;

function selecionarBolao(nome,origem){
  ESTADO.bolaoSelecionado=nome;
  localStorage.setItem('PSS_BOLAO_SELECIONADO',nome);

  const b=getBolaoByNome_(nome);
  const participa=usuarioParticipaBolaoUI_(b);

  if(origem==='palpite'){
    if(participa)return renderPalpiteAberto(nome);
    return abrirAdquirirCotasBolao(nome);
  }

  if(!participa && !isHistorico(b)){
    return abrirAdquirirCotasBolao(nome);
  }

  abrirModal('Bolão selecionado',`
    <div class="notice">Bolão selecionado: <strong>${escapeHtml(nome)}</strong></div>
    <div class="actions">
      ${participa?`<button class="btn" onclick="fecharModal(); navegar('palpite')">Palpites</button>`:''}

}

    setView(`<div class="panel"><div class="palpite-stage"><h3 class="center">🎯 ${escapeHtml(nome)}</h3><div class="meta-box" style="margin-top:16px;"><b>Resumo dos palpites</b><span>Cotas: ${escapeHtml(status.cotas||status.maxJogos||1)} · Palpites feitos: ${escapeHtml((status.palpites||[]).length)}/${escapeHtml(status.maxJogos||status.cotas||1)} · Prazo final: ${escapeHtml(getPrazoBolao(nome))}</span></div><div class="meta-box" style="margin-top:10px;"><b>🏆 10 dezenas mais escolhidas</b>${renderChips((status.top10||[]).length?status.top10:[])}</div><div class="meta-box" style="margin-top:10px;"><b>📌 Dezenas escolhidas por todos os participantes</b>${renderChips(status.todosNumeros||[])}</div><div class="table-wrap" style="margin-top:10px;"><table><thead><tr><th>#</th><th>Data</th><th>Dezenas</th><th>Ação</th></tr></thead><tbody>${renderHistoricoPalpite(status.palpites||[])}</tbody></table></div><div style="margin-top:12px;"><button class="btn" onclick="mostrarGradePalpite()">Novo / editar palpite</button></div><div id="gradePalpiteBox" class="hidden" style="margin-top:16px;"><div class="center"><strong>Selecione ${ESTADO.qtdEscolha} dezenas.</strong></div><div id="selecionadasPalpite" class="notice info" style="margin:10px 0;"><strong>Dezenas selecionadas:</strong> -</div><div class="numbers-grid">${numeros.map(n=>`<div class="ball" data-num="${Number(n)}" onclick="toggleNumero(${Number(n)},this)">${formatNum(n)}</div>`).join('')}</div><button class="btn" id="btnSalvarPalpite" onclick="salvarPalpite()" disabled>Salvar alteração (0/${ESTADO.qtdEscolha})</button></div></div></div>`);
  }catch(err){
    setView(`<div class="panel"><div class="notice error">${escapeHtml(err.message)}</div></div>`);
  }

async function abrirPagamentoBolao(loteria){
  const b=getBolaoByNome_(loteria);
  const nome=b.loteria||b.nome||loteria;
  const cacheKey='PSS_BOLAO_METODOS_PAGAMENTO_'+normalizar(nome).replace(/[^A-Z0-9]+/g,'_');
  let listaCache=[];
  try{
    const cached=JSON.parse(localStorage.getItem(cacheKey)||'null');
    if(cached&&Array.isArray(cached.lista)&&Date.now()-Number(cached.ts||0)<10*60*1000){
      listaCache=cached.lista;
    }
  }catch(e){listaCache=[];}

  abrirModal('Adquirir cotas',renderCorpoAdquirirCotas_(b,nome,listaCache,listaCache.length===0));
  setTimeout(()=>atualizarValorPagamentoModal(nome),80);

  // V197: meios de pagamento carregam em segundo plano para o modal abrir instantaneamente.
  carregarMetodosPagamentoModalAsync_(nome,b,cacheKey);
}

  const qtdInicial=1;

  return `
    <div class="notice">
      <strong>${escapeHtml(nome)}</strong><br>
      Valor da cota: <strong>${escapeHtml(moeda(valorCota))}</strong><br>
      ${disponiveis?`Cotas disponíveis agora: <strong>${escapeHtml(disponiveis)}</strong>`:''}
    </div>

    <div class="acq-box">
      <h4>Quantidade e valor</h4>
      <div class="acq-row">
        <div class="field"><label>Quantidade de cotas</label><input id="pagQtdCotas" value="${escapeAttr(qtdInicial)}" inputmode="numeric" oninput="atualizarValorPagamentoModal('${escapeAttr(nome)}')"></div>
        <div class="field"><label>Valor da cota</label><input value="${escapeAttr(moeda(valorCota))}" readonly class="acq-value"></div>
        <div class="field"><label>Valor total da aquisição</label><input id="pagValorTotal" value="${escapeAttr(moeda(valorCota*qtdInicial))}" readonly class="acq-value"></div>
        <div class="field"><label>Valor para pagamento agora</label><input id="pagValorAgora" value="${escapeAttr(moeda(valorCota*qtdInicial))}" readonly class="acq-value"></div>
      </div>

      ${parcelas>1?`
        <div class="pag-recorrente-box">
          <h4>Parcelamento/recorrência opcional</h4>
          <label class="checkline"><input type="checkbox" id="pagRecorrente" onchange="togglePagamentoRecorrenteModal();atualizarValorPagamentoModal('${escapeAttr(nome)}')"><span>Quero dividir o valor da cota em parcelas mensais.</span></label>
          <div id="pagRecorrenteCampos" class="pag-recorrente-inline hidden">
            <div class="field"><label>Quantidade de parcelas</label><input id="pagRecMeses" value="${escapeAttr(parcelas)}" inputmode="numeric" oninput="atualizarValorPagamentoModal('${escapeAttr(nome)}')"></div>
            <div class="field"><label>Valor mensal estimado</label><input id="pagValorParcela" readonly class="acq-value" value="${escapeAttr(moeda((valorCota*qtdInicial)/parcelas))}"></div>
            <div class="field"><label>Dia preferencial</label><input id="pagRecDia" value="10" inputmode="numeric"></div>

        </div>
      `:''}

      <div class="actions" style="margin-top:12px;">
        <button type="button" class="btn" onclick="registrarAquisicaoCotaModal('${escapeAttr(nome)}')">Registrar aquisição</button>
        <button type="button" class="btn btn-light" onclick="fecharModal();navegar('comprovante')">Enviar comprovante</button>
      </div>
    </div>

    <h4 style="margin:16px 0 8px;color:#003b12;">Dados para pagamento</h4>
    <div id="metodosPagamentoBox">
      ${renderMetodosPagamentoBox_(lista,b,nome,carregando)}
    </div>
  `;
}

function renderMetodosPagamentoBox_(lista,b,nome,carregando){
  lista=Array.isArray(lista)?lista:[];
  if(lista.length){
    return `<div class="pay-method-grid">${lista.map((m,i)=>renderMetodoPagamento_(m,b,i)).join('')}</div>`;
  }
  if(carregando){
    return '<div class="notice info">Carregando meios de pagamento em segundo plano. Você já pode registrar a aquisição ou enviar o comprovante.</div>';
  }
  return '<div class="notice warn">Nenhum meio de pagamento ativo localizado para este bolão.</div>';
}

async function carregarMetodosPagamentoModalAsync_(nome,b,cacheKey){
  const box=document.getElementById('metodosPagamentoBox');
  try{
    const dados=await apiMulti([
      {action:'getDadosRecebimento',dados:{email:ESTADO.email,loteria:nome},args:[ESTADO.email,nome]},
      {action:'listarDadosRecebimento',dados:{email:ESTADO.email,loteria:nome},args:[ESTADO.email,nome]}
    ]);
    const lista=Array.isArray(dados)?dados:(dados.dados||[]);
    try{localStorage.setItem(cacheKey,JSON.stringify({ts:Date.now(),lista:lista}));}catch(e){}
    if(box){
      box.innerHTML=renderMetodosPagamentoBox_(lista,b,nome,false);
      setTimeout(()=>atualizarValorPagamentoModal(nome),50);
    }
  }catch(err){
    if(box){
      box.innerHTML=`<div class="notice warn">Não foi possível carregar os meios de pagamento agora. Você pode registrar a aquisição e enviar o comprovante normalmente. Detalhe: ${escapeHtml(err.message||err)}</div>`;
    }
  }
}

function getValorPagamentoAgora_(){
  const total=num(document.getElementById('pagValorTotal')?document.getElementById('pagValorTotal').value:0);
  const rec=document.getElementById('pagRecorrente');
  if(rec&&rec.checked){
    const parcelas=Math.max(1,num(document.getElementById('pagRecMeses')?document.getElementById('pagRecMeses').value:1));
    return total/parcelas;
  }
  return total;
}

function atualizarValorPagamentoModal(loteria){
  const b=getBolaoByNome_(loteria);
  const qtd=Math.max(1,num(document.getElementById('pagQtdCotas')?document.getElementById('pagQtdCotas').value:1));
  const valorTotal=num(b.valorCota||0)*qtd;
  const totalEl=document.getElementById('pagValorTotal');
  if(totalEl)totalEl.value=moeda(valorTotal);

  const parcelas=Math.max(1,num(document.getElementById('pagRecMeses')?document.getElementById('pagRecMeses').value:1));
  const valorAgora=getValorPagamentoAgora_();
  const agoraEl=document.getElementById('pagValorAgora');
  if(agoraEl)agoraEl.value=moeda(valorAgora);
  const parcelaEl=document.getElementById('pagValorParcela');
  if(parcelaEl)parcelaEl.value=moeda(parcelas?valorTotal/parcelas:valorTotal);

  document.querySelectorAll('[data-pix-payload]').forEach(node=>{
    const idx=node.dataset.pixPayload;
    const raw=node.dataset.metodo?decodeURIComponent(node.dataset.metodo):'{}';
    let metodo={};
    try{metodo=JSON.parse(raw)}catch(e){}
    const payload=gerarPixCopiaECola_(metodo,valorAgora,loteria);
    node.textContent=payload;
    const img=document.getElementById('qrPix_'+idx);
    if(img)img.src=qrUrl_(payload);
  });
}

function togglePagamentoRecorrenteModal(){
  const chk=document.getElementById('pagRecorrente');
  const box=document.getElementById('pagRecorrenteCampos');
  if(box)box.classList.toggle('hidden',!(chk&&chk.checked));
}

async function registrarAquisicaoCotaModal(loteria){
  const qtd=Math.max(1,num(document.getElementById('pagQtdCotas')?document.getElementById('pagQtdCotas').value:1));
  const valorTotal=document.getElementById('pagValorTotal')?document.getElementById('pagValorTotal').value:'';
  const valorAgora=document.getElementById('pagValorAgora')?document.getElementById('pagValorAgora').value:'';
  const rec=document.getElementById('pagRecorrente');
  const recorrente=!!(rec&&rec.checked);
  const parcelas=Math.max(1,num(document.getElementById('pagRecMeses')?document.getElementById('pagRecMeses').value:1));
  const dia=Math.max(1,Math.min(31,num(document.getElementById('pagRecDia')?document.getElementById('pagRecDia').value:10)));
  const obs=document.getElementById('pagRecObs')?document.getElementById('pagRecObs').value:'';

  try{
    const r=await api('registrarAquisicaoCotaBolao',{},[{email:ESTADO.email,loteria,qtdCotas:qtd,valorTotal,valorPagamentoAgora:valorAgora,parcelado:recorrente,qtdParcelas:parcelas,diaPreferencial:dia,obs}]);
    toast((r&&r.msg)||'Aquisição registrada. Envie o comprovante após realizar o pagamento.');
    cacheDel_('boloes_'+normalizar(ESTADO.email).replace(/[^A-Z0-9]+/g,'_'));
  }catch(err){
    toast(err.message,'error');
  }
}

async function salvarPlanejamentoRecorrenteModal(loteria){
  return registrarAquisicaoCotaModal(loteria);
}

function renderMetodoPagamento_(m,b,i){
  const valor=num(b._valorPagamentoModalInicial||b.valorCota||0);
  const isPix=normalizar(m.tipoRecebimento||'').includes('PIX')||m.chavePix;
  const payload=isPix?gerarPixCopiaECola_(m,valor,b.loteria||b.nome):'';
  const encoded=encodeURIComponent(JSON.stringify(m||{}));

  return `
    <div class="pay-method">
      <h4>${escapeHtml(labelTipoRecebimento_(m.tipoRecebimento||'Recebimento'))}</h4>
      <p><strong>Recebedor:</strong> ${escapeHtml(m.nomeCompleto||'-')}</p>
      ${m.chavePix?`<p><strong>Pix:</strong> ${escapeHtml(m.tipoPix||'Chave')} — ${escapeHtml(m.chavePix)}</p>`:''}
      ${m.banco?`<p><strong>Banco:</strong> ${escapeHtml(m.banco)} ${m.agencia?` • Agência: ${escapeHtml(m.agencia)}`:''} ${m.conta?` • Conta: ${escapeHtml(m.conta)}`:''}</p>`:''}
      ${m.obs?`<p><strong>Obs.:</strong> ${escapeHtml(m.obs)}</p>`:''}
      ${isPix?`
        <img class="qr-img" id="qrPix_${i}" src="${escapeAttr(qrUrl_(payload))}" alt="QR Code Pix">
        <div class="pay-copy-label">Pix copia e cola</div>

 * Correção focada: o modal não fica mais parado em "Carregando meios".
 * - Abre imediatamente com seleção de cotas e valores.
 * - Usa cache local de todos os dados de recebimento.
 * - Pré-carrega DADOS_RECEBIMENTO em segundo plano.
 * - Atualiza os meios de pagamento sem travar a tela.
 * ===================================================================== */
(function(){
  const PSS_PRELOAD_BASE_V174 = window.preCarregarDadosEstaticos;

  function cacheNomeRecebimentosTodos_(){
    return 'dados_recebimento_todos_' + normalizar(ESTADO.email||'publico').replace(/[^A-Z0-9]+/g,'_');
  }

  function normalizarListaRecebimentos_(dados){
    if(Array.isArray(dados)) return dados;
    if(dados && Array.isArray(dados.dados)) return dados.dados;
    if(dados && Array.isArray(dados.rows)) return dados.rows;
    return [];
  }

  function filtrarRecebimentosPorBolao_(lista,loteria){
    const alvo=normalizar(loteria||'');
    return listaSegura_(lista).filter(m=>{
      const ativo=normalizar(m.ativo||m.status||'SIM');
      if(!(ativo==='SIM'||ativo==='S'||ativo==='ATIVO'||ativo==='TRUE')) return false;
      const lot=normalizar(m.loteria||m.bolao||m.bolão||'');
      return !alvo || !lot || lot===alvo;
    });
  }

  async function carregarRecebimentosTodosTurbo_(forcar=false){
    const nome=cacheNomeRecebimentosTodos_();
    if(!forcar){
      const fresh=cacheGet_(nome,false);
      if(fresh) return normalizarListaRecebimentos_(fresh);
      const expired=cacheGet_(nome,true);
      if(expired){
        setTimeout(()=>carregarRecebimentosTodosTurbo_(true).catch(()=>{}),80);
        return normalizarListaRecebimentos_(expired);
      }
    }

    const dados=await promiseTimeout_(
      apiMulti([
        {action:'getDadosRecebimento',dados:{email:ESTADO.email,loteria:''},args:[ESTADO.email,'']},
        {action:'listarDadosRecebimento',dados:{email:ESTADO.email,loteria:''},args:[ESTADO.email,'']}
      ]),
      9000,
      'Tempo limite ao carregar os meios de pagamento.'
    );

    const lista=normalizarListaRecebimentos_(dados);
    cacheSet_(nome,lista,CACHE_TTL.longo||1800000);
    return lista;
  }

  window.preCarregarRecebimentosAtivosTurbo_ = async function(){
    try{ await carregarRecebimentosTodosTurbo_(false); }catch(e){}
  };

  window.preCarregarDadosEstaticos = function(){
    try{ if(typeof PSS_PRELOAD_BASE_V174==='function') PSS_PRELOAD_BASE_V174(); }catch(e){}
    setTimeout(()=>window.preCarregarRecebimentosAtivosTurbo_(),700);
  };

  function renderMetodosPagamentoTurbo_(lista,b){
    const metodos=filtrarRecebimentosPorBolao_(lista,b.loteria||b.nome||'');
    if(!metodos.length){
      return '<div class="notice warn">Nenhum meio de pagamento ativo localizado para este bolão.</div>';
    }
    return `<div class="pay-method-grid">${metodos.map((m,i)=>renderMetodoPagamento_(m,b,i)).join('')}</div><div class="pay-cache-hint">Dados de pagamento carregados e mantidos em cache para abertura mais rápida.</div>`;
  }

  function atualizarBoxMetodosPagamento_(loteria,lista,origem){
    const box=document.getElementById('boxMetodosPagamento');
    if(!box) return;
    const b=getBolaoByNome_(loteria);
    box.innerHTML=renderMetodosPagamentoTurbo_(lista,b);
    setTimeout(()=>atualizarValorPagamentoModal(loteria),50);
    if(origem==='cache'){
      const hint=document.getElementById('hintAtualizacaoPagamento');
      if(hint) hint.textContent='Exibido instantaneamente pelo cache. Atualizando em segundo plano...';
    }
  }

  function renderEstruturaAquisicaoTurbo_(loteria){
    const b=getBolaoByNome_(loteria);

    return `
      <div class="notice">
        <strong>${escapeHtml(nome)}</strong><br>
        Valor da cota: <strong>${escapeHtml(moeda(valorCota))}</strong>

      <div class="acq-box">
        <h4>Quantidade e valor</h4>
        <div class="acq-row">
          <div class="field"><label>Quantidade de cotas</label><input id="pagQtdCotas" value="${escapeAttr(qtdInicial)}" inputmode="numeric" oninput="atualizarValorPagamentoModal('${escapeAttr(nome)}')"></div>

          <div class="field"><label>Valor total da aquisição</label><input id="pagValorTotal" value="${escapeAttr(moeda(valorCota*qtdInicial))}" readonly class="acq-value"></div>
          <div class="field"><label>Valor para pagamento agora</label><input id="pagValorAgora" value="${escapeAttr(moeda(valorCota*qtdInicial))}" readonly class="acq-value"></div>

            <div class="meta-box"><b>Status</b><span>${escapeHtml(b.status||'ATIVO')}</span></div>
            <div class="meta-box"><b>Sorteio</b><span>${escapeHtml(b.dataSorteio||'-')}</span></div>
            <div class="meta-box"><b>Pagamento</b><span>${escapeHtml(b.inicioPagamento||'-')} a ${escapeHtml(b.fimPagamento||'-')}</span></div>

/* =====================================================================
 * PATCH V177 — CÁLCULO AUTOMÁTICO DO OFFSET DO MENU FIXO
 * Evita sobreposição quando existe faixa superior com data/hora/usuário.
 * ===================================================================== */
(function(){
  function pssSetStickyOffsets(){
    try{
      var header =
        document.querySelector('.topbar') ||
        document.querySelector('.pss-topbar') ||
        document.querySelector('#topbar') ||
        document.querySelector('#appHeader') ||
        document.querySelector('.app-header') ||
        document.querySelector('header');

      var menu =
        document.querySelector('#menuPrincipal') ||
        document.querySelector('.menu-principal') ||
        document.querySelector('.navbar') ||
        document.querySelector('.menu') ||
        document.querySelector('nav');

      var offset = 0;

      if(header && menu && !header.contains(menu)){
        offset = Math.ceil(header.getBoundingClientRect().height || 0);
      }

      document.documentElement.style.setProperty('--pss-topbar-offset', offset + 'px');
    }catch(e){}
  }

  window.addEventListener('load', pssSetStickyOffsets);
  window.addEventListener('resize', pssSetStickyOffsets);
  window.addEventListener('orientationchange', function(){
    setTimeout(pssSetStickyOffsets, 250);
  });

  });
})();
