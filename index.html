/* =====================================================================
 * PATCH V179 — MENUS INSTANTÂNEOS / CACHE TURBO / STALE-WHILE-REFRESH
 *
 * Objetivo:
 * - Ao clicar em um menu, exibir instantaneamente a última tela carregada.
 * - Atualizar os dados em segundo plano sem mostrar "Carregando..." por cima.
 * - Manter menus pesados mais ágeis: Bolões, Palpite, Comprovante, Jogos,
 *   Regulamento, Pagamentos, Config, Consulta e demais menus.
 * ===================================================================== */
(function(){
  const PSSV179_CACHE_PREFIX='PSS_BLE_VIEW_CACHE_V179_';
  const PSSV179_TTL_PADRAO=1000*60*8;        // 8 minutos
  const PSSV179_TTL_ESTATICO=1000*60*60*6;   // 6 horas
  const PSSV179_TTL_ADMIN=1000*60*3;         // 3 minutos

  let pssV179ViewAtual='';
  let pssV179SkipLoadingView='';
  let pssV179TemCache=false;

  const pssV179SetViewBase=setView;
  const pssV179LoadingBase=loading;
  const pssV179NavegarBase=navegar;

  function pssV179StorageKey_(view){
    const email=(ESTADO.email||'publico').toLowerCase().replace(/[^a-z0-9]+/g,'_');
    const perfil=(typeof isAdmin==='function' && isAdmin())?'admin':'user';
    return PSSV179_CACHE_PREFIX+perfil+'_'+email+'_'+view;
  }

  function pssV179TtlView_(view){
    if(['regulamento','baseLoterias'].includes(view))return PSSV179_TTL_ESTATICO;
    if(['config','pagamentos','usuarios','solicitacoes','consulta','participantes'].includes(view))return PSSV179_TTL_ADMIN;
    return PSSV179_TTL_PADRAO;
  }

  function pssV179IsLoadingHtml_(html){
    html=String(html||'');
    return html.includes('Carregando') || html.includes('Aguarde...');
  }

  function pssV179PodeCachear_(html){
    html=String(html||'');
    if(!html || html.length<120)return false;
    if(pssV179IsLoadingHtml_(html))return false;
    if(html.includes('notice error'))return false;
    if(html.includes('Cannot read properties'))return false;
    if(html.includes('Erro retornado pela API'))return false;
    return true;
  }

  function pssV179CacheGet_(view){
    try{
      const raw=sessionStorage.getItem(pssV179StorageKey_(view)) || localStorage.getItem(pssV179StorageKey_(view));
      if(!raw)return null;
      const obj=JSON.parse(raw);
      if(!obj || !obj.html)return null;
      const idade=Date.now()-Number(obj.ts||0);
      if(idade>pssV179TtlView_(view)){
        try{sessionStorage.removeItem(pssV179StorageKey_(view));}catch(e){}
        return null;
      }
      return obj;
    }catch(e){
      return null;
    }
  }

  function pssV179CachePut_(view,html){
    try{
      if(!view || !pssV179PodeCachear_(html))return;
      const obj={ts:Date.now(),html:String(html||'')};
      sessionStorage.setItem(pssV179StorageKey_(view),JSON.stringify(obj));

      // Só alguns menus entram também no localStorage para abrir rápido após F5.
      if(['inicio','boloes','regulamento','jogos','palpite','comprovante'].includes(view)){
        localStorage.setItem(pssV179StorageKey_(view),JSON.stringify(obj));
      }
    }catch(e){}
  }

  function pssV179Badge_(){
    return '<div class="fast-cache-badge" title="Atualizando">● atualizando</div>';
  }

  function pssV179Skeleton_(view){
    const nome={
      inicio:'Início',
      boloes:'Bolões',
      palpite:'Palpites',
      comprovante:'Comprovantes',
      jogos:'Jogos realizados',
      especiais:'Especiais',
      regulamento:'Regulamento',
      config:'Configurações',
      pagamentos:'Pagamentos',
      usuarios:'Usuários',
      solicitacoes:'Solicitações de cadastro',
      baseLoterias:'Base Loterias',
      participantes:'Participantes',
      consulta:'Consulta'
    }[view]||'Menu';

    return `
      <div class="panel">
        <h2>${escapeHtml(nome)}</h2>
        <div class="fast-skeleton">
          <div class="fast-skeleton-line w40"></div>
          <div class="fast-skeleton-line w90"></div>
          <div class="fast-skeleton-line w60"></div>
          <div class="fast-skeleton-line w90"></div>
        </div>
      </div>
    `;
  }

  setView=function(html){
    if(pssV179SkipLoadingView && pssV179TemCache && pssV179IsLoadingHtml_(html)){
      return;
    }

    pssV179SetViewBase(html);

    if(pssV179ViewAtual && pssV179PodeCachear_(html)){
      pssV179CachePut_(pssV179ViewAtual,html);
      pssV179SkipLoadingView='';
      pssV179TemCache=false;
    }
  };

  loading=function(titulo){
    if(pssV179SkipLoadingView && pssV179TemCache){
      return;
    }
    return pssV179LoadingBase(titulo);
  };

  navegar=function(view){
    pssV179ViewAtual=view;
    ESTADO.view=view;

    document.querySelectorAll('#navMenu button[data-view]').forEach(b=>{
      b.classList.toggle('active',b.dataset.view===view);
    });

    const cached=pssV179CacheGet_(view);
    if(cached){
      pssV179TemCache=true;
      pssV179SkipLoadingView=view;
      pssV179SetViewBase(pssV179Badge_()+cached.html);
      setTimeout(()=>pssV179NavegarBase(view),20);
      return;
    }

    // Sem cache: mostra uma estrutura leve instantânea antes da API responder.
    pssV179TemCache=false;
    pssV179SkipLoadingView='';
    pssV179SetViewBase(pssV179Skeleton_(view));
    setTimeout(()=>pssV179NavegarBase(view),20);
  };

  window.pssLimparCacheMenus = function(){
    try{
      Object.keys(sessionStorage).forEach(k=>{if(k.indexOf(PSSV179_CACHE_PREFIX)===0)sessionStorage.removeItem(k)});
      Object.keys(localStorage).forEach(k=>{if(k.indexOf(PSSV179_CACHE_PREFIX)===0)localStorage.removeItem(k)});
      toast('Cache dos menus limpo.');
    }catch(e){
      toast('Não foi possível limpar o cache dos menus.','error');
    }
  };

  // Pré-aquecimento leve após login: abre rápido porque dados principais já ficam em cache.
  function pssV179PreAquecerDados_(){
    if(!ESTADO || !ESTADO.email)return;
    try{
      if(typeof carregarBoloes==='function')carregarBoloes();
    }catch(e){}
    try{
      if(typeof carregarRecebimentosTodosTurbo_==='function')carregarRecebimentosTodosTurbo_(false);
    }catch(e){}
  }

  document.addEventListener('DOMContentLoaded',function(){
    setTimeout(pssV179PreAquecerDados_,1200);
    setTimeout(pssV179PreAquecerDados_,5000);
  });
})();


/* =====================================================================
 * PATCH V181 — CACHE SEGURO SEM TIMEOUT DE BOLÕES
 *
 * Correção da V180:
 * - NÃO altera mais a função api().
 * - NÃO tira leituras da fila original.
 * - Mantém a abertura instantânea por cache de tela.
 * - Se houver cache antigo, exibe imediatamente e atualiza em segundo plano.
 * - Se não houver cache, usa o fluxo original, sem causar timeout em bolões.
 * ===================================================================== */
(function(){
  const PSSV181_PREFIX_179='PSS_BLE_VIEW_CACHE_V179_';
  const PSSV181_STALE_MAX=1000*60*60*24*7; // 7 dias

  let pssV181AtualizandoView='';
  const pssV181SetViewBase=setView;
  const pssV181LoadingBase=loading;
  const pssV181NavegarBase=navegar;

  function pssV181Perfil_(){
    try{return (typeof isAdmin==='function' && isAdmin())?'admin':'user'}catch(e){return 'user'}
  }

  function pssV181StorageKey_(view){
    const email=(ESTADO.email||'publico').toLowerCase().replace(/[^a-z0-9]+/g,'_');
    return PSSV181_PREFIX_179+pssV181Perfil_()+'_'+email+'_'+view;
  }

  function pssV181GetCacheMesmoVencido_(view){
    try{
      const key=pssV181StorageKey_(view);
      const raw=sessionStorage.getItem(key) || localStorage.getItem(key);
      if(!raw)return null;
      const obj=JSON.parse(raw);
      if(!obj || !obj.html)return null;

      const idade=Date.now()-Number(obj.ts||0);
      if(idade>PSSV181_STALE_MAX)return null;

      obj.stale=true;
      obj.idadeMs=idade;
      return obj;
    }catch(e){
      return null;
    }
  }

  function pssV181HtmlIntermediario_(html){
    html=String(html||'');
    return html.includes('Carregando') ||
           html.includes('Aguarde...') ||
           html.includes('fast-skeleton') ||
           html.includes('Carregando dados...');
  }

  function pssV181BadgeStale_(){
    return '<div class="fast-cache-badge stale" title="Atualizando em segundo plano">● atualizando</div>';
  }

  setView=function(html){
    if(pssV181AtualizandoView && pssV181HtmlIntermediario_(html)){
      return;
    }

    pssV181SetViewBase(html);

    if(pssV181AtualizandoView && !pssV181HtmlIntermediario_(html)){
      pssV181AtualizandoView='';
    }
  };

  loading=function(titulo){
    if(pssV181AtualizandoView){
      return;
    }
    return pssV181LoadingBase(titulo);
  };

  navegar=function(view){
    ESTADO.view=view;

    document.querySelectorAll('#navMenu button[data-view]').forEach(b=>{
      b.classList.toggle('active',b.dataset.view===view);
    });

    const cache=pssV181GetCacheMesmoVencido_(view);

    if(cache && cache.html){
      pssV181AtualizandoView=view;
      var _hL=(cache.html||'').replace(/<div class="fast-cache-badge[^"]*"[^>]*>[^<]*<\/div>/g,'');
      pssV181SetViewBase(pssV181BadgeStale_()+_hL);
      setTimeout(()=>pssV181NavegarBase(view),30);
      return;
    }

    return pssV181NavegarBase(view);
  };

  window.pssLimparCacheMenusCompleto = function(){
    try{
      Object.keys(sessionStorage).forEach(k=>{
        if(k.indexOf(PSSV181_PREFIX_179)===0)sessionStorage.removeItem(k);
      });
      Object.keys(localStorage).forEach(k=>{
        if(k.indexOf(PSSV181_PREFIX_179)===0)localStorage.removeItem(k);
      });
      if(typeof pssLimparCacheMenus==='function')pssLimparCacheMenus();
      toast('Cache completo dos menus limpo.');
    }catch(e){
      toast('Não foi possível limpar o cache completo.','error');
    }
  };
})();


/* =====================================================================
 * PATCH V182 — UPLOAD FORM DIRETO / DRIVE ROBUSTO
 * Base preservada: V181_CACHE_SEGURO_SEM_TIMEOUT_BOLOES
 *
 * Correção:
 * - O POST de upload agora envia o payload JSON e também campos diretos
 *   (fileData, fileName, email, loteria, concurso, dataJogo, obs).
 * - Isso evita falha quando o sistema não interpreta corretamente o
 *   payload grande com base64 dentro de JSON.
 * ===================================================================== */
(function(){
  apiPostFormWindowName_ = function(action,dados={},args=null,timeoutMs=180000){
    return new Promise((resolve,reject)=>{
      const token='PSSPOST_'+Date.now()+'_'+Math.floor(Math.random()*1e9);
      const payload=montarPayloadApi_(action,dados,args);

      const iframe=document.createElement('iframe');
      iframe.name='pss_upload_iframe_'+token;
      iframe.style.position='fixed';
      iframe.style.left='-9999px';
      iframe.style.top='-9999px';
      iframe.style.width='1px';
      iframe.style.height='1px';
      iframe.style.opacity='0';
      iframe.style.pointerEvents='none';
      iframe.setAttribute('aria-hidden','true');

      const form=document.createElement('form');
      form.method='POST';
      form.action=CONFIG.apiUrl;
      form.target=iframe.name;
      form.acceptCharset='UTF-8';
      form.enctype='application/x-www-form-urlencoded';
      form.style.display='none';

      function add(name,value){
        const input=document.createElement('input');
        input.type='hidden';
        input.name=name;
        input.value=value==null?'':String(value);
        form.appendChild(input);
      }

      add('mode','postmessage');
      add('action',action);
      add('fn',action);
      add('fnName',action);
      add('callback','callback');
      add('token',token);
      add('email',ESTADO.email||dados.email||'');
      add('payload',JSON.stringify(payload));
      add('_',String(Date.now()));

      // Campos diretos para upload. O Code_API V176 lê esses campos mesmo se o JSON falhar.
      Object.keys(dados||{}).forEach(k=>{
        if(dados[k]!==undefined && dados[k]!==null)add(k,dados[k]);
      });
      if(Array.isArray(args))add('args',JSON.stringify(args));

      let finalizado=false;
      let timer=null;

      function limpar(){
        window.removeEventListener('message',onMessage);
        if(form&&form.parentNode)form.parentNode.removeChild(form);
        if(iframe&&iframe.parentNode)iframe.parentNode.removeChild(iframe);
      }

      function finalizarOk(resposta){
        if(finalizado)return;
        finalizado=true;
        clearTimeout(timer);
        limpar();
        try{resolve(tratarRespostaApi_(resposta));}catch(e){reject(e);}
      }

      function finalizarErro(err){
        if(finalizado)return;
        finalizado=true;
        clearTimeout(timer);
        limpar();
        reject(err instanceof Error?err:new Error(String(err||'Falha no envio.')));
      }

      function onMessage(ev){
        if(finalizado)return;
        let msg=ev.data;
        if(typeof msg==='string'){
          try{msg=JSON.parse(msg);}catch(e){}
        }
        if(msg&&msg.pssBoloesApi===true&&msg.token===token){
          finalizarOk(msg.response);
        }
      }

      function tentarWindowNameFallback(){
        if(finalizado)return;
        try{
          const raw=iframe.contentWindow&&iframe.contentWindow.name?iframe.contentWindow.name:'';
          if(raw){
            const msg=JSON.parse(raw);
            if(msg&&msg.pssBoloesApi===true&&msg.token===token){
              finalizarOk(msg.response);
              return;
            }
          }
        }catch(e){}
        setTimeout(tentarWindowNameFallback,500);
      }

      window.addEventListener('message',onMessage);
      timer=setTimeout(()=>{
        finalizarErro(new Error('Tempo limite ao enviar arquivo. O servidor não confirmou o recebimento.'));
      },timeoutMs||180000);

      iframe.onerror=()=>finalizarErro(new Error('Falha ao abrir canal de upload.'));
      iframe.onload=()=>setTimeout(tentarWindowNameFallback,150);

      document.body.appendChild(iframe);
      document.body.appendChild(form);

      try{
        form.submit();
        setTimeout(tentarWindowNameFallback,800);
      }catch(err){
        finalizarErro(err);
      }
    });
  };

  apiUploadComprovante_ = async function(base64,file,loteria){
    const dados={fileData:base64,fileName:file.name,mimeType:file.type,email:ESTADO.email,loteria};
    const args=[base64,file.name,ESTADO.email,loteria];
    try{
      try{ return await uploadFetchV226_('uploadComprovante',dados,args,120000); }
      catch(_ef){ return await apiPostFormWindowName_('uploadComprovante',dados,args,180000); }
    }catch(errPost){
      if(String(base64||'').length<350000){
        return await apiMulti([
          {action:'uploadComprovante',dados,args},
          {action:'enviarComprovante',dados,args}
        ]);
      }
      throw errPost;
    }
  };

  apiUploadJogoRealizado_ = async function(base64,file,loteria,concurso,dataJogo,obs){
    const dados={fileData:base64,fileName:file.name,mimeType:file.type,email:ESTADO.email,loteria,concurso,dataJogo,obs};
    const args=[base64,file.name,ESTADO.email,loteria,concurso,dataJogo,obs];
    try{
      try{ return await uploadFetchV226_('uploadJogoRealizadoBolao',dados,args,160000); }
      catch(_ef){ return await apiPostFormWindowName_('uploadJogoRealizadoBolao',dados,args,240000); }
    }catch(errPost){
      if(String(base64||'').length<350000){
        return await apiMulti([
          {action:'uploadJogoRealizadoBolao',dados,args},
          {action:'salvarJogoRealizadoBolao',dados,args},
          {action:'enviarJogoRealizado',dados,args}
        ]);
      }
      throw errPost;
    }
  };
})();

/* =====================================================================
 * PATCH V191 — INÍCIO SEM TIMEOUT DE BOLÕES
 * Correção focada:
 * - O menu INÍCIO não fica preso tentando carregar bolões.
 * - A tela inicial interna abre imediatamente.
 * - Bolões aparecem pelo cache quando existir.
 * - Se não houver cache, mostra botão Atualizar bolões.
 * - Pré-carregamento automático não chama mais bolões/jogos.
 * - Menus específicos continuam podendo carregar seus dados sob demanda.
 * ===================================================================== */
(function(){
  try{ CONFIG.versao='V257_PALPITE_FAST_SEM_WINDOWNAME_TIMEOUT'; }catch(e){}

  const PSSV191_carregarBoloesBase = typeof carregarBoloes==='function' ? carregarBoloes : null;
  const PSSV191_preCarregarBase = typeof preCarregarDadosEstaticos==='function' ? preCarregarDadosEstaticos : null;

  function pssV191CacheNomeBoloes_(){
    try{
      return ESTADO && ESTADO.email
        ? 'boloes_'+normalizar(ESTADO.email).replace(/[^A-Z0-9]+/g,'_')
        : 'boloes_publicos';
    }catch(e){
      return 'boloes_publicos';
    }
  }

  function pssV191LerCacheBoloes_(){
    try{
      const dados = cacheGet_(pssV191CacheNomeBoloes_(), true);
      return Array.isArray(dados) ? dados.filter(x=>x&&typeof x==='object') : [];
    }catch(e){
      return [];
    }
  }

  function pssV191IsCargaAutomatica_(){
    try{
      const stack = String((new Error()).stack||'');
      return stack.indexOf('pssV179PreAquecerDados_')>=0 ||
             stack.indexOf('preCarregarDadosEstaticos')>=0 ||
             stack.indexOf('preCarregarJogosAtivos_')>=0;
    }catch(e){
      return false;
    }
  }

  if(PSSV191_carregarBoloesBase){
    carregarBoloes = async function(usarCacheRapido){
      const cache = pssV191LerCacheBoloes_();

      // Chamadas automáticas de pré-aquecimento não podem travar a abertura.
      if(pssV191IsCargaAutomatica_()){
        if(cache.length){
          try{ ESTADO.boloes=cache; }catch(e){}
          return cache;
        }
        return [];
      }

      if(usarCacheRapido && cache.length){
        try{ ESTADO.boloes=cache; }catch(e){}
        return cache;
      }

      return await PSSV191_carregarBoloesBase.apply(this, arguments);
    };
  }

  // Não pré-carrega bolões nem jogos. Mantém apenas dados leves.
  preCarregarDadosEstaticos = function(){
    setTimeout(async()=>{
      try{ if(typeof carregarRegulamentoCache_==='function') await carregarRegulamentoCache_(true); }catch(e){}
      try{ if(typeof carregarTelegramCache_==='function') await carregarTelegramCache_(true); }catch(e){}
      try{ if(typeof preCarregarRecebimentosAtivosTurbo_==='function') await preCarregarRecebimentosAtivosTurbo_(); }catch(e){}
    },500);
  };

  window.pssV191AtualizarInicioBoloes = async function(forcar){
    const box=document.getElementById('inicioBoloesConteudoV191');
    const stats=document.getElementById('inicioStatsV191');
    if(!box)return;

    function renderLista(lista, origem){
      const ativos=listaSegura_(lista)
        .filter(b=>!isHistorico(b)&&normalizar(b.status).includes('ATIVO'))
        .sort((a,b)=>String(a.dataSorteio||'').localeCompare(String(b.dataSorteio||'')));

      const minhasCotas=ativos.reduce((s,b)=>s+num(b.cotasUsuario||b.minhasCotas||0),0);
      const totalCotas=ativos.reduce((s,b)=>s+num(b.totalCotas||b.cotasTotal||0),0);
      const cotasDisponiveis=ativos.reduce((s,b)=>s+num(b.cotasDisponiveis||0),0);

      if(stats){
        stats.innerHTML=`
          ${statCard('Bolões ativos',ativos.length)}
          ${statCard('Minhas cotas',minhasCotas)}
          ${statCard('Cotas disponíveis',cotasDisponiveis)}
          ${statCard('Total de cotas',totalCotas)}
        `;
      }

      box.innerHTML = `
        <div class="actions" style="justify-content:space-between;align-items:center;">
          <div class="cache-hint" style="font-size:10px;color:#b8c4cc;font-weight:400;">${origem==='cache'?'✓ Atualizado':'✓ Atualizado agora'}</div>
          <button class="btn btn-light" onclick="pssV191AtualizarInicioBoloes(true)">Atualizar bolões</button>
        </div>
        ${ativos.length?`<div class="inicio-grid-boloes">${ativos.map((b,i)=>renderInicioBolaoCard_(b,i)).join('')}</div>`:'<div class="notice warn">Nenhum bolão ativo localizado.</div>'}
      `;
    }

    const cache=pssV191LerCacheBoloes_();
    if(cache.length && !forcar){
      renderLista(cache,'cache');
      return;
    }

    if(!forcar){
      if(stats) stats.innerHTML=`
        ${statCard('Bolões ativos','...')}
        ${statCard('Minhas cotas','...')}
        ${statCard('Cotas disponíveis','...')}
        ${statCard('Total de cotas','...')}
      `;
      box.innerHTML='<div class="notice info"><span class="loading-fast">Carregando bolões...</span></div>';
      setTimeout(()=>window.pssV191AtualizarInicioBoloes(true),150);
      return;
    }

    box.innerHTML='<div class="notice info"><span class="loading-fast">Atualizando bolões...</span></div>';
    try{
      const lista=listaSegura_(await PSSV191_carregarBoloesBase(false));
      renderLista(lista,'api');
    }catch(err){
      const cacheDepois=pssV191LerCacheBoloes_();
      if(cacheDepois.length){
        renderLista(cacheDepois,'cache');
        toast('A base demorou para responder. Exibindo dados salvos.','warn');
      }else{
        box.innerHTML=`
          <div class="notice error">${escapeHtml(err.message||'Não foi possível carregar os bolões agora.')}</div>
          <div class="actions"><button class="btn" onclick="pssV191AtualizarInicioBoloes(true)">Tentar novamente</button></div>
        `;
      }
    }
  };

  renderInicio = async function(){
    try{
      if(!ESTADO.usuario)ESTADO.usuario=normalizarUsuarioSessao_({email:ESTADO.email});
      const nome=(ESTADO.usuario&&ESTADO.usuario.nome)||'Usuário';

      setView(`
        <div class="panel no-left">
          <div class="grid">
            <div class="col-8">
              <div class="panel no-left" style="margin:0;padding:24px;">
                <h2 style="font-size:32px;">Olá, ${escapeHtml(nome)}</h2>
                <p>Painel de acompanhamento dos bolões, pagamentos, palpites, comprovantes, jogos realizados e atualizações oficiais.</p>
                <div class="actions">
                  <button class="btn" onclick="navegar('boloes')">Ver bolões</button>
                  <button class="btn btn-light" onclick="navegar('palpite')">Fazer palpite</button>
                  <button class="btn btn-light" onclick="navegar('comprovante')">Comprovantes</button>
                  <button class="btn btn-light" onclick="navegar('jogos')">Jogos</button>
                </div>
              </div>
            </div>
            <div class="col-4">
              <div class="panel no-left" style="margin:0;padding:24px;background:linear-gradient(140deg,#0b6f28,#073742);color:#fff;min-height:190px;">
                <h2 style="color:#fff;font-size:32px;">Sistema ativo</h2>
                <p style="color:#fff;">Cadastros aprovados no site.</p>
                <div style="margin-top:30px;font-weight:800;" data-live-clock>${escapeHtml(dataHoraAtualCurta())}</div>
              </div>
            </div>
          </div>

          <div class="grid" id="inicioStatsV191" style="margin-top:18px;">
            ${statCard('Bolões ativos','...')}
            ${statCard('Minhas cotas','...')}
            ${statCard('Cotas disponíveis','...')}
            ${statCard('Total de cotas','...')}
          </div>
        </div>

        <div class="panel">
          <h2>Bolões ativos</h2>
          <p style="color:#a8b4bc;font-size:11px;margin:0 0 6px;">Dados atualizados automaticamente.</p>
          <div id="inicioBoloesConteudoV191">
            <div class="notice info">Preparando painel...</div>
          </div>
        </div>
      `);

      if(isAdmin() && typeof window.inserirAtalhoConsultaInicio_==='function') window.inserirAtalhoConsultaInicio_();
      setTimeout(()=>window.pssV191AtualizarInicioBoloes(false),80);
    }catch(err){
      setView(`<div class="panel"><div class="notice error">${escapeHtml(err.message||err)}</div></div>`);
    }
  };
})();



/* =====================================================================
 * PATCH V198 — RESERVA DE COTAS + QR/PAGAMENTO SEM TRAVAR
 * - Se houver reserva pendente, o card mostra botão "Cotas reservadas".
 * - Aviso orienta enviar comprovante para dar baixa na reserva.
 * - Modal de pagamento nunca fica preso aguardando QR/meios.
 * - Pix copia e cola aparece antes do QR.
 * ===================================================================== */
(function(){
  function pssV198_key(nome){
    return String(normalizar(nome||'BOLAO')).replace(/[^A-Z0-9]+/g,'_');
  }

  function pssV198_temReserva(b){
    b=b||{};
    var s=normalizar([b.statusAquisicao,b.statusReserva,b.statusPagamento,b.status,b.aquisicaoStatus,b.reservaStatus].join(' '));
    return !!(
      b.aquisicaoPendente || b.preAquisicaoPendente || b.cotasPendentes || b.reservaPendente ||
      num(b.cotasReservadasUsuario||b.minhasCotasReservadas||b.cotasReservadasPendentes||0)>0 ||
      s.indexOf('RESERV')>=0 || s.indexOf('AGUARDANDO COMPROVANTE')>=0 || s.indexOf('PENDENTE')>=0
    );
  }

  function pssV198_marcarReservaLocal(loteria,qtd){
    var alvo=normalizar(loteria||'');
    ESTADO.boloes=listaSegura_(ESTADO.boloes).map(function(b){
      if(normalizar(b.loteria||b.nome||b.id)===alvo){
        b.aquisicaoPendente=true;
        b.reservaPendente=true;
        b.cotasPendentes=num(b.cotasPendentes||0)+num(qtd||1);
        b.cotasReservadasUsuario=num(b.cotasReservadasUsuario||0)+num(qtd||1);
        b.statusReserva='Reservado - aguardando comprovante';
      }
      return b;
    });
    try{cacheSet_('boloes_'+normalizar(ESTADO.email).replace(/[^A-Z0-9]+/g,'_'),ESTADO.boloes,CACHE_TTL.curto||300000);}catch(e){}
  }

  window.abrirAvisoCotasReservadas = function(loteria){

      <div class="notice warn">
        <strong>Você possui cotas reservadas neste bolão.</strong><br><br>

          <div class="meta-grid">

  };

  window.qrUrl_ = function(text){
    return 'https://quickchart.io/qr?size=220&text='+encodeURIComponent(text||'');

  window.carregarQrPagamentoV198 = function(btn,id,payload){
    var holder=document.getElementById('qrHolder_'+id);
    if(!holder)return;
    holder.innerHTML='<div class="notice info">Gerando QR Code...</div>';
    var img=new Image();
    var done=false;
    var timer=setTimeout(function(){
      if(done)return;
      done=true;
      holder.innerHTML=`
        <div class="notice warn">
          O QR Code demorou para carregar. Use o Pix Copia e Cola abaixo ou tente novamente.
        </div>
        <div class="actions">
          <button type="button" class="btn btn-light" onclick="carregarQrPagamentoV198(this,'${escapeAttr(id)}','${escapeAttr(payload)}')">Tentar QR novamente</button>
          <a class="btn btn-light" target="_blank" href="${escapeAttr(qrUrl_(payload))}">Abrir QR em nova aba</a>
        </div>
      `;
    },6500);
    img.onload=function(){
      if(done)return;
      done=true;
      clearTimeout(timer);
      holder.innerHTML='';
      holder.appendChild(img);
    };
    img.onerror=function(){
      if(done)return;
      done=true;
      clearTimeout(timer);
      holder.innerHTML=`
        <div class="notice warn">Não foi possível carregar o QR Code automático. Use o Pix Copia e Cola.</div>
        <div class="actions"><a class="btn btn-light" target="_blank" href="${escapeAttr(qrUrl_(payload))}">Abrir QR em nova aba</a></div>

    img.alt='QR Code Pix';
    img.src=qrUrl_(payload);
  };

  window.renderMetodoPagamento_ = function(m,b,i){

    const payload=isPix?gerarPixCopiaECola_(m,valor,b.loteria||b.nome):'';

    return `

        ${m.obs?`<p><strong>Obs.:</strong> ${escapeHtml(m.obs)}</p>`:''}

        ${isPix?`
          <div class="pay-copy" data-pix-payload="${i}">${escapeHtml(payload)}</div>
          <div class="qr-actions">
            <button type="button" class="btn" onclick="copiarTextoPagamento(this.closest('.pay-method').querySelector('.pay-copy').textContent)">Copiar Pix</button>
            <button type="button" class="btn btn-light" onclick="carregarQrPagamentoV198(this,'${escapeAttr(safeId)}','${escapeAttr(payload)}')">Gerar QR Code</button>
          </div>
          <div class="qr-holder" id="qrHolder_${escapeAttr(safeId)}"></div>
        `:''}
      </div>
    `;
  };

  function pssV198_renderMetodosPagamento(lista,b,nome,carregando){
    lista=Array.isArray(lista)?lista:[];
    if(lista.length){
      return `<div class="pay-method-grid">${lista.map((m,i)=>renderMetodoPagamento_(m,b,i)).join('')}</div>`;

          <button type="button" class="btn btn-light" onclick="carregarMetodosPagamentoModalAsync_('${escapeAttr(nome)}',getBolaoByNome_('${escapeAttr(nome)}'),'PSS_BOLAO_METODOS_PAGAMENTO_${escapeAttr(pssV198_key(nome))}')">Tentar carregar agora</button>
        </div>

    }
    return '<div class="notice warn">Nenhum meio de pagamento ativo localizado para este bolão.</div>';
  }

  window.renderCorpoAdquirirCotas_ = function(b,nome,lista,carregando){
    lista=Array.isArray(lista)?lista:[];
    const valorCota=num(b.valorCota||0);
    const parcelas=Math.max(1,num(b.qtdParcelas||b.parcelas||1)||1);
    const disponiveis=(typeof disponibilidadeBolaoUI_==='function')?disponibilidadeBolaoUI_(b):num(b.cotasDisponiveis||0);
    const qtdInicial=disponiveis<=0?0:1;

    return `
      <div class="notice">
        <strong>${escapeHtml(nome)}</strong><br>
        Valor da cota: <strong>${escapeHtml(moeda(valorCota))}</strong><br>
        ${disponiveis<999999?`Cotas disponíveis agora: <strong id="pagCotasDisponiveisInfo">${escapeHtml(disponiveis)}</strong>`:''}
      </div>

      ${pssV198_temReserva(b)?`
        <div class="notice warn">
          Você possui cotas reservadas neste bolão. Se já efetuou o pagamento, favor enviar o comprovante para dar baixa no sistema de reserva de cotas.
        </div>
      `:''}

      <div class="acq-box">
        <h4>Quantidade e valor</h4>
        <div class="acq-row">
          <div class="field"><label>Quantidade de cotas</label><input id="pagQtdCotas" value="${escapeAttr(qtdInicial)}" inputmode="numeric" oninput="atualizarValorPagamentoModal('${escapeAttr(nome)}')"></div>
          <div class="field"><label>Valor da cota</label><input value="${escapeAttr(moeda(valorCota))}" readonly class="acq-value"></div>
          <div class="field"><label>Valor total da aquisição</label><input id="pagValorTotal" value="${escapeAttr(moeda(valorCota*qtdInicial))}" readonly class="acq-value"></div>
          <div class="field"><label>Valor para pagamento agora</label><input id="pagValorAgora" value="${escapeAttr(moeda(valorCota*qtdInicial))}" readonly class="acq-value"></div>
        </div>

        ${parcelas>1?`
          <div class="pag-recorrente-box">
            <h4>Parcelamento/recorrência opcional</h4>
            <label class="checkline"><input type="checkbox" id="pagRecorrente" onchange="togglePagamentoRecorrenteModal();atualizarValorPagamentoModal('${escapeAttr(nome)}')"><span>Quero dividir o valor da cota em parcelas mensais.</span></label>
            <div id="pagRecorrenteCampos" class="pag-recorrente-inline hidden">
              <div class="field"><label>Quantidade de parcelas</label><input id="pagRecMeses" value="${escapeAttr(parcelas)}" inputmode="numeric" oninput="atualizarValorPagamentoModal('${escapeAttr(nome)}')"></div>
              <div class="field"><label>Valor mensal estimado</label><input id="pagValorParcela" readonly class="acq-value" value="${escapeAttr(moeda((valorCota*qtdInicial)/parcelas))}"></div>
              <div class="field"><label>Dia preferencial</label><input id="pagRecDia" value="10" inputmode="numeric"></div>
              <div class="field"><label>Observação</label><input id="pagRecObs" placeholder="Opcional"></div>

        <div class="actions" style="margin-top:12px;">
          <button type="button" class="btn" id="btnRegistrarAquisicaoCota" ${disponiveis<=0?'disabled':''} onclick="registrarAquisicaoCotaModal('${escapeAttr(nome)}')">Registrar aquisição</button>
          <button type="button" class="btn btn-light" onclick="fecharModal();navegar('comprovante')">Enviar comprovante</button>
        </div>
        <div id="pagReservaMsg"></div>
      </div>

      <h4 style="margin:16px 0 8px;color:#003b12;">Dados para pagamento</h4>

  window.abrirPagamentoBolao = function(loteria){
    const b=getBolaoByNome_(loteria);
    const nome=b.loteria||b.nome||loteria;
    const cacheKey='PSS_BOLAO_METODOS_PAGAMENTO_'+pssV198_key(nome);
    let listaCache=[];
    try{
      const cached=JSON.parse(localStorage.getItem(cacheKey)||'null');
      if(cached&&Array.isArray(cached.lista)&&Date.now()-Number(cached.ts||0)<10*60*1000)listaCache=cached.lista;
    }catch(e){}

    abrirModal('Adquirir cotas',renderCorpoAdquirirCotas_(b,nome,listaCache,listaCache.length===0));
    setTimeout(()=>atualizarValorPagamentoModal(nome),80);

    carregarMetodosPagamentoModalAsync_(nome,b,cacheKey);
  };

  window.carregarMetodosPagamentoModalAsync_ = async function(nome,b,cacheKey){
    const box=document.getElementById('metodosPagamentoBox');
    let finalizado=false;
    const avisoTimer=setTimeout(function(){
      if(finalizado||!box)return;
      box.innerHTML=`
        <div class="notice warn">
          Os meios de pagamento ainda estão demorando para carregar. Você já pode reservar as cotas e enviar o comprovante pelo botão acima.
        </div>
        <div class="actions">
          <button type="button" class="btn btn-light" onclick="carregarMetodosPagamentoModalAsync_('${escapeAttr(nome)}',getBolaoByNome_('${escapeAttr(nome)}'),'${escapeAttr(cacheKey)}')">Tentar carregar novamente</button>
        </div>
      `;
    },7000);

    try{
      const dados=await promiseTimeout_(
        apiMulti([
          {action:'getDadosRecebimento',dados:{email:ESTADO.email,loteria:nome},args:[ESTADO.email,nome]},
          {action:'listarDadosRecebimento',dados:{email:ESTADO.email,loteria:nome},args:[ESTADO.email,nome]}
        ]),
        10000,
        'Tempo limite ao carregar meios de pagamento.'
      );
      finalizado=true;
      clearTimeout(avisoTimer);
      const lista=Array.isArray(dados)?dados:(dados.dados||[]);
      try{localStorage.setItem(cacheKey,JSON.stringify({ts:Date.now(),lista:lista}));}catch(e){}
      if(box){
        box.innerHTML=pssV198_renderMetodosPagamento(lista,b,nome,false);
        setTimeout(()=>atualizarValorPagamentoModal(nome),50);
      }
    }catch(err){
      finalizado=true;
      clearTimeout(avisoTimer);
      if(box){
        box.innerHTML=`
          <div class="notice warn">
            Não foi possível carregar os meios de pagamento agora. Você pode reservar as cotas e enviar o comprovante normalmente.
            <br>Detalhe: ${escapeHtml(err.message||err)}
          </div>
          <div class="actions">
            <button type="button" class="btn btn-light" onclick="carregarMetodosPagamentoModalAsync_('${escapeAttr(nome)}',getBolaoByNome_('${escapeAttr(nome)}'),'${escapeAttr(cacheKey)}')">Tentar novamente</button>
          </div>
        `;
      }
    }
  };

  window.registrarAquisicaoCotaModal = async function(loteria){
    var b=getBolaoByNome_(loteria);
    var max=(typeof disponibilidadeBolaoUI_==='function')?disponibilidadeBolaoUI_(b):num(b.cotasDisponiveis||999999);
    var qtd=(typeof clampQtdCotasModal_==='function')?clampQtdCotasModal_(loteria,true):Math.max(1,num(document.getElementById('pagQtdCotas')?document.getElementById('pagQtdCotas').value:1));

    if(max<=0){toast('Não há cotas disponíveis para este bolão no momento.','warn');return;}
    if(max<999999 && qtd>max){toast('A quantidade solicitada ultrapassa as cotas disponíveis.','error');return;}

    var btn=document.getElementById('btnRegistrarAquisicaoCota');
    if(btn){btn.disabled=true;btn.textContent='Reservando cotas...';}

    var valorTotal=document.getElementById('pagValorTotal')?document.getElementById('pagValorTotal').value:'';
    var valorAgora=document.getElementById('pagValorAgora')?document.getElementById('pagValorAgora').value:'';
    var rec=document.getElementById('pagRecorrente');
    var recorrente=!!(rec&&rec.checked);
    var parcelas=Math.max(1,num(document.getElementById('pagRecMeses')?document.getElementById('pagRecMeses').value:1));
    var dia=Math.max(1,Math.min(31,num(document.getElementById('pagRecDia')?document.getElementById('pagRecDia').value:10)));
    var obs=document.getElementById('pagRecObs')?document.getElementById('pagRecObs').value:'';

    try{
      var r=await api('registrarAquisicaoCotaBolao',{},[{email:ESTADO.email,loteria,qtdCotas:qtd,valorTotal,valorPagamentoAgora:valorAgora,parcelado:recorrente,qtdParcelas:parcelas,diaPreferencial:dia,obs}]);
      pssV198_marcarReservaLocal(loteria,qtd);

      if(typeof subtrairBolaoLocalDisponibilidade_==='function'){
        subtrairBolaoLocalDisponibilidade_(loteria,qtd,r&&r.disponibilidadeRestante);
      }else{
        var alvo=normalizar(loteria||'');
        ESTADO.boloes=listaSegura_(ESTADO.boloes).map(function(x){
          if(normalizar(x.loteria||x.nome||x.id)===alvo)x.cotasDisponiveis=Math.max(0,num(x.cotasDisponiveis||0)-qtd);
          return x;
        });
      }

      cacheDel_('boloes_'+normalizar(ESTADO.email).replace(/[^A-Z0-9]+/g,'_'));

      var msg=document.getElementById('pagReservaMsg');
      if(msg){
        msg.innerHTML='<div class="notice warn" style="margin-top:10px;"><strong>Cotas reservadas.</strong><br>Se já efetuou o pagamento, favor enviar o comprovante para dar baixa no sistema de reserva de cotas.</div>';
      }

      toast((r&&r.msg)||'Cota(s) reservada(s). Envie o comprovante após realizar o pagamento.');

      if(btn){btn.disabled=false;btn.textContent='Cotas reservadas';btn.classList.add('btn-reserved');btn.onclick=function(){abrirAvisoCotasReservadas(loteria)};}
      atualizarValorPagamentoModal(loteria);
    }catch(err){
      toast(err.message||err,'error');
      if(btn){btn.disabled=false;btn.textContent='Registrar aquisição';}
    }
  };
})();



/* =====================================================================
 * PATCH V199 — QR CODE PIX AUTOMÁTICO
 * - Remove necessidade de clicar em "Gerar QR Code".
 * - O QR aparece automaticamente junto com o Pix Copia e Cola.
 * - Se o serviço externo do QR falhar, mantém Pix Copia e Cola e botão para abrir QR em nova aba.
 * ===================================================================== */
(function(){
  window.renderMetodoPagamento_ = function(m,b,i){
    const valor=(typeof getValorPagamentoAgora_==='function')
      ? getValorPagamentoAgora_()
      : (num(b.valorCota||0)*Math.max(1,num(b.cotasUsuario||b.minhasCotas||1)||1));

    const isPix=normalizar(m.tipoRecebimento||'').includes('PIX')||m.chavePix;
    const payload=isPix?gerarPixCopiaECola_(m,valor,b.loteria||b.nome):'';
    const safeId='v199_'+i+'_'+Math.floor(Math.random()*100000);
    const qrSrc=payload?qrUrl_(payload):'';

    return `
      <div class="pay-method">
        <h4>${escapeHtml(labelTipoRecebimento_(m.tipoRecebimento||'Recebimento'))}</h4>
        <p><strong>Recebedor:</strong> ${escapeHtml(m.nomeCompleto||'-')}</p>
        ${m.chavePix?`<p><strong>Pix:</strong> ${escapeHtml(m.tipoPix||'Chave')} — ${escapeHtml(m.chavePix)}</p>`:''}
        ${m.banco?`<p><strong>Banco:</strong> ${escapeHtml(m.banco)} ${m.agencia?` • Agência: ${escapeHtml(m.agencia)}`:''} ${m.conta?` • Conta: ${escapeHtml(m.conta)}`:''}</p>`:''}
        ${m.obs?`<p><strong>Obs.:</strong> ${escapeHtml(m.obs)}</p>`:''}

        ${isPix?`
          <div class="pay-copy" data-pix-payload="${i}">${escapeHtml(payload)}</div>

          <div class="qr-actions">
            <button type="button" class="btn" onclick="copiarTextoPagamento(this.closest('.pay-method').querySelector('.pay-copy').textContent)">Copiar Pix</button>
            <a class="btn btn-light" target="_blank" href="${escapeAttr(qrSrc)}">Abrir QR</a>
          </div>

          <div class="qr-auto-box" id="qrAutoBox_${escapeAttr(safeId)}">
            ${payload?`
              <img id="qrPix_${i}" src="${escapeAttr(qrSrc)}" alt="QR Code Pix" loading="eager"
                onload="var s=document.getElementById('qrStatus_${escapeAttr(safeId)}');if(s)s.textContent='QR Code gerado automaticamente.';"
                onerror="this.style.display='none';var s=document.getElementById('qrStatus_${escapeAttr(safeId)}');if(s)s.innerHTML='Não foi possível carregar o QR Code automático. Use o Pix Copia e Cola ou clique em Abrir QR.';">
              <div class="qr-auto-status" id="qrStatus_${escapeAttr(safeId)}">Gerando QR Code automaticamente...</div>
            `:`<div class="notice warn">Não foi possível gerar Pix Copia e Cola para este meio de pagamento.</div>`}
          </div>
        `:''}
      </div>
    `;
  };

  const atualizarValorPagamentoModalBaseV199 = window.atualizarValorPagamentoModal;
  window.atualizarValorPagamentoModal = function(loteria){
    if(typeof atualizarValorPagamentoModalBaseV199==='function'){
      atualizarValorPagamentoModalBaseV199(loteria);
    }

    document.querySelectorAll('[data-pix-payload]').forEach(function(node){
      var idx=node.dataset.pixPayload;
      var raw=node.dataset.metodo?decodeURIComponent(node.dataset.metodo):'{}';
      var metodo={};

      // Alguns blocos novos não usam data-metodo. Nesse caso, mantém o QR já gerado.
      if(!raw || raw==='{}')return;

      try{metodo=JSON.parse(raw)}catch(e){return}
      var valorAgora=(typeof getValorPagamentoAgora_==='function')?getValorPagamentoAgora_():0;
      var payload=gerarPixCopiaECola_(metodo,valorAgora,loteria);
      if(payload)node.textContent=payload;

      var img=document.getElementById('qrPix_'+idx);
      if(img&&payload)img.src=qrUrl_(payload);
    });
  };
})();



/* =====================================================================
 * PATCH V200 — INSCRITO SOMENTE COM COTAS CONFIRMADAS
 * Correção:
 * - Administrador não é mais tratado automaticamente como participante.
 * - "Participante inscrito" só aparece se houver cotas confirmadas (>0).
 * - Se houver reserva pendente, aparece "Cotas reservadas".
 * - Se não houver cotas confirmadas nem reserva, aparece "Não inscrito neste bolão".
 * ===================================================================== */
(function(){
  window.usuarioParticipaBolaoUI_ = usuarioParticipaBolaoUI_ = function(b){
    b=b||{};
    const minhas=num(b.cotasUsuario||b.minhasCotas||b.minhasCotasConfirmadas||b.cotasConfirmadasUsuario||0);
    const status=normalizar([b.statusParticipacao,b.statusPagamento,b.statusCota,b.statusAquisicao].join(' '));
    const flagFalse=(b.participanteInscrito===false || String(b.participanteInscrito).toLowerCase()==='false');
    const confirmado=status.indexOf('CONFIRM')>=0 || status.indexOf('PAGO')>=0 || status.indexOf('APROV')>=0;
    return minhas>0 && !flagFalse && (confirmado || b.participanteInscrito===true || b.participanteInscrito===undefined || b.participanteInscrito===null || b.participanteInscrito==='');
  };

  window.usuarioTemReservaBolaoUI_ = function(b){
    b=b||{};
    const status=normalizar([b.statusAquisicao,b.statusReserva,b.statusPagamento,b.aquisicaoStatus,b.reservaStatus].join(' '));
    return !!(
      b.aquisicaoPendente || b.preAquisicaoPendente || b.cotasPendentes || b.reservaPendente ||
      num(b.cotasReservadasUsuario||b.minhasCotasReservadas||b.cotasReservadasPendentes||0)>0 ||
      status.indexOf('RESERV')>=0 || status.indexOf('AGUARDANDO COMPROVANTE')>=0 || status.indexOf('PENDENTE')>=0
    );
  };

  window.labelBotaoPrincipalBolao_ = labelBotaoPrincipalBolao_ = function(b,origem){
    if(isHistorico(b))return 'Abrir';
    if(window.usuarioTemReservaBolaoUI_(b))return 'Cotas reservadas';
    if(origem==='palpite')return usuarioParticipaBolaoUI_(b)?'Abrir palpite':'Adquirir cotas';
    if(usuarioParticipaBolaoUI_(b))return 'Ver opções';
    return 'Adquirir cotas';
  };

  window.renderCardsBoloes = renderCardsBoloes = function(lista,origem){
    lista=listaSegura_(lista);
    if(!lista.length)return `<div class="notice warn">Nenhum bolão localizado.</div>`;

    return `<div class="cards-row">${lista.map(function(b){
      var nome=b.nome||b.loteria||'Bolão';
      var participa=usuarioParticipaBolaoUI_(b);
      var reservado=window.usuarioTemReservaBolaoUI_(b);
      var disp=(typeof disponibilidadeBolaoUI_==='function')?disponibilidadeBolaoUI_(b):num(b.cotasDisponiveis||0);
      var esgotado=disp<=0&&!participa&&!reservado&&!isHistorico(b);
      var botao=labelBotaoPrincipalBolao_(b,origem);
      var badge=participa?'Participante inscrito':(reservado?'Cotas reservadas':'Não inscrito neste bolão');
      var badgeClass=participa?'':'locked';
      var acao=reservado
        ? `abrirAvisoCotasReservadas('${escapeAttr(b.loteria||b.nome||b.id)}')`
        : `selecionarBolao('${escapeAttr(b.loteria||b.nome||b.id)}','${origem}')`;

      return `
        <div class="bolao-card">
          <h3>🎯 ${escapeHtml(nome)}</h3>
          ${origem==='boloes'?`<div class="status-pill ${badgeClass}">${escapeHtml(badge)}</div><br>`:''}
          ${disp<999999?`<div class="outline-pill ${esgotado?'danger':''}">Cotas disponíveis: ${escapeHtml(disp)}</div>`:''}
          <div class="meta-grid">
            <div class="meta-box"><b>Status</b><span>${escapeHtml(b.status||'ATIVO')}</span></div>
            <div class="meta-box"><b>Sorteio</b><span>${escapeHtml(b.dataSorteio||'-')}</span></div>
            <div class="meta-box"><b>Pagamento</b><span>${escapeHtml(b.inicioPagamento||'-')} a ${escapeHtml(b.fimPagamento||'-')}</span></div>
            <div class="meta-box"><b>Palpites</b><span>${escapeHtml(b.inicioPalpite||'-')} a ${escapeHtml(b.fimPalpite||'-')}</span></div>
          </div>
          <button class="btn ${reservado?'btn-reserved':''} ${esgotado?'disabled':''}" ${esgotado?'disabled':''} onclick="${acao}">${escapeHtml(botao)}</button>
        </div>
      `;
    }).join('')}</div>`;
  };
})();

              <strong>${escapeHtml(x.loteria||x.bolao||'-')}</strong>

      `;

      document.getElementById('modalConteudo').innerHTML=`<div class="notice error">${escapeHtml(err.message||err)}</div>`;

  };

  const aplicarLayoutLogadoBaseV201=window.aplicarLayoutLogado||aplicarLayoutLogado;
  window.aplicarLayoutLogado = aplicarLayoutLogado = function(){
    aplicarLayoutLogadoBaseV201();
    setTimeout(()=>carregarBadgeInscritosTopo(),350);
  };

  function tlvPixSeguroV201_(id,value){
    value=String(value||'');
    return id+String(value.length).padStart(2,'0')+value;
  }

  function crc16PixSeguroV201_(payload){
    let crc=0xFFFF;
    for(let i=0;i<payload.length;i++){
      crc^=payload.charCodeAt(i)<<8;
      for(let j=0;j<8;j++)crc=(crc&0x8000)?((crc<<1)^0x1021):(crc<<1);
      crc&=0xFFFF;
    }
    return crc.toString(16).toUpperCase().padStart(4,'0');
  }

  function sanitizarPixSeguroV201_(s){
    return String(s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^A-Za-z0-9 ]/g,'').toUpperCase().trim();
  }

  window.gerarPixCopiaEColaSeguroV201_ = function(m,valor,loteria){
    try{
      const p=gerarPixCopiaECola_(m,valor,loteria);
      if(p&&String(p).length>30)return p;
    }catch(e){}
    const chave=String((m&&m.chavePix)||'').trim();
    if(!chave)return '';

/* =====================================================================
 * PATCH V207 — QR automático ajustado + cota integral/fracionada + recorrência
 * ===================================================================== */
(function(){
  function v207ValorCotaBase_(b){
    return num((b&&b.valorCota)||0);
  }

  function v207TipoCota_(){
    var el=document.getElementById('pagTipoCota');
    return String((el&&el.value)||'INTEGRAL').toUpperCase();
  }

  function v207FracaoCota_(){
    var tipo=v207TipoCota_();
    if(tipo!=='FRACIONADA')return 1;
    var el=document.getElementById('pagFracaoCota');
    var f=Math.max(2,Math.min(5,num(el?el.value:2)||2));
    return f;
  }

  function v207QtdBase_(){
    var q=Math.max(1,num(document.getElementById('pagQtdCotas')?document.getElementById('pagQtdCotas').value:1)||1);
    return q;
  }

  function v207Parcelas_(){
    var rec=document.getElementById('pagRecorrente');
    if(!(rec&&rec.checked))return 1;
    var el=document.getElementById('pagRecMeses');
    return Math.max(2,Math.min(12,num(el?el.value:2)||2));
  }

  function v207CalcularPagamento_(loteria){
    var b=getBolaoByNome_(loteria);
    var valorCota=v207ValorCotaBase_(b);
    var qtd=v207QtdBase_();
    var fracao=v207FracaoCota_();
    var tipo=v207TipoCota_();
    var cotasEquivalentes=qtd/fracao;
    var valorTotal=valorCota*cotasEquivalentes;
    var parcelas=v207Parcelas_();
    var valorAgora=valorTotal/parcelas;
    return {
      b:b,
      tipoCota:tipo,
      fracaoCota:fracao,
      qtdBase:qtd,
      cotasEquivalentes:cotasEquivalentes,
      valorCota:valorCota,
      valorTotal:valorTotal,
      parcelas:parcelas,
      valorAgora:valorAgora
    };
  }

/* =====================================================================
 * PATCH V208 — ALINHAMENTO + PARCELAS FIXADAS PELA CONFIG DO BOLÃO
 * - Parcelamento recorrente usa o campo Qtd parcelas do bolão.
 * - Se Qtd parcelas = 1, não oferece recorrência.
 * - QR Code recalcula automaticamente pelo valor para pagamento agora.
 * ===================================================================== */
(function(){
  function v208Bolao_(loteria){
    return getBolaoByNome_(loteria)||{};
  }

  function v208QtdParcelasBolao_(b){
    b=b||{};
    var n=num(b.qtdParcelas||b.parcelas||b.QTD_PARCELAS||b.qtd_parcelas||1)||1;
    n=Math.floor(n);
    if(n<1)n=1;
    if(n>60)n=60;
    return n;
  }

  function v208TipoCota_(){
    var el=document.getElementById('pagTipoCota');
    return String((el&&el.value)||'INTEGRAL').toUpperCase();
  }

  function v208FracaoCota_(){
    if(v208TipoCota_()!=='FRACIONADA')return 1;
    var el=document.getElementById('pagFracaoCota');
    var f=Math.floor(num(el?el.value:2)||2);
    if(f<2)f=2;
    if(f>5)f=5;
    return f;
  }

  function v208QtdBase_(){
    var el=document.getElementById('pagQtdCotas');
    var q=Math.floor(num(el?el.value:1)||1);
    return Math.max(1,q);
  }

  function v208RecorrenteAtivo_(){
    var chk=document.getElementById('pagRecorrente');
    return !!(chk&&chk.checked);
  }

  function v208CalcularPagamento_(loteria){
    var b=v208Bolao_(loteria);
    var valorCota=num(b.valorCota||0);
    var qtd=v208QtdBase_();
    var fracao=v208FracaoCota_();
    var tipo=v208TipoCota_();
    var cotasEquivalentes=qtd/fracao;
    var valorTotal=valorCota*cotasEquivalentes;
    var qtdParcelasBolao=v208QtdParcelasBolao_(b);
    var parcelas=(v208RecorrenteAtivo_()&&qtdParcelasBolao>1)?qtdParcelasBolao:1;
    var valorAgora=parcelas>1?(valorTotal/parcelas):valorTotal;

    return {
      b:b,
      tipoCota:tipo,
      fracaoCota:fracao,
      qtdBase:qtd,
      cotasEquivalentes:cotasEquivalentes,
      valorCota:valorCota,
      valorTotal:valorTotal,
      qtdParcelasBolao:qtdParcelasBolao,
      parcelas:parcelas,
      valorAgora:valorAgora
    };
  }

  window.toggleTipoCotaModalV207 = function(loteria){
    var tipo=v208TipoCota_();

  };

    var lot=document.getElementById('pagLoteriaAtual')?document.getElementById('pagLoteriaAtual').value:'';
    var calc=v208CalcularPagamento_(lot);

  };

  function v208ResumoRecorrencia_(calc){
    var dia=Math.max(1,Math.min(31,num(document.getElementById('pagRecDia')?document.getElementById('pagRecDia').value:10)||10));
    if(calc.qtdParcelasBolao<=1){
      return 'Este bolão está configurado para pagamento em parcela única.';
    }
    if(calc.parcelas<=1){
      return 'Este bolão permite parcelamento em '+calc.qtdParcelasBolao+' parcela(s), conforme a configuração do bolão. Marque a opção acima para usar pagamento recorrente.';
    }
    return 'Pagamento recorrente: '+calc.qtdParcelasBolao+' parcela(s) de '+moeda(calc.valorAgora)+'. As parcelas futuras serão agendadas para o dia '+dia+' dos próximos meses.';
  }

  window.atualizarValorPagamentoModal = function(loteria){
    var calc=v208CalcularPagamento_(loteria);

    var totalEl=document.getElementById('pagValorTotal');
    if(totalEl)totalEl.value=moeda(calc.valorTotal);

    var agoraEl=document.getElementById('pagValorAgora');
    if(agoraEl)agoraEl.value=moeda(calc.valorAgora);

    var parcelaEl=document.getElementById('pagValorParcela');

    var qtdParcEl=document.getElementById('pagQtdParcelasBolao');
    if(qtdParcEl)qtdParcEl.value=calc.qtdParcelasBolao+' parcela(s)';

    var hiddenParc=document.getElementById('pagRecMeses');
    if(hiddenParc)hiddenParc.value=calc.qtdParcelasBolao;

    var eqEl=document.getElementById('pagCotasEquivalentes');
    if(eqEl)eqEl.value=(Math.round(calc.cotasEquivalentes*1000)/1000).toString().replace('.',',');

    var desc=document.getElementById('pagTipoCotaDescricao');
    if(desc){
      desc.textContent=calc.tipoCota==='FRACIONADA'
        ? ('Cota fracionada: '+calc.qtdBase+' parte(s) de 1/'+calc.fracaoCota+' cota. Equivalente a '+(Math.round(calc.cotasEquivalentes*1000)/1000).toString().replace('.',',')+' cota(s).')
        : ('Cota integral: '+calc.qtdBase+' cota(s) completa(s).');
    }

    var recResumo=document.getElementById('pagRecorrenciaResumo');
    if(recResumo)recResumo.textContent=v208ResumoRecorrencia_(calc);

    document.querySelectorAll('[data-pix-payload]').forEach(function(node){
      var idx=node.dataset.pixPayload;
      var raw=node.dataset.metodo?decodeURIComponent(node.dataset.metodo):'{}';
      var metodo={};
      try{metodo=JSON.parse(raw)}catch(e){return;}
      var payload=(typeof gerarPixCopiaEColaSeguroV201_==='function')
        ? gerarPixCopiaEColaSeguroV201_(metodo,calc.valorAgora,loteria)
        : gerarPixCopiaECola_(metodo,calc.valorAgora,loteria);
      if(payload)node.textContent=payload;
      var img=document.getElementById('qrPix_'+idx);
      if(img&&payload)img.src=qrUrl_(payload);
    });
  };

        valorPagamentoAgora:moeda(calc.valorAgora),
        parcelado:recorrente,
        qtdParcelas:calc.parcelas,
        qtdParcelasBolao:calc.qtdParcelasBolao,
        diaPreferencial:dia,
        obs:obs
      }]);

      if(typeof pssV198_marcarReservaLocal==='function')pssV198_marcarReservaLocal(loteria,calc.cotasEquivalentes);
      if(typeof subtrairBolaoLocalDisponibilidade_==='function'){
        subtrairBolaoLocalDisponibilidade_(loteria,calc.cotasEquivalentes,r&&r.disponibilidadeRestante);
      }
      cacheDel_('boloes_'+normalizar(ESTADO.email).replace(/[^A-Z0-9]+/g,'_'));

      var msg=document.getElementById('pagReservaMsg');
      if(msg){
        msg.innerHTML='<div class="notice warn" style="margin-top:10px;"><strong>Cotas reservadas.</strong><br>Se já efetuou o pagamento, favor enviar o comprovante para dar baixa no sistema de reserva de cotas.</div>';

    }catch(err){
      toast(err.message||err,'error');

    }
  };
})();



/* =====================================================================
 * PATCH V209 — EXCLUIR BOLÃO NO MENU CONFIG CORRIGIDO
 * Motivo:
 * - O botão Excluir da tela CONFIG podia usar índice da lista bruta em vez
 *   da lista filtrada exibida.
 * - Backend anterior buscava só EVENTOS_ESPECIAIS; agora aceita também
 *   BOLOES_EVENTOS e outras abas possíveis.
 * ===================================================================== */
(function(){
  function pssV209BolaoConfigPorIndice_(i){
    const lista=window.PSS_CONFIG_BOLOES_LISTA||[];
    return lista[i] || (ESTADO.boloes||[])[i] || null;
  }

  window.excluirBolaoGit = async function(i){
    const b=pssV209BolaoConfigPorIndice_(i);
    if(!b){
      toast('Bolão não localizado na lista exibida. Atualize a tela e tente novamente.','error');
      return;
    }

    const nome=b.loteria||b.nome||b.id||'';
    if(!nome){
      toast('Nome do bolão não localizado para exclusão.','error');
      return;
    }

    window.PSS_CONFIRMACAO_ADMIN={
      action:'excluirBolaoAdmin',
      arg:nome,
      nomeBolao:nome,
      reloadView:'config'
    };

    abrirModal('Confirmar exclusão',`
      <div class="notice warn">
        <strong>Excluir bolão?</strong><br>
        ${escapeHtml(nome)}
      </div>
      <p style="margin:8px 0 16px;color:#546173;">
        Esta ação remove o bolão da configuração ativa. Use apenas para registros criados por engano ou testes.
      </p>
      <div class="actions" style="justify-content:flex-end;">
        <button type="button" class="btn btn-light" onclick="fecharModal()">Cancelar</button>
        <button type="button" class="btn btn-danger" id="btnConfirmarExcluirBolaoV209" onclick="executarConfirmacaoAdmin()">Confirmar exclusão</button>
      </div>
    `);
  };

  window.executarConfirmacaoAdmin = async function(){
    const cfg=window.PSS_CONFIRMACAO_ADMIN||{};
    window.PSS_CONFIRMACAO_ADMIN=null;

    const btn=document.getElementById('btnConfirmarExcluirBolaoV209');
    if(btn){
      btn.disabled=true;
      btn.textContent='Excluindo...';
    }

    if(!cfg.action){
      fecharModal();
      return;
    }

    try{
      const r=await api(cfg.action,{},[cfg.arg]);

      // Limpeza de caches locais para não reaparecer logo após excluir.
      try{
        Object.keys(localStorage).forEach(function(k){
          if(/^PSS_|^boloes_|^public_boloes|^home_|^dashboard_/i.test(k)) localStorage.removeItem(k);
        });
      }catch(e){}

      toast((r&&r.msg)||'Bolão excluído.');
      fecharModal();

      await carregarBoloes(true);
      if(ESTADO.view==='config') renderConfigBoloesAdmin();
      else if(ESTADO.view==='boloes') renderBoloes('ativos');
      else navegar('config');
    }catch(err){
      toast((err&&err.message)||String(err),'error');
      if(btn){
        btn.disabled=false;
        btn.textContent='Confirmar exclusão';
      }
    }
  };

  // Salvar/Inativar também passam a usar a lista filtrada exibida quando existir.
  const salvarConfigBolaoGitBaseV209=window.salvarConfigBolaoGit;
  window.salvarConfigBolaoGit = async function(i){
    if(window.PSS_CONFIG_BOLOES_LISTA && window.PSS_CONFIG_BOLOES_LISTA[i]){
      const bruto=ESTADO.boloes;
      try{
        ESTADO.boloes=window.PSS_CONFIG_BOLOES_LISTA;
        return await salvarConfigBolaoGitBaseV209(i);
      }finally{
        ESTADO.boloes=bruto;
      }
    }
    return await salvarConfigBolaoGitBaseV209(i);
  };

  const inativarBolaoGitBaseV209=window.inativarBolaoGit;
  window.inativarBolaoGit = async function(i){
    if(window.PSS_CONFIG_BOLOES_LISTA && window.PSS_CONFIG_BOLOES_LISTA[i]){
      const bruto=ESTADO.boloes;
      try{
        ESTADO.boloes=window.PSS_CONFIG_BOLOES_LISTA;
        return await inativarBolaoGitBaseV209(i);
      }finally{
        ESTADO.boloes=bruto;
      }
    }
    return await inativarBolaoGitBaseV209(i);
  };
})();

/* =====================================================================
 * PATCH V211 — FIREBASE SINCRONIZA STATUS, ADMIN E ACEITE APÓS APROVAÇÃO
 * ===================================================================== */
(function(){
  function boolFirebaseV211_(v, padrao){
    if(v===true||v===false)return v;
    const s=String(v===undefined||v===null?'':v).trim().toUpperCase();
    if(!s)return !!padrao;
    return !(s==='NÃO'||s==='NAO'||s==='FALSE'||s==='0'||s==='N');
  }

  function textoV211_(v){
    return String(v===undefined||v===null?'':v).trim();
  }

  function usuarioFirebasePayloadV211_(dados, action){
    dados=dados||{};
    const acao=String(action||'').toLowerCase();
    const email=firebaseEmailKey_(dados.email||dados.EMAIL);
    if(!email)return null;

    let status=String(dados.status||dados.STATUS||'APROVADO').trim().toUpperCase();
    let perfil=String(dados.perfil||dados.PERFIL||'USUARIO').trim().toUpperCase();
    let ativo=dados.ativo;

    if(acao.includes('recusar')){
      status='RECUSADO';
      perfil=perfil||'USUARIO';
      ativo=false;
    }

    if(acao.includes('administrador')||acao.includes('admin')){
      status='APROVADO';
      perfil='ADMIN';
      ativo=true;
    }

    if(acao.includes('aprovar')){
      status='APROVADO';
      if(!perfil)perfil='USUARIO';
      ativo=true;
    }

    if(ativo===undefined||ativo===null){
      ativo=!(status==='RECUSADO'||status==='BLOQUEADO'||status==='INATIVO');
    }

    const nome=textoV211_(dados.nome||dados.NOME)||email;
    const telegram=textoV211_(dados.telegram||dados.TELEGRAM||dados.telefone||dados.CELULAR||dados.celular);
    const cpf=textoV211_(dados.cpf||dados.CPF);
    const origem=textoV211_(dados.origem||dados.ORIGEM)||'PLANILHA_ADMIN';
    const aceite=boolFirebaseV211_(dados.aceiteRegulamento||dados.ACEITE_REGULAMENTO||dados.aceitouRegulamento||dados.ACEITOU_REGULAMENTO, status==='APROVADO');
    const dataAceite=textoV211_(dados.dataAceiteRegulamento||dados.DATA_ACEITE_REGULAMENTO||dados.dataAceite||dados.DATA_ACEITE);
    const versaoRegulamento=textoV211_(dados.versaoRegulamento||dados.VERSAO_REGULAMENTO)||CONFIG.versaoRegulamento||'2026.1';
    const receberAviso=boolFirebaseV211_(dados.receberAvisoNovoBolao||dados.RECEBER_AVISO_NOVO_BOLAO, true);

    return {
      email:email,
      nome:nome,
      telegram:telegram,
      telefone:telegram,
      cpf:cpf,
      status:status,
      perfil:perfil,
      ativo:!!ativo,
      origem:origem,
      aceiteRegulamento:aceite,
      dataAceiteRegulamento:dataAceite,
      versaoRegulamento:versaoRegulamento,
      receberAvisoNovoBolao:receberAviso,
      loteria:textoV211_(dados.loteria||dados.LOTERIA||''),
      cotas:Number(dados.cotas||dados.COTAS||0)||0
    };
  }

  window.firebaseCriarUsuarioPendente_ = async function(dados){
    dados=dados||{};
    const email=firebaseEmailKey_(dados.email);
    if(!email)throw new Error('E-mail inválido.');
    await inicializarFirebase_();

    const telegram=textoV211_(dados.telefone||dados.telegram);
    const receberAviso=boolFirebaseV211_(dados.receberAvisoNovoBolao,true);
    const aceite=boolFirebaseV211_(dados.aceiteRegulamento||dados.aceite,true);
    const dataAceite=textoV211_(dados.dataAceiteRegulamento)||new Date().toLocaleString('pt-BR',{timeZone:'America/Sao_Paulo'});
    const versao=textoV211_(dados.versaoRegulamento)||CONFIG.versaoRegulamento||'2026.1';

    await firebaseUsuarioRef_(email).set({
      email:email,
      nome:textoV211_(dados.nome),
      cpf:textoV211_(dados.cpf),
      telegram:telegram,
      telefone:telegram,
      loteria:'',
      cotas:0,
      status:'PENDENTE',
      perfil:'USUARIO',
      ativo:false,
      origem:'SITE_PUBLICO_FIREBASE',
      aceiteRegulamento:aceite,
      dataAceiteRegulamento:dataAceite,
      versaoRegulamento:versao,
      receberAvisoNovoBolao:receberAviso,
      atualizadoEm:firebase.firestore.FieldValue.serverTimestamp(),
      criadoEm:firebase.firestore.FieldValue.serverTimestamp()
    },{merge:true});
  };

  window.firebaseSincronizarUsuarioAdmin_ = async function(dados, action){
    const payload=usuarioFirebasePayloadV211_(dados,action);
    if(!payload||!payload.email)return;

    await inicializarFirebase_();

    const grava={
      email:payload.email,
      nome:payload.nome,
      status:payload.status,
      perfil:payload.perfil,
      ativo:payload.ativo,
      origem:payload.origem,
      aceiteRegulamento:payload.aceiteRegulamento,
      versaoRegulamento:payload.versaoRegulamento,
      receberAvisoNovoBolao:payload.receberAvisoNovoBolao,
      atualizadoEm:firebase.firestore.FieldValue.serverTimestamp()
    };

    if(payload.telegram)grava.telegram=payload.telegram;
    if(payload.telefone)grava.telefone=payload.telefone;
    if(payload.cpf)grava.cpf=payload.cpf;
    if(payload.dataAceiteRegulamento)grava.dataAceiteRegulamento=payload.dataAceiteRegulamento;
    if(payload.loteria)grava.loteria=payload.loteria;
    if(payload.cotas!==undefined)grava.cotas=payload.cotas;

    await firebaseUsuarioRef_(payload.email).set(grava,{merge:true});
  };

  window.firebaseSincronizarResultadoAdmin_ = async function(action,resposta){
    try{
      const dados=(resposta&&(resposta.usuarioFirebase||resposta.firebase||resposta.usuario||resposta.dadosUsuario))||null;
      if(dados&&dados.email){
        await firebaseSincronizarUsuarioAdmin_(dados,action);
        return true;
      }
      return false;
    }catch(e){
      console.warn('Base atualizada, mas a sincronização Firebase falhou:',e);
      toast('Ação concluída, mas não consegui sincronizar o Firebase. Verifique Firestore/Regras.','warn');
      return false;
    }
  };

  window.executarAcaoSolicitacaoAdmin = async function(){
    const cfg=window.PSS_SOLICITACAO_ACAO||{};
    window.PSS_SOLICITACAO_ACAO=null;
    fecharModal();

    if(!cfg.action||!cfg.linha)return;

    try{
      toast('Processando solicitação...','info');
      const resposta=await apiMulti([{action:cfg.action,dados:{linha:cfg.linha},args:[cfg.linha]}]);

      if(['aprovarSolicitacaoCadastro','recusarSolicitacaoCadastro','tornarUsuarioAdministradorLinha'].includes(cfg.action)){
        const okFirebase=await firebaseSincronizarResultadoAdmin_(cfg.action,resposta);
        if(okFirebase){
          toast('Ação realizada e Firebase sincronizado.');
        }else{
          toast('Ação realizada. Firebase não retornou dados para sincronizar.','warn');
        }
      }else{
        toast('Ação realizada com sucesso.');
      }

      await renderSolicitacoesAdmin();
      try{await carregarBadgeInscritosTopo();}catch(e){}
    }catch(err){
      toast((err&&err.message)||String(err),'error');
    }
  };
})();



/* =====================================================================
 * PATCH V212 — LINK DO CANAL TELEGRAM VISÍVEL PARA LOGADOS
 * - Aparece para usuários comuns e administradores.
 * - Não exibe nenhuma referência técnica interna.
 * ===================================================================== */
(function(){
  function normalizarLinkTelegramV212_(link){
    link=String(link||'').trim();
    if(!link)return '';
    if(link.startsWith('@'))return 'https://t.me/'+link.replace(/^@+/,'');
    if(/^t\.me\//i.test(link))return 'https://'+link;
    if(/^telegram\.me\//i.test(link))return 'https://'+link;
    if(!/^https?:\/\//i.test(link) && /t\.me|telegram\.me/i.test(link))return 'https://'+link;
    return link;
  }

  async function obterTelegramCanalV212_(forcar){
    const cacheKey='PSS_TELEGRAM_CANAL_V212';
    if(!forcar){
      try{
        const c=JSON.parse(localStorage.getItem(cacheKey)||'null');
        if(c&&Date.now()-Number(c.ts||0)<10*60*1000&&c.dados)return c.dados;
      }catch(e){}
    }

    const dados=await apiMulti([
      {action:'getConfigPublica',args:[]},
      {action:'getInfoPublica',args:[]},
      {action:'getTelegramCanalLink',args:[]}
    ]);

    const link=normalizarLinkTelegramV212_(
      dados.telegramCanalLink||
      dados.linkCanalTelegram||
      dados.linkCanal||
      dados.LINK_CANAL||
      ''
    );

    const out={
      ativo:dados.telegramAtivo!==false && String(dados.ativo||dados.ATIVO||'SIM').toUpperCase()!=='NÃO',
      link:link,
      nome:String(dados.telegramCanalNome||dados.nomeCanalTelegram||dados.nomeCanal||dados.NOME_CANAL||'Canal oficial').trim(),
      chamada:String(dados.telegramChamada||dados.chamadaTelegram||'Receba avisos dos bolões, prazos, novas oportunidades de participação e comunicados importantes em tempo real.').trim()
    };

    try{localStorage.setItem(cacheKey,JSON.stringify({ts:Date.now(),dados:out}));}catch(e){}
    return out;
  }

  function abrirTelegramCanalV212_(link){
    link=normalizarLinkTelegramV212_(link);
    if(!link){toast('Link do canal Telegram ainda não configurado.','warn');return;}
    window.open(link,'_blank','noopener,noreferrer');
  }

  function renderBotaoTelegramTopoV212_(cfg){
    const nav=document.getElementById('navMenu');
    if(!nav||!cfg||!cfg.ativo||!cfg.link)return;

    let btn=document.getElementById('btnTelegramCanalTopo');
    if(!btn){
      btn=document.createElement('button');
      btn.type='button';
      btn.id='btnTelegramCanalTopo';
      btn.className='telegram-canal-topo';
      const badge=document.getElementById('badgeInscritosTopo');
      if(badge&&badge.parentNode===nav)nav.insertBefore(btn,badge);
      else nav.appendChild(btn);
    }

    btn.textContent='📣 Canal Telegram';
    btn.title='Entrar no canal oficial de avisos';
    btn.onclick=function(){abrirTelegramCanalV212_(cfg.link);};
    btn.classList.remove('hidden');
  }

  function renderTelegramInicioV212_(cfg){
    if(!cfg||!cfg.ativo||!cfg.link||ESTADO.view!=='inicio')return;
    const view=document.getElementById('view');
    if(!view)return;

    let box=document.getElementById('telegramCanalInicioV212');
    if(!box){
      box=document.createElement('div');
      box.id='telegramCanalInicioV212';
      box.className='panel telegram-canal-panel';

      const primeira=view.querySelector('.panel');
      if(primeira&&primeira.parentNode===view){
        primeira.insertAdjacentElement('afterend',box);
      }else{
        view.insertAdjacentElement('afterbegin',box);
      }
    }

    box.innerHTML=`
      <div class="telegram-canal-card">
        <div style="display:flex;gap:14px;align-items:flex-start;">
          <div class="telegram-canal-icone">📣</div>
          <div>
            <h3>Entre no canal oficial dos bolões</h3>
            <p>${escapeHtml(cfg.chamada)}</p>
            <div class="telegram-canal-mini">Acompanhe comunicados importantes direto pelo Telegram.</div>
          </div>
        </div>
        <div class="telegram-canal-actions">
          <a class="telegram-canal-link" href="${escapeAttr(cfg.link)}" target="_blank" rel="noopener noreferrer">Entrar no canal</a>
        </div>
      </div>
    `;
  }

  window.carregarTelegramCanalLogadoV212 = async function(forcar){
    if(!ESTADO.usuario)return;
    try{
      const cfg=await obterTelegramCanalV212_(forcar);
      renderBotaoTelegramTopoV212_(cfg);
      renderTelegramInicioV212_(cfg);
      window.PSS_TELEGRAM_CANAL_CONFIG=cfg;
    }catch(e){
      // Não bloqueia carregamento do sistema se o link não estiver disponível.
    }
  };

  const aplicarLayoutLogadoBaseV212=window.aplicarLayoutLogado||aplicarLayoutLogado;
  window.aplicarLayoutLogado=aplicarLayoutLogado=function(){
    aplicarLayoutLogadoBaseV212();
    setTimeout(()=>carregarTelegramCanalLogadoV212(false),400);
  };

  const navegarBaseV212=window.navegar||navegar;
  window.navegar=navegar=function(v){
    navegarBaseV212(v);
    setTimeout(()=>carregarTelegramCanalLogadoV212(false),500);
  };

  const renderInicioBaseV212=window.renderInicio||renderInicio;
  window.renderInicio=renderInicio=function(){

/* =====================================================================
 * PATCH V215 — LETREIRO COM CORES OFICIAIS POR LOTERIA

(function(){
  function normalizarLoteriaV215_(v){
    return String(v||'')
      .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
      .toLowerCase()
      .replace(/[^a-z0-9]+/g,'');
  }

  function corLoteriaV215_(r){
    const nome=normalizarLoteriaV215_((r&&r.nome)||'');
    const slug=normalizarLoteriaV215_((r&&r.slug)||'');
    const tipo=normalizarLoteriaV215_((r&&r.tipoJogo)||'');
    const k=nome||slug||tipo;

    const mapa={
      megasena:'#209869',
      lotofacil:'#930089',
      quina:'#260085',
      duplasena:'#a61324',
      loteriafederal:'#103099',
      federal:'#103099',
      diadesorte:'#cb852b',
      supersete:'#a8cf45',
      loteca:'#f78100',
      lotomania:'#f78100',
      timemania:'#00a651',
      maismilionaria:'#2e3078',
      milionaria:'#2e3078'
    };

    if(mapa[k])return mapa[k];
    if(k.includes('mega'))return mapa.megasena;
    if(k.includes('facil'))return mapa.lotofacil;
    if(k.includes('quina'))return mapa.quina;
    if(k.includes('dupla'))return mapa.duplasena;
    if(k.includes('federal'))return mapa.federal;
    if(k.includes('sorte'))return mapa.diadesorte;
    if(k.includes('super'))return mapa.supersete;
    if(k.includes('loteca'))return mapa.loteca;
    if(k.includes('lotomania'))return mapa.lotomania;
    if(k.includes('timemania'))return mapa.timemania;
    if(k.includes('milionaria'))return mapa.maismilionaria;
    return '#0b6f28';

    const nome=String((r&&r.nome)||(r&&r.tipoJogo)||(r&&r.slug)||'Loteria').replace(/_/g,' ').trim().toUpperCase();

    const nome=textoLimpoV216_(document.getElementById('cadNome').value),
      nomePublico=nomePublicoSeguroV216_(document.getElementById('cadNomePublico')?document.getElementById('cadNomePublico').value:'',nome),
      email=textoLimpoV216_(document.getElementById('cadEmail').value).toLowerCase(),
      senha=textoLimpoV216_(document.getElementById('cadSenha').value),
      senha2=textoLimpoV216_(document.getElementById('cadSenha2').value),
      cpf=document.getElementById('cadCpf').value,
      telefone=document.getElementById('cadTelefone')?document.getElementById('cadTelefone').value:'',
      receberAvisoNovoBolao=document.getElementById('cadAvisoNovoBolao')&&document.getElementById('cadAvisoNovoBolao').checked?'SIM':'NÃO',
      aceite=document.getElementById('cadAceite').checked,
      btn=document.getElementById('btnEnviarCadastro'),
      cotas=0,
      loteria='';

    if(!nomePublico){toast('Informe o nome para divulgação no Telegram.','error');return;}
    if(nomePublico.length>60){toast('O nome para divulgação deve ter no máximo 60 caracteres.','error');return;}
    if(senha!==senha2){toast('As senhas não conferem.','error');return;}

    btn.disabled=true;
    btn.textContent='Enviando...';

    try{
      await inicializarFirebase_();

      try{
        const cred=await FIREBASE_AUTH.createUserWithEmailAndPassword(email,senha);
        try{await cred.user.updateProfile({displayName:nome});}catch(e){}
        await firebaseCriarUsuarioPendente_({nome,nomePublico,email,cpf,telefone,cotas,loteria,receberAvisoNovoBolao,aceiteRegulamento:aceite,versaoRegulamento:CONFIG.versaoRegulamento});
      }catch(authErr){
        if(String(authErr.code||'')==='auth/email-already-in-use'){
          toast('Este e-mail já existe no Firebase. A solicitação será registrada; use “Esqueci a senha” se necessário.','warn');
          try{await firebaseCriarUsuarioPendente_({nome,nomePublico,email,cpf,telefone,cotas,loteria,receberAvisoNovoBolao,aceiteRegulamento:aceite,versaoRegulamento:CONFIG.versaoRegulamento});}catch(eSync){}
        }else{
          throw authErr;
        }
      }

      const dadosCadastro={nome,nomePublico,email,cotas,loteria,cpf,telefone,receberAvisoNovoBolao,aceitouRegulamento:aceite,aceiteRegulamento:aceite,versaoRegulamento:CONFIG.versaoRegulamento};
      const argsCadastro=[nome,email,cotas,aceite,CONFIG.versaoRegulamento,loteria,cpf,telefone,receberAvisoNovoBolao,nomePublico];

      const r=await apiMulti([
        {action:'registrarSolicitacao',dados:dadosCadastro,args:argsCadastro},
        {action:'solicitarParticipacao',dados:dadosCadastro,args:argsCadastro}
      ]);

      if(r&&r.sucesso===false)throw new Error(r.msg||'Não foi possível enviar.');
      toast((r&&r.msg)||'Solicitação de acesso enviada com sucesso. Aguarde aprovação da administração.');
      fecharModal();
    }catch(err){
      toast(firebaseMensagemErro_(err),'error');
    }finally{
      btn.disabled=false;
      btn.textContent='Enviar solicitação de acesso';
    }
  };
