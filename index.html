    function renderLogin(){document.getElementById('publicHeader').classList.remove('hidden');document.getElementById('appHeader').classList.add('hidden');setView(`<div class="login-wrap"><h1>Acesso ao sistema</h1><p>Acesse usando o e-mail e a senha cadastrados na planilha.</p><div id="loginMsg"></div><form onsubmit="fazerLogin(event)"><div class="field"><label>E-mail</label><input id="loginEmail" type="email" autocomplete="username" value="${escapeAttr(ESTADO.email)}" required /></div><div class="field"><label>Senha</label><input id="loginSenha" type="password" autocomplete="current-password" required /></div><label class="checkline"><input type="checkbox" id="lembrarEmail" ${ESTADO.email?'checked':''}><span>Lembrar meu e-mail neste aparelho</span></label><button type="submit" id="btnLogin" class="btn btn-block">Entrar no sistema</button></form><div class="actions" style="justify-content:center;margin-top:16px;"><button class="btn btn-light btn-pill" onclick="abrirCadastro()">Cadastrar</button><button class="btn btn-light btn-pill" onclick="abrirResetSenha()">Esqueci a senha</button></div></div>`)}

    function salvarSessao(u){localStorage.setItem('PSS_BOLAO_SESSAO',JSON.stringify(u||{}))}function carregarSessao(){try{return JSON.parse(localStorage.getItem('PSS_BOLAO_SESSAO')||'null')}catch(e){return null}}function logout(){ESTADO.usuario=null;ESTADO.role='';localStorage.removeItem('PSS_BOLAO_SESSAO');renderLogin()}

    async function carregarBaseEspecial(nome){
      const base = {range:'',qtdMin:'',qtdMax:'',qtdPalpite:''};
      if(!nome) return base;

      try{
        const r = await adminDados('BASE_LOTERIAS');
        const headers = r.headers || [];
        const rows = r.rows || [];
        const alvo = chaveBaseEspecial(nome);

        for(const row of rows){
          const o = rowObj(headers,row);
          const nomeLinha = cellObj(o,['NOME','LOTERIA']);
          if(chaveBaseEspecial(nomeLinha) === alvo){
            return {
              range: valorNumeroConfig(cellObj(o,['RANGE']),''),
              qtdMin: valorNumeroConfig(cellObj(o,['QTD_MIN','QTD MIN']),''),
              qtdMax: valorNumeroConfig(cellObj(o,['QTD_MAX','QTD MAX']),''),
              qtdPalpite: valorNumeroConfig(cellObj(o,['QTD_PALPITE','QTD PALPITE','QTD_ESCOLHA']),'')
            };
          }
        }
      }catch(e){}

      return base;
    }

    function chaveBaseEspecial(nome){
      return normalizar(String(nome||'').replace(/\b20\d{2}\b/g,'').replace(/[()]/g,' ').replace(/\s+/g,' '));
    }

    function nomeFinalEspecial(nomeBase, ano, tipo){
      let nome = String(nomeBase||'').trim();
      const a = String(ano||'').trim();
      if(!nome) return '';
      if(tipo === 'mega') return 'MEGA DA VIRADA';
      if(a && !/\b20\d{2}\b/.test(nome)) nome += ' ' + a;
      return nome;
    }

    async function ativarBolaoEspecialGit(tipo){
      const btn = document.getElementById('btnAtivarEspecial');
      const nomeBase = document.getElementById('esp_nome').value.trim();
      const ano = document.getElementById('esp_ano').value.trim();
      const nome = nomeFinalEspecial(nomeBase, ano, tipo);

      if(!nomeBase){
        toast('Informe o nome da loteria.','error');
        return;
      }

      const dados = {
        nome: nome,
        loteria: nome,
        status: 'ATIVO',
        valorCota: '',
        totalCotas: '',
        cotasTotaisAdquiridas: '0',
        qtdParcelas: '1',
        premiacao: '',
        dataSorteio: dataInputParaBR('esp_dataSorteio'),
        iniBol: dataInputParaBR('esp_iniBol'),
        fimBol: dataInputParaBR('esp_fimBol'),
        iniPal: dataInputParaBR('esp_iniPal'),
        fimPal: dataInputParaBR('esp_fimPal'),
        range: valorNumeroConfig(document.getElementById('esp_range').value,''),
        qtdMin: valorNumeroConfig(document.getElementById('esp_qtdMin').value,''),
        qtdMax: valorNumeroConfig(document.getElementById('esp_qtdMax').value,''),
        qtdPalpite: valorNumeroConfig(document.getElementById('esp_qtdPalpite').value,'')
      };

      btn.disabled = true;
      btn.textContent = 'Ativando...';

      try{
        const r = await api('salvarConfigBolaoAtivoAdmin',{},[dados]);
        toast((r&&r.msg)||'Bolão especial ativado.');
        await carregarBoloes();
        renderEspeciais(tipo);
      }catch(err){
        toast(err.message,'error');
      }finally{
        btn.disabled = false;
        btn.textContent = 'Ativar Bolão Especial';
      }
    }

    function dataInputParaBR(id){
      const v = document.getElementById(id).value;
      if(!v) return '';
      const p = v.split('-');
      if(p.length !== 3) return v;
      return `${p[2]}/${p[1]}/${p[0]}`;
    }

>Início palpites</label><input id="cfg_iniPal_${i}" value="${escapeAttr(b.inicioPalpite||'')}"></div><div class="field"><label>Fim palpites</label><input id="cfg_fimPal_${i}" value="${escapeAttr(b.fimPalpite||'')}"></div><div class="field"><label>Range</label><input id="cfg_range_${i}" value="${escapeAttr(valorNumeroConfig(b.range,''))}"></div><div class="field"><label>Qtd mínima</label><input id="cfg_min_${i}" value="${escapeAttr(valorNumeroConfig(b.qtdMin,''))}"></div><div class="field"><label>Qtd máxima</label><input id="cfg_max_${i}" value="${escapeAttr(valorNumeroConfig(b.qtdMax,''))}"></div><div class="field"><label>Qtd por palpite</label><input id="cfg_qtdPal_${i}" value="${escapeAttr(valorNumeroConfig(b.qtdPalpite,''))}"></div></div><div class="actions" style="margin-top:14px;"><button class="btn" onclick="salvarConfigBolaoGit(${i})">Salvar este bolão</button><button class="btn btn-light" onclick="inativarBolaoGit(${i})">Inativar</button><button class="btn btn-danger" onclick="excluirBolaoGit(${i})">Excluir</button></div></div>`).join('')}</div>`)}catch(err){setView(`<div class="panel"><div class="notice error">${escapeHtml(err.message)}</div></div>`)}}

    function abrirModal(t,h){document.getElementById('modalTitulo').textContent=t;document.getElementById('modalConteudo').innerHTML=h;document.getElementById('modalBackdrop').classList.add('open')}function fecharModal(){document.getElementById('modalBackdrop').classList.remove('open')}document.getElementById('modalBackdrop').addEventListener('click',ev=>{if(ev.target.id==='modalBackdrop')fecharModal()});function toast(msg,tipo='success'){const box=document.getElementById('toastContainer'),el=document.createElement('div');el.className=`toast ${tipo}`;el.textContent=msg;box.appendChild(el);setTimeout(()=>{el.style.opacity='0';setTimeout(()=>el.remove(),220)},3500)}
    function lerArquivoBase64(file){return new Promise((resolve,reject)=>{const r=new FileReader();r.onload=e=>resolve(e.target.result);r.onerror=()=>reject(new Error('Erro ao ler arquivo.'));r.readAsDataURL(file)})}function isHistorico(b){const st=normalizar(b.status);return st.includes('HISTORICO')||st.includes('ENCERRADO')||st.includes('FINALIZADO')}function valorNumeroConfig(v,fallback=''){if(v===undefined||v===null||v==='')return fallback;const original=String(v).trim();if(!original)return fallback;const m=original.match(/^(\d{1,2})\/(\d{1,2})\/(1899|1900)(?:\s+\d{1,2}:\d{2}(?::\d{2})?)?$/);if(m){const d=Number(m[1]),mo=Number(m[2])-1,y=Number(m[3]);const base=Date.UTC(1899,11,30);const atual=Date.UTC(y,mo,d);const serial=Math.round((atual-base)/86400000);if(!isNaN(serial))return String(serial)}return original}function moeda(v){const n=num(v);return n.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}function num(v){if(typeof v==='number')return isNaN(v)?0:v;const s=String(v||'0').replace(/R\$/g,'').replace(/\./g,'').replace(',','.').replace(/[^0-9.\-]/g,'');const n=Number(s);return isNaN(n)?0:n}function normalizar(s){return String(s||'').trim().toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')}function escapeHtml(v){return String(v===undefined||v===null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;')}function escapeAttr(v){return escapeHtml(v).replace(/`/g,'&#096;')}function formatNum(n){const x=Number(n);return isNaN(x)?escapeHtml(n):(x<10?'0'+x:String(x))}function formatarNumeros(nums){if(!nums)return '';const arr=Array.isArray(nums)?nums:String(nums).split(/[-,;\s]+/).filter(Boolean);return arr.map(formatNum).join(' - ')}function formatarCelula(c){const s=String(c===undefined||c===null?'':c);if(s.startsWith('http'))return `<a href="${escapeAttr(s)}" target="_blank" rel="noopener">Abrir</a>`;return escapeHtml(s)}
    function atualizarRelogio(){document.getElementById('clock').textContent=new Date().toLocaleString('pt-BR',{timeZone:'America/Sao_Paulo',day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit'}).replace(',',',')}function dataHoraAtualCurta(){return new Date().toLocaleString('pt-BR',{timeZone:'America/Sao_Paulo',day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}).replace(',','')}
  </script>
