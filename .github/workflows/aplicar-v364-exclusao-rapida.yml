name: Aplicar V364 exclusao rapida

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/aplicar-v364-exclusao-rapida.yml'

permissions:
  contents: write

jobs:
  aplicar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validar arquivos
        shell: bash
        run: |
          node --check assets/pss-v362-bootstrap.js
          node --check assets/pss-v363-login-pagamentos.js
          node --check assets/pss-v364-exclusao-rapida.js

      - name: Atualizar cache bust do index
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          p = Path('index.html')
          text = p.read_text(encoding='utf-8')
          version = 'V364_EXCLUSAO_RAPIDA_SEGURA'

          text = re.sub(
              r'assets/pss-v362-bootstrap\.js\?v=[^"\']+',
              'assets/pss-v362-bootstrap.js?v=' + version,
              text
          )

          if 'assets/pss-v364-exclusao-rapida.js' not in text:
              marker = '</body>'
              if text.count(marker) != 1:
                  raise SystemExit('Fechamento body invalido.')
              script = '  <script src="assets/pss-v364-exclusao-rapida.js?v=' + version + '"></script>\n'
              text = text.replace(marker, script + marker, 1)

          if 'assets/pss-v364-exclusao-rapida.js?v=' + version not in text:
              raise SystemExit('V364 nao vinculada ao index.')

          p.write_text(text, encoding='utf-8', newline='')
          print('Index atualizado para', version)
          PY

      - name: Publicar
        shell: bash
        run: |
          rm -f .github/workflows/aplicar-v364-exclusao-rapida.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html assets/pss-v362-bootstrap.js assets/pss-v364-exclusao-rapida.js .github/workflows/aplicar-v364-exclusao-rapida.yml
          git commit -m 'Publica exclusao rapida e segura V364 [skip ci]'
          git pull --rebase origin main
          git push origin HEAD:main
