name: Aplicar index V361

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/aplicar-index-v361.yml'

permissions:
  contents: write

jobs:
  aplicar:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Substituir index pela V361 validada
        shell: bash
        env:
          TARGET_SHA256: '7e917c9e2276edc572d8c6a4515ea542a0c84912d520bb8d79029f0bc696e5de'
          SUFFIX_B64: ''
        run: |
          python3 - <<'PY2'
          from pathlib import Path
          import base64, hashlib, os

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          old = 'V357_CONSULTA_VISUAL_JOGOS_PARTICIPANTE'
          new = 'V361_FIX_CONFIG_MOBILE_JSONP'
          count = text.count(old)
          if count != 4:
              raise SystemExit(f'Esperadas 4 referências da V357; encontradas {count}.')
          text = text.replace(old, new)

          marker = '  window.diagnosticarConsultaV357=function(){'
          pos = text.find(marker)
          if pos < 0:
              raise SystemExit('Bloco V357 de consulta não localizado.')
          after = text.find('</script>', pos)
          if after < 0:
              raise SystemExit('Fechamento do bloco V357 não localizado.')
          after += len('</script>')
          body = text.find('\n</body>', after)
          if body < 0:
              raise SystemExit('Fechamento </body> não localizado.')

          suffix = base64.b64decode(os.environ['SUFFIX_B64']).decode('utf-8')
          text = text[:after] + suffix + text[body:]
          raw = text.encode('utf-8')
          digest = hashlib.sha256(raw).hexdigest()
          expected = os.environ['TARGET_SHA256']
          if digest != expected:
              raise SystemExit(f'SHA-256 divergente: {digest} != {expected}')
          path.write_bytes(raw)
          print('Index V361 validado:', digest, 'bytes:', len(raw))
          PY2

      - name: Publicar e remover workflow temporário
        shell: bash
        run: |
          rm -f .github/workflows/aplicar-index-v361.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html .github/workflows/aplicar-index-v361.yml
          git commit -m 'Atualiza index para V361_FIX_CONFIG_MOBILE_JSONP [skip ci]'
          git pull --rebase origin main
          git push origin HEAD:main
