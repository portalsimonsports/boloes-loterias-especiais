name: Diagnosticar botões de pagamentos

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/diagnosticar-botoes-pagamentos.yml'

permissions:
  contents: write

jobs:
  diagnosticar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extrair trechos relevantes
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          files=[Path('index.html'),Path('assets/pss-v363-login-pagamentos.js')]
          terms=['EXCLUIR COMPROVANTE','CONFIRMAR PAGAMENTO','confirmarPagamentoManual','confirmarPagamento','abrirExcluirComprovanteV363','pss-v363-excluir-comprovante','adicionarBotoesExclusao']
          out=[]
          for p in files:
            text=p.read_text(encoding='utf-8',errors='ignore')
            lines=text.splitlines()
            for term in terms:
              hits=[i for i,l in enumerate(lines) if term.lower() in l.lower()]
              if not hits: continue
              out += ['\n'+'='*100,f'ARQUIVO: {p} | TERMO: {term} | TOTAL: {len(hits)}']
              for i in hits:
                out += ['-'*100,f'LINHA {i+1}']
                a=max(0,i-20);b=min(len(lines),i+35)
                out += [f'{j+1:06d}: {lines[j]}' for j in range(a,b)]
          Path('diagnostico_botoes_pagamentos.txt').write_text('\n'.join(out),encoding='utf-8')
          PY

      - name: Publicar diagnóstico
        shell: bash
        run: |
          rm -f .github/workflows/diagnosticar-botoes-pagamentos.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add diagnostico_botoes_pagamentos.txt .github/workflows/diagnosticar-botoes-pagamentos.yml
          git commit -m 'Gera diagnóstico dos botões de pagamentos [skip ci]'
          git pull --rebase origin main
          git push origin HEAD:main
