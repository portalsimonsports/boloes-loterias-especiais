name: Corrigir botões de pagamentos V365

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/corrigir-botoes-pagamentos-v365.yml'

permissions:
  contents: write

jobs:
  corrigir:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Corrigir botões sem alterar as funções
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          versao_antiga = 'V363_FIX_LOGIN_EXCLUIR_COMPROVANTE'
          versao_nova = 'V365_CORRIGE_BOTOES_PAGAMENTOS'

          js_path = Path('assets/pss-v363-login-pagamentos.js')
          js = js_path.read_text(encoding='utf-8')
          js = js.replace("var VERSAO = '" + versao_antiga + "';", "var VERSAO = '" + versao_nova + "';")

          inicio = js.index('  function adicionarBotoesExclusao() {')
          fim = js.index('\n\n  window.abrirExcluirComprovanteV363', inicio)

          bloco = r'''  function botaoConfirmacaoManual_(botao) {
    if (!botao) return false;
    var onclick = texto(botao.getAttribute('onclick'));
    return /confirmarPagamentoManualAdmin\s*\(/i.test(onclick);
  }

  function botaoExclusaoReal_(botao) {
    if (!botao || botaoConfirmacaoManual_(botao)) return false;
    var onclick = texto(botao.getAttribute('onclick'));
    return botao.classList.contains('pss-v363-excluir-comprovante') ||
      /abrirExcluirComprovanteV363\s*\(|executarExcluirComprovanteV363\s*\(/i.test(onclick) ||
      botao.hasAttribute('data-linha-pagamento');
  }

  function restaurarBotaoConfirmacao_(botao) {
    if (!botaoConfirmacaoManual_(botao)) return;
    botao.textContent = 'Confirmar pagamento';
    botao.classList.remove('btn-danger', 'pss-v363-excluir-comprovante');
    botao.classList.add('btn');
    botao.removeAttribute('data-linha-pagamento');
  }

  function configurarBotaoExclusao_(botao, linha) {
    botao.type = 'button';
    botao.classList.add('btn', 'btn-danger', 'pss-v363-excluir-comprovante');
    botao.textContent = 'Excluir comprovante';
    botao.setAttribute('data-linha-pagamento', String(linha));
    botao.removeAttribute('onclick');
    botao.onclick = function (evento) {
      if (evento) {
        evento.preventDefault();
        evento.stopPropagation();
      }
      window.abrirExcluirComprovanteV363(linha);
    };
  }

  function adicionarBotoesExclusao() {
    if (!usuarioAdministrador()) return;

    document.querySelectorAll('.pay-admin-card-pro, .payment-admin-card').forEach(function (card) {
      var acoes = card.querySelector('.pay-card-actions');
      if (!acoes) return;

      var linha = linhaDoCard(card);
      if (!linha) return;

      var botoes = Array.prototype.slice.call(acoes.querySelectorAll('button'));

      botoes.forEach(function (botao) {
        restaurarBotaoConfirmacao_(botao);
      });

      var exclusoes = botoes.filter(botaoExclusaoReal_);
      var botaoExcluir = exclusoes.length ? exclusoes[exclusoes.length - 1] : null;

      exclusoes.forEach(function (botao) {
        if (botao !== botaoExcluir && botao.parentNode) botao.parentNode.removeChild(botao);
      });

      if (!botaoExcluir) {
        botaoExcluir = document.createElement('button');
        acoes.appendChild(botaoExcluir);
      }

      configurarBotaoExclusao_(botaoExcluir, linha);

      if (acoes.lastElementChild !== botaoExcluir) {
        acoes.appendChild(botaoExcluir);
      }
    });
  }'''

          js = js[:inicio] + bloco + js[fim:]
          js_path.write_text(js, encoding='utf-8', newline='')

          bootstrap_path = Path('assets/pss-v362-bootstrap.js')
          bootstrap = bootstrap_path.read_text(encoding='utf-8')
          bootstrap = bootstrap.replace(
              'assets/pss-v363-login-pagamentos.js?v=' + versao_antiga,
              'assets/pss-v363-login-pagamentos.js?v=' + versao_nova
          )
          bootstrap_path.write_text(bootstrap, encoding='utf-8', newline='')

          index_path = Path('index.html')
          index = index_path.read_text(encoding='utf-8')
          index = index.replace('V362_SUPER_RAPIDO_SEGURO', versao_nova)
          index = index.replace(versao_antiga, versao_nova)
          index_path.write_text(index, encoding='utf-8', newline='')

          checks = [
              "botao.textContent = 'Confirmar pagamento';",
              "botao.textContent = 'Excluir comprovante';",
              'botaoConfirmacaoManual_',
              'botaoExclusaoReal_',
              versao_nova
          ]
          for item in checks:
              if item not in js:
                  raise SystemExit('Validação ausente no módulo: ' + item)

          if 'assets/pss-v363-login-pagamentos.js?v=' + versao_nova not in bootstrap:
              raise SystemExit('Cache bust V365 não aplicado no bootstrap.')
          if versao_nova not in index:
              raise SystemExit('Versão V365 não aplicada no index.')
          PY

      - name: Validar sintaxe
        shell: bash
        run: |
          node --check assets/pss-v363-login-pagamentos.js
          node --check assets/pss-v362-bootstrap.js

      - name: Publicar e remover workflow temporário
        shell: bash
        run: |
          rm -f .github/workflows/corrigir-botoes-pagamentos-v365.yml
          rm -f diagnostico_botoes_pagamentos.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html assets/pss-v362-bootstrap.js assets/pss-v363-login-pagamentos.js .github/workflows/corrigir-botoes-pagamentos-v365.yml diagnostico_botoes_pagamentos.txt
          git commit -m 'Restaura confirmar pagamento e mantém uma exclusão V365 [skip ci]'
          git pull --rebase origin main
          git push origin HEAD:main
