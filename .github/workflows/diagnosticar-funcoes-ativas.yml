name: Diagnosticar funções ativas

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/diagnosticar-funcoes-ativas.yml'

permissions:
  contents: write

jobs:
  diagnosticar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extrair funções e blocos ativos
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          text=Path('index.html').read_text(encoding='utf-8')
          lines=text.splitlines()
          needles=[
            'function loginFirebaseV350',
            'loginFirebaseV350=',
            'window.fazerLogin=async function',
            'window.renderPagamentosAdmin',
            'function renderPagamentosAdmin',
            'pay-card-actions',
            'onclick="aprovarPagamento',
            'onclick="rejeitarPagamento',
            'onclick="excluirPagamento',
            'onclick="excluirComprovante',
            "action:'excluir",
            'linhaPlanilha',
            '_linhaPlanilha',
            'comprovanteUrl',
            'driveFileId',
            'arquivoId'
          ]
          out=[]
          for needle in needles:
            hits=[i for i,l in enumerate(lines) if needle.lower() in l.lower()]
            out += ['\n'+'='*110, f'TERMO: {needle} | TOTAL: {len(hits)}']
            for k,i in enumerate(hits[-8:],1):
              out += ['-'*110, f'OCORRÊNCIA {k} | LINHA ORIGINAL {i+1}']
              a=max(0,i-30); b=min(len(lines),i+100)
              out += [f'{j+1:06d}: {lines[j]}' for j in range(a,b)]
          Path('diagnostico_funcoes_ativas.txt').write_text('\n'.join(out),encoding='utf-8')
          PY

      - name: Publicar diagnóstico
        shell: bash
        run: |
          rm -f .github/workflows/diagnosticar-funcoes-ativas.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add diagnostico_funcoes_ativas.txt .github/workflows/diagnosticar-funcoes-ativas.yml
          git commit -m 'Gera diagnóstico das funções ativas [skip ci]'
          git pull --rebase origin main
          git push origin HEAD:main
