name: Aplicar compatibilidade Identificador

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/aplicar-compatibilidade-identificador.yml'

permissions:
  contents: write

jobs:
  aplicar:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Atualizar apresentação de pagamentos
        shell: bash
        run: |
          python3 - <<'PY2'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          label_old = '<b>Cód. produto</b>'
          label_new = '<b>Identificador / Cód. produto</b>'
          if label_new not in text:
              count_label = text.count(label_old)
              if count_label < 1:
                  raise SystemExit('Rótulo Cód. produto não localizado.')
              text = text.replace(label_old, label_new)

          alias_old = "codigoProduto:cellObj(o,['COD_PRODUTO'"
          alias_new = "codigoProduto:cellObj(o,['IDENTIFICADOR','IDENTIFICADOR_PRODUTO','IDENTIFICADOR PRODUTO','COD_PRODUTO'"
          if alias_new not in text:
              count_alias = text.count(alias_old)
              if count_alias < 1:
                  raise SystemExit('Mapeamento codigoProduto não localizado.')
              text = text.replace(alias_old, alias_new)

          if label_new not in text:
              raise SystemExit('Novo rótulo não foi aplicado.')
          if "'IDENTIFICADOR'" not in text:
              raise SystemExit('Alias IDENTIFICADOR não foi aplicado.')

          path.write_text(text, encoding='utf-8', newline='')
          print('Compatibilidade IDENTIFICADOR aplicada com sucesso.')
          PY2

      - name: Publicar e remover workflow temporário
        shell: bash
        run: |
          rm -f .github/workflows/aplicar-compatibilidade-identificador.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html .github/workflows/aplicar-compatibilidade-identificador.yml
          git commit -m 'Aceita Identificador nos comprovantes [skip ci]'
          git pull --rebase origin main
          git push origin HEAD:main
