name: Aplicar V363 login e pagamentos

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/aplicar-v363-login-pagamentos.yml'

permissions:
  contents: write

jobs:
  aplicar:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validar JavaScript
        shell: bash
        run: |
          node --check assets/pss-v362-bootstrap.js
          node --check assets/pss-v362-performance.js
          node --check assets/pss-v363-login-pagamentos.js
          test -s apps-script/PATCH_V363_EXCLUIR_COMPROVANTE_PAGAMENTO.txt

      - name: Atualizar index para V363
        shell: bash
        run: |
          python3 - <<'PY2'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          old = 'V362_SUPER_RAPIDO_SEGURO'
          new = 'V363_FIX_LOGIN_EXCLUIR_COMPROVANTE'

          if old in text:
              text = text.replace(old, new)

          head_marker = '  <link rel="preconnect" href="https://www.gstatic.com" crossorigin />'
          firebase_links = '\n'.join([
              '  <link rel="preconnect" href="https://www.gstatic.com" crossorigin />',
              '  <link rel="preconnect" href="https://identitytoolkit.googleapis.com" crossorigin />',
              '  <link rel="preconnect" href="https://securetoken.googleapis.com" crossorigin />',
              '  <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin />',
              '  <link rel="dns-prefetch" href="//identitytoolkit.googleapis.com" />',
              '  <link rel="dns-prefetch" href="//securetoken.googleapis.com" />',
              '  <link rel="dns-prefetch" href="//firestore.googleapis.com" />'
          ])

          if 'identitytoolkit.googleapis.com' not in text:
              if text.count(head_marker) != 1:
                  raise SystemExit('Ponto de preconnect Firebase não localizado de forma única.')
              text = text.replace(head_marker, firebase_links, 1)

          script_ref = f'  <script src="assets/pss-v363-login-pagamentos.js?v={new}"></script>\n'
          if 'assets/pss-v363-login-pagamentos.js' not in text:
              if text.count('</body>') != 1:
                  raise SystemExit('Fechamento body inválido.')
              text = text.replace('</body>', script_ref + '</body>', 1)

          checks = [
              '<!DOCTYPE html>',
              new,
              'assets/pss-v362-bootstrap.js?v=' + new,
              'assets/pss-v363-login-pagamentos.js?v=' + new,
              'identitytoolkit.googleapis.com',
              'securetoken.googleapis.com',
              'firestore.googleapis.com',
              '</html>'
          ]
          for check in checks:
              if check not in text:
                  raise SystemExit('Validação ausente: ' + check)

          if text.count('assets/pss-v363-login-pagamentos.js') != 1:
              raise SystemExit('Script V363 duplicado no index.')

          path.write_text(text, encoding='utf-8', newline='')
          print('Index V363 validado:', len(text.encode('utf-8')), 'bytes')
          PY2

      - name: Publicar e remover workflow temporário
        shell: bash
        run: |
          rm -f .github/workflows/aplicar-v363-login-pagamentos.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html assets/pss-v362-bootstrap.js assets/pss-v363-login-pagamentos.js apps-script/PATCH_V363_EXCLUIR_COMPROVANTE_PAGAMENTO.txt .github/workflows/aplicar-v363-login-pagamentos.yml
          git commit -m 'Corrige login Firebase e adiciona exclusão de comprovante V363 [skip ci]'
          git pull --rebase origin main
          git push origin HEAD:main
