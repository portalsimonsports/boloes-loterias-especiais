name: Localizar API de pagamentos

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/localizar-api-pagamentos.yml'

permissions:
  contents: write

jobs:
  localizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Localizar funções backend
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          terms=[
            'reprocessarPagamentoLinha',
            'confirmarPagamentoManual',
            'listarPagamentos',
            'PAGAMENTOS',
            'function doGet',
            'function doPost',
            'action',
            'DriveApp.getFileById',
            'moveToTrash',
            'setTrashed'
          ]
          exts={'.txt','.gs','.js','.html','.json','.yml','.yaml'}
          out=[]
          for p in sorted(Path('.').rglob('*')):
            if not p.is_file() or p.suffix.lower() not in exts or '.git' in p.parts:
              continue
            try: text=p.read_text(encoding='utf-8',errors='ignore')
            except Exception: continue
            lines=text.splitlines()
            matched=False
            for term in terms:
              hits=[i for i,l in enumerate(lines) if term.lower() in l.lower()]
              if not hits: continue
              matched=True
              out += ['\n'+'='*110,f'ARQUIVO: {p} | TERMO: {term} | TOTAL: {len(hits)}']
              for i in hits[:25]:
                out += ['-'*110,f'LINHA {i+1}']
                a=max(0,i-12);b=min(len(lines),i+28)
                out += [f'{j+1:06d}: {lines[j]}' for j in range(a,b)]
          if not out:
            out=['Nenhum backend de Apps Script localizado no repositório.']
          Path('diagnostico_api_pagamentos.txt').write_text('\n'.join(out),encoding='utf-8')
          PY

      - name: Publicar resultado
        shell: bash
        run: |
          rm -f .github/workflows/localizar-api-pagamentos.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add diagnostico_api_pagamentos.txt .github/workflows/localizar-api-pagamentos.yml
          git commit -m 'Localiza backend de pagamentos [skip ci]'
          git pull --rebase origin main
          git push origin HEAD:main
