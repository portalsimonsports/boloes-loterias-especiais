name: Aplicar index V362

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/aplicar-index-v362.yml'

permissions:
  contents: write

jobs:
  aplicar:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validar componentes V362
        shell: bash
        run: |
          test -s assets/pss-v362-performance.css
          test -s assets/pss-v362-bootstrap.js
          test -s assets/pss-v362-performance.js
          node --check assets/pss-v362-bootstrap.js
          node --check assets/pss-v362-performance.js

      - name: Atualizar index para V362
        shell: bash
        run: |
          python3 - <<'PY2'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          old = 'V361_FIX_CONFIG_MOBILE_JSONP'
          new = 'V362_SUPER_RAPIDO_SEGURO'

          if old not in text:
              raise SystemExit('A base V361 não foi localizada no index.html.')
          text = text.replace(old, new)

          viewport = '  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />'
          if text.count(viewport) != 1:
              raise SystemExit('Meta viewport não localizada de forma única.')
          links = viewport + f'''\n  <link rel="preconnect" href="https://script.google.com" crossorigin />\n  <link rel="preconnect" href="https://script.googleusercontent.com" crossorigin />\n  <link rel="preconnect" href="https://www.gstatic.com" crossorigin />\n  <link rel="dns-prefetch" href="//script.google.com" />\n  <link rel="dns-prefetch" href="//script.googleusercontent.com" />\n  <link rel="stylesheet" href="assets/pss-v362-performance.css?v={new}" />'''
          text = text.replace(viewport, links, 1)

          marker = '  <script>\n    /* V224-MOBILE: detecção mobile global */'
          if text.count(marker) != 1:
              raise SystemExit('Ponto de inicialização principal não localizado.')
          bootstrap = f'  <script src="assets/pss-v362-bootstrap.js?v={new}"></script>\n'
          text = text.replace(marker, bootstrap + marker, 1)

          if text.count('</body>') != 1:
              raise SystemExit('Fechamento body inválido.')
          performance = f'  <script src="assets/pss-v362-performance.js?v={new}"></script>\n'
          text = text.replace('</body>', performance + '</body>', 1)

          checks = [
              '<!DOCTYPE html>',
              new,
              'assets/pss-v362-performance.css',
              'assets/pss-v362-bootstrap.js',
              'assets/pss-v362-performance.js',
              '</html>'
          ]
          for check in checks:
              if check not in text:
                  raise SystemExit('Validação ausente: ' + check)
          if old in text:
              raise SystemExit('Ainda existem referências à V361.')
          if text.count('assets/pss-v362-bootstrap.js') != 1 or text.count('assets/pss-v362-performance.js') != 1:
              raise SystemExit('Componente V362 duplicado no index.')

          path.write_text(text, encoding='utf-8', newline='')
          print('Index V362 validado:', len(text.encode('utf-8')), 'bytes')
          PY2

      - name: Publicar e remover workflow temporário
        shell: bash
        run: |
          rm -f .github/workflows/aplicar-index-v362.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html assets/pss-v362-performance.css assets/pss-v362-bootstrap.js assets/pss-v362-performance.js .github/workflows/aplicar-index-v362.yml
          git commit -m 'Otimiza site com V362_SUPER_RAPIDO_SEGURO [skip ci]'
          git pull --rebase origin main
          git push origin HEAD:main
